function parseJSON(txt) {
  if (!txt) return null;
  var c = txt.replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
  try { return JSON.parse(c); } catch {}
  var m = c.match(/\{[\s\S]*\}/); if (m) try { return JSON.parse(m[0]); } catch {}
  var a = c.match(/\[[\s\S]*\]/); if (a) try { return { weeks: JSON.parse(a[0]) }; } catch {}
  return null;
}

async function getToken() {
  var u = netlifyIdentity.currentUser();
  if (!u) throw new Error("Non authentifié");
  try { await u.jwt(true); u = netlifyIdentity.currentUser(); } catch {}
  var t = u?.token?.access_token;
  if (!t) throw new Error("Token invalide");
  return t;
}

async function callClaude(userMsg, system, maxTokens) {
  const token = await getToken();
  var res = await fetch("/.netlify/functions/claude", {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
    body: JSON.stringify({system:system||"", max_tokens:maxTokens||1200, messages:[{role:"user",content:userMsg}]}),
  });
  if (!res.ok) { var e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||"Erreur "+res.status); }
  var d = await res.json();
  return d?.content?.[0]?.text || "";
}

async function loadUserData() {
  try {
    const token = await getToken();
    const res = await fetch("/.netlify/functions/save", { headers:{"Authorization":"Bearer "+token} });
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

async function saveUserData(data) {
  try {
    const token = await getToken();
    await fetch("/.netlify/functions/save", {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
      body: JSON.stringify(data),
    });
  } catch(e) { console.error("Save error:", e); }
}

function Btn({onClick,disabled=false,children,variant="primary",sm=false,full=false,style:sx}) {
  const V = {
    primary:   {background:disabled?"#94A3B8":C.navy, color:"#fff", border:"none"},

}
function Field({label,value,onChange,placeholder,rows,type="text"}) {
  const s={width:"100%",padding:"9px 12px",borderRadius:8,border:"0.5px solid "+C.gray200,fontSize:13,outline:"none",color:C.gray900,fontFamily:"inherit",background:C.gray50,resize:rows?"vertical":undefined,lineHeight:rows?1.6:undefined};

    {label&&<div style={{fontSize:12,fontWeight:500,color:C.gray600,marginBottom:4}}>{label}</div>}

}
function Tag({label,active,onClick}) {

}
function CharBadge({n}) {
  if (!n) return null;
  const color=n<300?C.red:n<=600?C.amber:n<=1500?C.green:C.red;
  const label=n<300?"Trop court":n<=600?"Court ✓":n<=1500?"Sweet spot ✓":"Trop long";
  return <span style={{fontSize:11,fontWeight:500,color,background:color+"18",padding:"2px 8px",borderRadius:6}}>{n} — {label}</span>;
}
function Toast({message}) {

// ─── AUTH ─────────────────────────────────────────────────────────
var AuthCtx = React.createContext(null);
function AuthProvider({children}) {
  const [user,    setUser]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [error,   setError]   = useState(null);
  function isOk(u) { return ALLOWED_DOMAINS.some(d=>u?.email?.endsWith(d)); }
  function logout() { netlifyIdentity.logout(); setUser(null); }
  useEffect(()=>{
    var t = setTimeout(()=>setLoading(p=>{ if(p){ var c=netlifyIdentity.currentUser(); if(c&&isOk(c)) setUser(c); } return false; }),4000);
    netlifyIdentity.on("init",   u=>{ clearTimeout(t); if(u){ if(isOk(u)){setUser(u);setError(null);}else{netlifyIdentity.logout();setError("Domaine non autorisé.");} } setLoading(false); });
    netlifyIdentity.on("login",  u=>{ clearTimeout(t); netlifyIdentity.close(); if(isOk(u)){setUser(u);setError(null);}else{netlifyIdentity.logout();setError("Accès réservé.");} setLoading(false); });
    netlifyIdentity.on("logout", ()=>{ setUser(null); setLoading(false); });
    netlifyIdentity.on("close",  ()=>{ var c=netlifyIdentity.currentUser(); if(c&&isOk(c)){setUser(c);setError(null);} setLoading(false); });
    var cur=netlifyIdentity.currentUser(); if(cur){ clearTimeout(t); if(isOk(cur))setUser(cur); else{netlifyIdentity.logout();setError("Domaine non autorisé.");} setLoading(false); }
    return ()=>{ clearTimeout(t); ["init","login","logout","close"].forEach(e=>netlifyIdentity.off(e)); };
  },[]);
  return <AuthCtx.Provider value={{user,loading,error,logout}}>{children}</AuthCtx.Provider>;
}
function useAuth() { return React.useContext(AuthCtx); }

function ProtectedRoute({children}) {
  const auth=useAuth();
  if (auth.loading) return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.gray400}}>Chargement…</div>;
  if (!auth.user)   return <LoginPage/>;
  return children;
}

// ─── PROFIL ───────────────────────────────────────────────────────
function ProfilTab({profile,onSave,showToast,onAxesGenerated}) {
  const [name,      setName]      = useState(profile?.name||"");
  const [vision,    setVision]    = useState(profile?.vision||"");
  const [context,   setContext]   = useState(profile?.context||"");
  const [audience,  setAudience]  = useState(profile?.audience||"");
  const [objectif,  setObjectif]  = useState(profile?.objectif||"");
  const [tonalites, setTonalites] = useState(profile?.tonalites||[]);
  const [eviter,    setEviter]    = useState(profile?.eviter||"");
  const [loading,   setLoading]   = useState(false);
  useEffect(()=>{ setName(profile?.name||""); setVision(profile?.vision||""); setContext(profile?.context||""); setAudience(profile?.audience||""); setObjectif(profile?.objectif||""); setTonalites(profile?.tonalites||[]); setEviter(profile?.eviter||""); },[profile]);
  const filled = [name,vision,context,audience,objectif,tonalites.length>0,eviter].filter(Boolean).length;
  const pct    = Math.round((filled/7)*100);
  const isValid= name.trim()&&vision.trim()&&context.trim();
  function toggleTon(t) { setTonalites(p=>p.includes(t)?p.filter(x=>x!==t):p.length<3?[...p,t]:p); }
  function buildP()     { return {name,vision,context,audience,objectif,tonalites,eviter}; }
  async function genAxes() {
    if (!isValid) return;
    onSave(buildP()); setLoading(true);
    try {
      const prompt=`Génère 6 axes de contenu LinkedIn pour cette personne.
PROFIL :
- Nom : ${name}
- Vision : ${vision}
- Contexte : ${context}${audience?"\n- Audience : "+audience:""}${objectif?"\n- Objectif : "+objectif:""}${tonalites.length?"\n- Tonalités : "+tonalites.join(", "):""}

RÈGLE ABSOLUE : les axes DOIVENT découler directement de cette vision et ce contexte. Ne propose rien de générique. Chaque axe reflète ce que cette personne spécifique pense et défend.`;
      const sys='Réponds UNIQUEMENT en JSON valide. Format : {"axes":[{"title":"...","description":"...","emoji":"..."}]} avec exactement 6 items.';
      const parsed=parseJSON(await callClaude(prompt,sys,900));
      if (parsed?.axes?.length) onAxesGenerated({id:uid(),label:"Génération — "+toDay(),createdAt:toDay(),axes:parsed.axes.map(a=>({...a,id:uid()}))});
      else showToast("⚠️ Format inattendu");
    } catch(e) { showToast("⚠️ "+e.message); }
    setLoading(false);
  }
  const audienceTags=audience?audience.split(",").map(s=>s.trim()).filter(Boolean):[];
  return <div style={{height:"calc(100vh - 56px)",display:"grid",gridTemplateColumns:"1fr 1fr",overflow:"hidden"}}>
    <div style={{padding:"1.75rem",background:"#fff",borderRight:"0.5px solid "+C.gray200,overflowY:"auto"}}>
      <p style={{fontSize:17,fontWeight:500,color:C.gray900,marginBottom:4}}>Votre profil</p>
      <p style={{fontSize:12,color:C.gray400,marginBottom:20,lineHeight:1.5}}>Ces informations personnalisent tous vos contenus générés.</p>
      <p style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10,paddingBottom:5,borderBottom:"0.5px solid "+C.gray200}}>Identité</p>
      <Field label="Nom ou marque" value={name} onChange={setName} placeholder="Ex : Nicolas Dupont"/>
      <Field label="Vision" value={vision} onChange={setVision} placeholder="Ex : La transparence salariale devrait être la norme" rows={4}/>
      <Field label="Contexte" value={context} onChange={setContext} placeholder="Ex : CEO d'une ESN de 80 consultants, 10 ans d'expérience…" rows={5}/>
      <p style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10,paddingBottom:5,borderBottom:"0.5px solid "+C.gray200,marginTop:16}}>Stratégie</p>
      <Field label="Audience cible" value={audience} onChange={setAudience} placeholder="Ex : DSI, dirigeants de PME, DRH"/>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:500,color:C.gray600,marginBottom:6}}>Objectif LinkedIn</div>
        {OBJECTIFS.map(obj=><div key={obj.id} onClick={()=>setObjectif(obj.id)} style={{padding:"8px 10px",borderRadius:8,marginBottom:6,cursor:"pointer",display:"flex",alignItems:"center",gap:8,border:objectif===obj.id?"1.5px solid "+C.navy:"0.5px solid "+C.gray200,background:objectif===obj.id?C.navyLight:"#fff"}}>
          <div style={{width:8,height:8,borderRadius:"50%",flexShrink:0,background:objectif===obj.id?C.navy:"transparent",border:objectif===obj.id?"none":"1.5px solid "+C.gray200}}/>
          <span style={{fontSize:12,color:objectif===obj.id?C.navy:C.gray600,fontWeight:objectif===obj.id?500:400}}>{obj.label}</span>
        </div>)}
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:500,color:C.gray600,marginBottom:4}}>Tonalité dominante <span style={{fontWeight:400,color:C.gray400}}>(max 3)</span></div>
        <div>{TONALITES.map(t=><Tag key={t} label={t} active={tonalites.includes(t)} onClick={()=>toggleTon(t)}/>)}</div>
      </div>
      <Field label={<span>Mots-clés à éviter <span style={{fontWeight:400,color:C.gray400}}>(optionnel)</span></span>} value={eviter} onChange={setEviter} placeholder="Ex : synergies, disruptif, paradigme…"/>

      </div>
    </div>
    <div style={{padding:"1.75rem",background:C.gray50,display:"flex",flexDirection:"column",gap:14,overflowY:"auto"}}>
      <div style={{background:"#fff",border:"0.5px solid "+C.gray200,borderRadius:10,padding:"12px 14px"}}>
        <p style={{fontSize:11,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".05em",marginBottom:10}}>Aperçu de votre profil</p>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:C.navy,color:"#fff",fontSize:14,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{name?name[0].toUpperCase():"?"}</div>
          <div><p style={{fontSize:13,fontWeight:500,color:C.gray900}}>{name||"—"}</p><p style={{fontSize:11,color:C.gray400}}>{[OBJECTIFS.find(o=>o.id===objectif)?.label,...tonalites].filter(Boolean).join(" · ")||"Complétez votre profil"}</p></div>
        </div>
        {audienceTags.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{audienceTags.map((t,i)=><span key={i} style={{padding:"2px 8px",background:C.navyLight,color:C.navy,borderRadius:4,fontSize:10,fontWeight:500}}>{t}</span>)}</div>}
      </div>
      <div style={{background:"#fff",border:"0.5px solid "+C.gray200,borderRadius:10,padding:"12px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <p style={{fontSize:12,fontWeight:500,color:C.gray900}}>Profil complété</p>
          <span style={{fontSize:14,fontWeight:500,color:pct>=80?C.green:pct>=50?C.amber:C.red}}>{pct}%</span>
        </div>
        <div style={{height:6,background:C.gray100,borderRadius:10,marginBottom:8}}>
          <div style={{height:6,borderRadius:10,width:pct+"%",background:pct>=80?C.green:pct>=50?C.amber:C.red,transition:"width 0.3s"}}/>
        </div>
        <p style={{fontSize:11,color:C.gray400}}>{pct===100?"Profil complet ✓":"Renseignez tous les champs pour un profil optimal"}</p>
      </div>
      {[{n:"1",t:"Remplissez votre profil",d:"Identité + stratégie. 5 minutes chrono."},{n:"2",t:"Vos axes sont générés",d:"6 thèmes calibrés sur votre vision."},{n:"3",t:"Créez et planifiez",d:"Roadmap, posts, analyse, optimisation."}].map(s=><div key={s.n} style={{background:"#fff",border:"0.5px solid "+C.gray200,borderRadius:10,padding:"10px 12px",display:"flex",gap:10,alignItems:"flex-start"}}>
        <div style={{width:22,height:22,borderRadius:"50%",background:C.navyLight,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:10,fontWeight:500,color:C.navy}}>{s.n}</span></div>
        <div><p style={{fontSize:12,fontWeight:500,color:C.gray900,marginBottom:2}}>{s.t}</p><p style={{fontSize:11,color:C.gray400,lineHeight:1.4}}>{s.d}</p></div>
      </div>)}
      <div style={{marginTop:"auto",background:C.navy,borderRadius:10,padding:"10px 14px"}}>
        <p style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:2}}>Données sauvegardées dans le cloud</p>
        <p style={{fontSize:11,color:"#fff",fontWeight:500}}>Accessibles depuis n'importe quel appareil</p>
      </div>
    </div>
  </div>;
}

// ─── AXES ─────────────────────────────────────────────────────────
function AxesTab({axesSessions,favAxes,selectedAxes,onToggleAxis,onToggleFav,onDeleteAxis,onAxesGenerated,profile,showToast,onGoRoadmap}) {
  const [mode,    setMode]    = useState("select");
  const [marked,  setMarked]  = useState([]);
  const [filter,  setFilter]  = useState("all");
  const [loading, setLoading] = useState(false);
  const allAxes    = axesSessions.flatMap(s=>s.axes);
  const usedIds    = new Set(selectedAxes.map(a=>a.id));
  const favIds     = new Set(favAxes);
  const seen       = new Set();
  const uniqueAxes = allAxes.filter(a=>{ if(seen.has(a.title))return false; seen.add(a.title); return true; });
  const filtered   = uniqueAxes.filter(a=>{
    if(filter==="fav")  return favIds.has(a.id);
    if(filter==="used") return usedIds.has(a.id);
    return true;
  });
  async function regen(count,toKeep) {
    if (!profile) { showToast("⚠️ Complétez votre profil d'abord"); return; }
    setLoading(true);
    try {
      const prompt=`Génère ${count} nouveaux axes LinkedIn différents pour : ${profile.name} — ${profile.vision}\nAxes existants à ne pas reproduire : ${JSON.stringify(toKeep.map(a=>a.title))}\nLes axes doivent être ancrés dans cette vision spécifique.`;
      const sys=`Réponds UNIQUEMENT en JSON valide. Format : {"axes":[{"title":"...","description":"...","emoji":"..."}]} avec exactement ${count} items.`;
      const parsed=parseJSON(await callClaude(prompt,sys,900));
      if (parsed?.axes?.length) {
        const withIds=parsed.axes.map(a=>({...a,id:uid()}));
        onAxesGenerated({id:uid(),label:"Regénération — "+toDay(),createdAt:toDay(),axes:count===6?withIds:toKeep.concat(withIds)});
        setMarked([]); setMode("select"); showToast("✓ "+parsed.axes.length+" axe(s) générés");
      } else showToast("⚠️ Format inattendu");
    } catch(e) { showToast("⚠️ "+e.message); }
    setLoading(false);
  }
  return <div style={{height:"calc(100vh - 56px)",display:"flex",flexDirection:"column"}}>
    <div style={{height:44,background:"#fff",borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",padding:"0 1.25rem",gap:6,flexShrink:0}}>
      <Pill active={filter==="all"}  onClick={()=>setFilter("all")}>Tous ({uniqueAxes.length})</Pill>
      <Pill active={filter==="fav"}  onClick={()=>setFilter("fav")}>Favoris ★ {favAxes.length}</Pill>
      <Pill active={filter==="used"} onClick={()=>setFilter("used")}>Sélectionnés ✓ {selectedAxes.length}</Pill>
      <div style={{marginLeft:"auto",display:"flex",gap:6}}>
        <Pill warn={mode==="replace"} onClick={()=>{ setMode(m=>m==="replace"?"select":"replace"); setMarked([]); }}>{mode==="replace"?"✕ Annuler":"↺ Remplacer"}</Pill>
        <Pill onClick={()=>regen(6,[])} disabled={loading}>{loading?"…":"↺ Regénérer"}</Pill>
      </div>
    </div>
    {mode==="replace"&&marked.length>0&&<div style={{background:"#FEF3C7",padding:"8px 1.25rem",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
      <span style={{fontSize:12,color:"#92400E"}}>{marked.length} axe(s) à remplacer</span>
      <Pill warn onClick={()=>regen(marked.length,uniqueAxes.filter(a=>!marked.find(x=>x.id===a.id)))}>{loading?"…":"↺ Remplacer"}</Pill>
    </div>}
    <div style={{flex:1,overflowY:"auto",padding:"1rem 1.25rem",background:C.gray50}}>
      {filtered.length===0?<Empty icon="🎯" text="Aucun axe trouvé."/>:
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:10}}>
          {filtered.map(a=>{
            const isSel=usedIds.has(a.id),isFav=favIds.has(a.id),isMk=!!marked.find(x=>x.id===a.id);
            return <div key={a.id} onClick={()=>{ if(mode==="replace") setMarked(p=>p.find(x=>x.id===a.id)?p.filter(x=>x.id!==a.id):[...p,a]); else onToggleAxis(a); }}
              style={{borderWidth:isSel&&!isMk?"1.5px":"0.5px",borderStyle:"solid",borderColor:isMk?C.amber:isSel?C.navy:isFav?C.amber:C.gray200,borderRadius:10,padding:12,background:isMk?"#FFFBEB":isSel?C.navyLight:"#fff",cursor:"pointer",display:"flex",flexDirection:"column",gap:6}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <span style={{fontSize:16}}>{a.emoji}</span>
                <div style={{display:"flex",gap:5,alignItems:"center"}}>
                  {mode!=="replace"&&<span onClick={e=>{e.stopPropagation();onToggleFav(a.id);}} style={{fontSize:13,color:isFav?C.amber:C.gray200,cursor:"pointer"}}>{isFav?"★":"☆"}</span>}
                  {isSel&&mode!=="replace"&&<div style={{width:14,height:14,borderRadius:"50%",background:C.navy,color:"#fff",fontSize:8,display:"flex",alignItems:"center",justifyContent:"center"}}>✓</div>}
                  {isMk&&<span style={{fontSize:10,background:C.amber,color:"#fff",borderRadius:4,padding:"1px 5px"}}>↺</span>}
                  {mode!=="replace"&&<button onClick={e=>{e.stopPropagation();onDeleteAxis(a.id);}} style={{fontSize:11,color:C.gray400,background:"none",border:"none",cursor:"pointer",padding:"0 2px",fontFamily:"inherit"}}>✕</button>}
                </div>
              </div>
              <p style={{fontSize:12,fontWeight:500,color:isSel?C.navy:C.gray900}}>{a.title}</p>
              <p style={{fontSize:11,color:C.gray400,lineHeight:1.3}}>{a.description}</p>
              {(isSel||isFav)&&<span style={{fontSize:9,padding:"1px 5px",borderRadius:3,alignSelf:"flex-start",background:isSel?"#F0FDF4":isFav?"#FEF3C7":"transparent",color:isSel?"#15803D":isFav?"#92400E":"transparent"}}>{isSel?"✓ Sélectionné":isFav?"★ Favori":""}</span>}
            </div>;
          })}
        </div>
      }
    </div>
    {selectedAxes.length>0&&mode==="select"&&<div style={{background:"#fff",borderTop:"2px solid "+C.navy,padding:"16px 1.25rem",display:"flex",alignItems:"center",gap:16,flexShrink:0,boxShadow:"0 -4px 12px rgba(30,58,95,0.08)"}}>
      <div style={{display:"flex",flexDirection:"column",gap:2}}>
        <span style={{fontSize:13,fontWeight:500,color:C.gray900}}>{selectedAxes.length} axe{selectedAxes.length>1?"s":""} sélectionné{selectedAxes.length>1?"s":""}</span>
        <span style={{fontSize:11,color:C.navy}}>{selectedAxes.slice(0,3).map(a=>a.title).join(" · ")}{selectedAxes.length>3?" …":""}</span>
      </div>
      <div style={{marginLeft:"auto"}}><Btn onClick={onGoRoadmap}>→ Générer la roadmap</Btn></div>
    </div>}
  </div>;
}

// ─── ROADMAP ──────────────────────────────────────────────────────
function RoadmapTab({roadmaps,activeRmId,selectedAxes,profile,pubWeeks,showToast,
  onSetActive,onNewRoadmap,onRenameRoadmap,onDeleteRoadmap,
  onRoadmapGenerated,onRoadmapUpdated,onWeekUpdated,onGoCreer}) {

  const [dur,         setDur]         = useState(6);
  const [openQ,       setOpenQ]       = useState([0]);
  const [loading,     setLoading]     = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [editWeek,    setEditWeek]    = useState(null);
  const [regenId,     setRegenId]     = useState(null);

  const activeRm = roadmaps.find(r=>r.id===activeRmId)||roadmaps[0]||null;
  const weeks    = activeRm?.weeks||[];
  const monthSet = [];
  weeks.forEach(w=>{ if(!monthSet.includes(w.month)) monthSet.push(w.month); });
  const quarters = [];
  for (let i=0;i<monthSet.length;i+=3) {
    const qM=monthSet.slice(i,i+3);
    const qW=weeks.filter(w=>qM.includes(w.month));
    quarters.push({index:i/3, months:qM, weeks:qW, done:qW.filter(w=>pubWeeks.has(Number(w.week))).length});
  }

  async function handleGen() {
    if (!selectedAxes.length) { showToast("⚠️ Sélectionnez des axes d'abord"); return; }
    setLoading(true); showToast("⏳ Génération en cours…");
    try {
      const axesList=selectedAxes.map(a=>`- ${a.title}`).join("\n");
      const prompt=`Roadmap LinkedIn ${dur} mois (${dur*4} semaines) pour ${profile?.name||""}.
Vision : ${profile?.vision||""}
Axes (UNIQUEMENT ces axes) :
${axesList}

Pour chaque semaine génère : week, month (Mois 1...), theme (titre accrocheur FR), hook (1ère ligne <15 mots), detail (1 phrase), axis (titre exact), tone (Inspirant/Éducatif/Provocateur/Authentique/Expert), style (Storytelling/Liste Tips/Opinion tranchée/Étude de cas/Question ouverte).
Réponds UNIQUEMENT avec le JSON, rien d'autre.`;
      const sys=`{"weeks":[{"week":1,"month":"Mois 1","theme":"Titre accrocheur","hook":"Première ligne percutante","angle":"angle éditorial","detail":"Description concrète","axis":"Axe exact","tone":"Inspirant","style":"Storytelling"}]}`;
      let parsed=parseJSON(await callClaude(prompt,sys,2500));
      if (parsed&&!parsed.weeks&&Array.isArray(parsed)) parsed={weeks:parsed};
      if (!parsed?.weeks?.length) { showToast("⚠️ Format inattendu"); setLoading(false); return; }
      if (activeRm) {
        onRoadmapUpdated(activeRm.id, parsed.weeks, dur);
      } else {
        onRoadmapGenerated({id:uid(), name:"Roadmap "+dur+"m — "+toDay(), createdAt:toDay(), weeks:parsed.weeks, dur});
      }
    } catch(e) { showToast("⚠️ "+e.message); }
    setLoading(false);
  }

  async function handleRegenWeek(w) {
    setRegenId(w.week);
    try {
      const prompt=`Regénère cette semaine de roadmap LinkedIn.
PROFIL : ${profile?.name||""} — ${profile?.vision||""}
AXE : ${w.axis} | TON : ${w.tone} | STYLE : ${w.style}
Génère un nouveau thème et hook différents. Réponds UNIQUEMENT en JSON.`;
      const sys=`{"theme":"Nouveau titre","hook":"Nouveau hook","angle":"nouvel angle","detail":"Nouveau contenu","axis":"${w.axis}","tone":"${w.tone}","style":"${w.style}","week":${w.week},"month":"${w.month}"}`;
      const parsed=parseJSON(await callClaude(prompt,sys,400));
      if (parsed?.theme) { onWeekUpdated({...w,...parsed, week:w.week, month:w.month}); showToast("✓ Carte regénérée"); }
      else showToast("⚠️ Format inattendu");
    } catch(e) { showToast("⚠️ "+e.message); }
    setRegenId(null);
  }

  function saveEditWeek() {
    if (!editWeek) return;
    onWeekUpdated(editWeek);
    setEditWeek(null);
    showToast("✓ Carte mise à jour");
  }

  return <div style={{display:"grid",gridTemplateColumns:sidebarOpen?"220px 1fr":"44px 1fr",height:"calc(100vh - 56px)",transition:"grid-template-columns 0.2s"}}>
    <div style={{background:C.gray50,borderRight:"0.5px solid "+C.gray200,padding:"10px 0",display:"flex",flexDirection:"column",alignItems:sidebarOpen?"stretch":"center",gap:6,overflowY:"auto"}}>
      <button onClick={()=>setSidebarOpen(o=>!o)} style={{width:30,height:30,borderRadius:8,background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",margin:sidebarOpen?"0 10px 8px":"0 auto 8px",border:"none"}}>
        <span style={{color:"#fff",fontSize:14,transform:sidebarOpen?"rotate(180deg)":"none",transition:"transform 0.2s"}}>›</span>
      </button>
      {roadmaps.map((rm,i)=><div key={rm.id} onClick={()=>onSetActive(rm.id)} style={{borderRadius:6,border:"0.5px solid "+(rm.id===activeRmId?C.navy:C.gray200),background:rm.id===activeRmId?C.navyLight:"#fff",cursor:"pointer",display:"flex",alignItems:"center",...(sidebarOpen?{padding:"8px 10px",margin:"0 8px",gap:8}:{width:28,height:28,justifyContent:"center",margin:"0 auto"})}}>
        {sidebarOpen?<React.Fragment><div style={{flex:1,minWidth:0}}><p style={{fontSize:12,fontWeight:500,color:rm.id===activeRmId?C.navy:C.gray900,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rm.name}</p><p style={{fontSize:10,color:C.gray400}}>{rm.weeks?.length||0} sem.</p></div><button onClick={e=>{e.stopPropagation();onDeleteRoadmap(rm.id);}} style={{fontSize:11,color:C.gray400,background:"none",border:"none",cursor:"pointer"}}>✕</button></React.Fragment>:<span style={{fontSize:9,fontWeight:500,color:rm.id===activeRmId?C.navy:C.gray600}}>R{i+1}</span>}
      </div>)}
      {sidebarOpen?<Btn sm onClick={onNewRoadmap} style={{margin:"4px 8px 0"}}>+ Nouvelle</Btn>:<div onClick={onNewRoadmap} style={{width:28,height:28,borderRadius:6,border:"0.5px dashed "+C.gray200,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",margin:"0 auto"}}><span style={{fontSize:14,color:C.gray400}}>+</span></div>}
    </div>
    <div style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{height:48,background:C.gray50,borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",padding:"0 1.25rem",gap:10,flexShrink:0,flexWrap:"wrap"}}>
        {activeRm&&<React.Fragment><span style={{fontSize:12,fontWeight:500,color:C.gray900}}>{activeRm.name}</span><span style={{fontSize:10,padding:"2px 8px",background:C.navyLight,color:C.navy,borderRadius:20,fontWeight:500}}>Active</span></React.Fragment>}
        <span style={{fontSize:11,color:C.gray600,marginLeft:8}}>Durée :</span>
        <div style={{display:"flex",gap:3}}>
          {DURATIONS.map(d=><button key={d} onClick={()=>setDur(d)} style={{width:34,height:30,borderRadius:7,border:"0.5px solid "+(dur===d?C.navy:C.gray200),background:dur===d?C.navy:"#fff",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,fontFamily:"inherit"}}>
            <span style={{fontSize:11,fontWeight:500,color:dur===d?"#fff":C.gray600,lineHeight:1}}>{d}</span>
            <span style={{fontSize:8,color:dur===d?"rgba(255,255,255,0.7)":C.gray400,lineHeight:1}}>m</span>
          </button>)}
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:6}}>
          {activeRm&&<Btn sm variant="secondary" onClick={()=>onRenameRoadmap(activeRm.id)}>Renommer</Btn>}
          <Btn sm onClick={handleGen} disabled={loading||!selectedAxes.length}>{loading?"Génération…":weeks.length?"↺ Regénérer":"→ Générer"}</Btn>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"1rem 1.25rem",background:C.gray50}}>
        {!selectedAxes.length&&<div style={{background:"#FEF3C7",border:"0.5px solid "+C.amber,borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#92400E"}}>⚠ Sélectionnez d'abord vos axes.</div>}
        {!weeks.length?<Empty icon="🗓" text="Cliquez sur Générer pour créer votre première roadmap." btnLabel={selectedAxes.length?"Générer":null} onBtn={selectedAxes.length?handleGen:null}/>:
          quarters.map((q,qi)=>{
            const isOpen=openQ.includes(qi);
            return <div key={qi} style={{marginBottom:8}}>
              <div onClick={()=>setOpenQ(p=>p.includes(qi)?p.filter(x=>x!==qi):[...p,qi])} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",userSelect:"none",background:isOpen?C.navyLight:C.gray100,border:"0.5px solid "+(isOpen?C.navy:C.gray200),borderRadius:isOpen?"9px 9px 0 0":"9px"}}>
                <span style={{fontSize:12,fontWeight:500,color:C.navy}}>Trimestre {q.index+1}</span>
                <span style={{fontSize:11,color:C.gray400}}>{q.months.join(" · ")}</span>
                <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:12}}>
                  {q.done>0&&<span style={{fontSize:11,color:C.green}}>{q.done} post{q.done>1?"s":""} créé{q.done>1?"s":""}</span>}
                  <span style={{fontSize:12,color:C.gray400,transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.15s"}}>›</span>
                </div>
              </div>
              {isOpen&&<div style={{border:"0.5px solid "+C.navy,borderTop:"none",borderRadius:"0 0 9px 9px",padding:12,background:"#fff"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                  {q.months.map(month=><div key={month}>
                    <div style={{fontSize:10,fontWeight:500,color:C.navy,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8,paddingBottom:5,borderBottom:"0.5px solid "+C.gray200}}>{month}</div>
                    {q.weeks.filter(w=>w.month===month).map(w=>{
                      const isDone=pubWeeks.has(Number(w.week));
                      const isEdit=editWeek?.week===w.week;
                      const isRegen=regenId===w.week;
                      return <div key={w.week} style={{border:"0.5px solid "+(isDone?"#10B981":C.gray200),borderRadius:8,marginBottom:8,background:isDone?"#F0FDF4":"#fff",overflow:"hidden"}}>
                        <div style={{padding:"8px 10px",borderBottom:"0.5px solid "+(isDone?"#10B98140":C.gray200)}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                            <span style={{fontSize:10,color:C.gray400}}>Sem. {w.week}</span>
                            <span style={{padding:"1px 6px",background:isDone?"#D1FAE5":C.navyLight,color:isDone?"#10B981":C.navy,borderRadius:4,fontSize:9,fontWeight:500}}>{isDone?"✓ Post créé":w.axis}</span>
                          </div>
                          <p style={{fontSize:12,fontWeight:500,color:isDone?"#10B981":C.gray900,lineHeight:1.35,marginBottom:4}}>{w.theme}</p>
                          {w.hook&&<p style={{fontSize:11,color:C.navy,fontStyle:"italic",lineHeight:1.4,marginBottom:3}}>"{w.hook}"</p>}
                          <p style={{fontSize:11,color:C.gray600,lineHeight:1.4,marginBottom:6}}>{w.detail||w.angle}</p>
                          <div style={{display:"flex",gap:4,marginBottom:8}}>
                            <span style={{padding:"1px 6px",background:C.gray100,color:C.gray600,borderRadius:4,fontSize:9}}>{w.tone}</span>
                            <span style={{padding:"1px 6px",background:C.gray100,color:C.gray600,borderRadius:4,fontSize:9}}>{w.style}</span>
                          </div>
                        </div>
                        {!isDone&&<div style={{padding:"8px 10px",display:"flex",gap:5}}>
                          <button onClick={()=>setEditWeek(isEdit?null:{...w})} style={{flex:1,fontSize:10,padding:"4px 0",borderRadius:5,border:"0.5px solid "+C.gray200,background:isEdit?C.navyLight:"#fff",color:isEdit?C.navy:C.gray600,cursor:"pointer",fontFamily:"inherit"}}>{isEdit?"✕ Fermer":"✏ Modifier"}</button>
                          <button onClick={()=>handleRegenWeek(w)} disabled={isRegen} style={{flex:1,fontSize:10,padding:"4px 0",borderRadius:5,border:"0.5px solid "+C.gray200,background:"#fff",color:C.gray600,cursor:"pointer",fontFamily:"inherit",opacity:isRegen?0.5:1}}>{isRegen?"…":"↺ Regén."}</button>
                          <button onClick={()=>onGoCreer(w)} style={{flex:1,fontSize:10,padding:"4px 0",borderRadius:5,border:"none",background:C.navy,color:"#fff",cursor:"pointer",fontFamily:"inherit"}}>✦ Créer</button>
                        </div>}
                        {isEdit&&<div style={{padding:"8px 10px",background:C.gray50,borderTop:"0.5px solid "+C.gray200}}>
                          <div style={{marginBottom:6}}>
                            <div style={{fontSize:10,color:C.gray400,marginBottom:3}}>Thème</div>
                            <input value={editWeek.theme||""} onChange={e=>setEditWeek(p=>({...p,theme:e.target.value}))} style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"0.5px solid "+C.gray200,fontSize:11,outline:"none",fontFamily:"inherit",background:"#fff"}}/>
                          </div>
                          <div style={{marginBottom:6}}>
                            <div style={{fontSize:10,color:C.gray400,marginBottom:3}}>Hook</div>
                            <input value={editWeek.hook||""} onChange={e=>setEditWeek(p=>({...p,hook:e.target.value}))} style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"0.5px solid "+C.gray200,fontSize:11,outline:"none",fontFamily:"inherit",background:"#fff"}}/>
                          </div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
                            <div>
                              <div style={{fontSize:10,color:C.gray400,marginBottom:3}}>Ton</div>
                              <select value={editWeek.tone||""} onChange={e=>setEditWeek(p=>({...p,tone:e.target.value}))} style={{width:"100%",padding:"5px 6px",borderRadius:6,border:"0.5px solid "+C.gray200,fontSize:11,outline:"none",fontFamily:"inherit",background:"#fff"}}>
                                {TONES.map(t=><option key={t}>{t}</option>)}
                              </select>
                            </div>
                            <div>
                              <div style={{fontSize:10,color:C.gray400,marginBottom:3}}>Style</div>
                              <select value={editWeek.style||""} onChange={e=>setEditWeek(p=>({...p,style:e.target.value}))} style={{width:"100%",padding:"5px 6px",borderRadius:6,border:"0.5px solid "+C.gray200,fontSize:11,outline:"none",fontFamily:"inherit",background:"#fff"}}>
                                {STYLES.map(s=><option key={s}>{s}</option>)}
                              </select>
                            </div>
                          </div>
                          <Btn sm full onClick={saveEditWeek}>Enregistrer</Btn>
                        </div>}
                      </div>;
                    })}
                  </div>)}
                </div>
              </div>}
            </div>;
          })
        }
      </div>
    </div>
  </div>;
}

// ─── GÉNÉRER ──────────────────────────────────────────────────────
function GenererTab({profile,selectedAxes,prefill,onSavePost,showToast,post,setPost,onGoInterview,onGoAnalyser,onGoOptimiser,onMarkDone}) {
  const [axis,    setAxis]    = useState(()=>prefill?.axis||selectedAxes[0]||null);
  const [tone,    setTone]    = useState(()=>prefill?.tone||"");
  const [style,   setStyle]   = useState(()=>prefill?.style||"");
  const [theme,   setTheme]   = useState(()=>prefill?.roadmapSug?.theme||"");
  const [hook,    setHook]    = useState(()=>prefill?.roadmapSug?.hook||"");
  const [loading, setLoading] = useState(false);

  async function handleGen() {
    if (!axis||!tone||!style||!profile) return;
    setLoading(true);
    try {
      const extras=(profile.audience?"\nAudience : "+profile.audience:"")+(profile.objectif?"\nObjectif : "+profile.objectif:"")+(profile.tonalites?.length?"\nTonalités : "+profile.tonalites.join(", "):"")+(profile.eviter?"\nMots à éviter : "+profile.eviter:"");
      const ctx=theme?`\n\nCONTEXTE ÉDITORIAL — respecte impérativement :\n- Thème : ${theme}\n${hook?`- Commence le post par ce hook exact : "${hook}"\n`:""}- Ton : ${tone}\n- Style : ${style}`:"";
      const prompt=`Profil : ${profile.name} — ${profile.vision}\nContexte : ${profile.context}${extras}\nAxe : ${axis.title} — ${axis.description}\nTon : ${tone}\nStyle : ${style}${ctx}\n\nGénère le post LinkedIn complet.`;
      const txt=await callClaude(prompt,LINKEDIN_RULES,1200);
      setPost(txt);
      if (prefill?.roadmapSug?.week && onMarkDone) onMarkDone(Number(prefill.roadmapSug.week));
    } catch(e) { showToast("⚠️ "+e.message); }
    setLoading(false);
  }

  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",height:"100%",overflow:"hidden"}}>
    <div style={{background:"#fff",borderRight:"0.5px solid "+C.gray200,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto",padding:"1.25rem",display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <div style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Axe</div>
          {selectedAxes.length>0?selectedAxes.map(a=><div key={a.id} onClick={()=>setAxis(a)} style={{padding:"8px 10px",borderRadius:8,cursor:"pointer",fontSize:12,border:"1.5px solid "+(axis?.id===a.id?C.navy:C.gray200),background:axis?.id===a.id?C.navyLight:"#fff",fontWeight:axis?.id===a.id?500:400,color:axis?.id===a.id?C.navy:C.gray900,marginBottom:5}}>{a.emoji} {a.title}</div>):<p style={{fontSize:12,color:C.gray400}}>Aucun axe sélectionné.</p>}
        </div>
        <div>
          <div style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Ton</div>
          {TONES.map(t=><Tag key={t} label={t} active={tone===t} onClick={()=>setTone(t)}/>)}
        </div>
        <div>
          <div style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Style</div>
          {STYLES.map(s=><Tag key={s} label={s} active={style===s} onClick={()=>setStyle(s)}/>)}
        </div>
        <div style={{borderTop:"0.5px solid "+C.gray200,paddingTop:14}}>
          <div style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
            Contexte éditorial
            {prefill?.roadmapSug&&<span style={{fontSize:9,color:C.green,fontWeight:500,background:C.green+"18",padding:"1px 6px",borderRadius:4}}>depuis roadmap</span>}
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:500,color:C.gray600,marginBottom:4}}>Thème / idée</div>
            <input value={theme} onChange={e=>setTheme(e.target.value)} placeholder="Ex : Pourquoi j'ai arrêté les réunions du lundi" style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"0.5px solid "+(theme?C.navyMid:C.gray200),fontSize:12,outline:"none",fontFamily:"inherit",background:C.gray50}}/>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:500,color:C.gray600,marginBottom:4}}>Hook <span style={{fontWeight:400,color:C.gray400}}>(optionnel)</span></div>
            <input value={hook} onChange={e=>setHook(e.target.value)} placeholder="Ex : J'ai fait une erreur qui m'a coûté 2 associés." style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"0.5px solid "+(hook?C.navyMid:C.gray200),fontSize:12,outline:"none",fontFamily:"inherit",background:C.gray50}}/>
          </div>
        </div>
      </div>
      <div style={{padding:"1rem 1.25rem",borderTop:"0.5px solid "+C.gray200,flexShrink:0}}>
        <Btn onClick={handleGen} disabled={!axis||!tone||!style||loading} full>{loading?"Génération…":"✦ Générer le post"}</Btn>
      </div>
    </div>
    <div style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"10px 16px",borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fff",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:12,fontWeight:500}}>Post généré</span>{post&&<CharBadge n={post.length}/>}</div>
        {post&&<div style={{display:"flex",gap:12}}>
          <IBtn onClick={()=>navigator.clipboard.writeText(post)} color={C.navy}>Copier</IBtn>
          <IBtn onClick={()=>{onSavePost({content:post,axis:axis?.title||"",tone,style});showToast("✓ Post sauvegardé");}} color={C.green}>💾 Sauver</IBtn>
        </div>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"1.5rem 2.5rem"}}>
        {post?<p style={{fontSize:13,lineHeight:1.85,color:C.gray900,whiteSpace:"pre-wrap",maxWidth:640,margin:"0 auto"}}>{post}</p>:<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%"}}><p style={{fontSize:13,color:C.gray400}}>Le post apparaîtra ici après génération.</p></div>}
      </div>
      {post&&<div style={{padding:"10px 16px",borderTop:"0.5px solid "+C.gray200,display:"flex",gap:6,background:"#fff",flexShrink:0,flexWrap:"wrap"}}>
        <Pill onClick={handleGen} disabled={loading}>↺ Regénérer</Pill>
        <Pill onClick={()=>onGoInterview(post)}>→ Interview</Pill>
        <Pill onClick={()=>onGoAnalyser(post)}>→ Analyser</Pill>
        <Pill onClick={()=>onGoOptimiser(post)}>→ Optimiser</Pill>
      </div>}
    </div>
  </div>;
}

// ─── INTERVIEW ────────────────────────────────────────────────────
function InterviewTab({basePost,setBasePost,enriched,setEnriched,onSavePost,showToast,onGoAnalyser,onGoOptimiser}) {
  const [questions,setQuestions]=useState([]);
  const [answers,  setAnswers]  =useState({});
  const [loadQ,    setLoadQ]    =useState(false);
  const [loadE,    setLoadE]    =useState(false);
  const [regenIdx, setRegenIdx] =useState(null);
  async function genQ() {
    if (!basePost.trim()) return; setLoadQ(true);
    try { const p=parseJSON(await callClaude("Post :\n"+basePost+"\n\nPose 3 questions courtes pour extraire le vécu de l'auteur.",'Réponds UNIQUEMENT en JSON valide. Format : {"questions":["Q1","Q2","Q3"]}',400)); if(p?.questions){setQuestions(p.questions);setAnswers({});} } catch(e){showToast("⚠️ "+e.message);}
    setLoadQ(false);
  }
  async function regenQ(idx) {
    setRegenIdx(idx);
    try { const others=questions.filter((_,i)=>i!==idx); const p=parseJSON(await callClaude("Post :\n"+basePost+"\nQuestions existantes : "+JSON.stringify(others)+"\n\nGénère 1 nouvelle question différente.",'Réponds UNIQUEMENT en JSON valide. Format : {"question":"..."}',200)); if(p?.question) setQuestions(prev=>prev.map((q,i)=>i===idx?p.question:q)); } catch(e){showToast("⚠️ "+e.message);}
    setRegenIdx(null);
  }
  async function enrich() {
    setLoadE(true);
    try { const qa=questions.map((q,i)=>"Q: "+q+"\nR: "+(answers[i]||"—")).join("\n\n"); setEnriched(await callClaude("Post original :\n"+basePost+"\n\nVécu de l'auteur :\n"+qa+"\n\nRéécris ce post en intégrant naturellement ces éléments personnels.",LINKEDIN_RULES,1200)); } catch(e){showToast("⚠️ "+e.message);}
    setLoadE(false);
  }
  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",height:"100%",overflow:"hidden"}}>
    <div style={{borderRight:"0.5px solid "+C.gray200,display:"flex",flexDirection:"column",background:"#fff",overflow:"hidden"}}>
      <div style={{flexShrink:0,borderBottom:"0.5px solid "+C.gray200}}>
        <div style={{padding:"10px 16px",borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:500}}>Post de base</span><span style={{fontSize:11,color:C.gray400}}>depuis Générer ou coller</span></div>
        <div style={{padding:"1rem 1.25rem"}}><textarea value={basePost} onChange={e=>{setBasePost(e.target.value);setQuestions([]);setAnswers({});setEnriched("");}} placeholder="Collez votre post ici…" rows={5} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"0.5px solid "+C.gray200,fontSize:12,resize:"none",outline:"none",fontFamily:"inherit",background:C.gray50,lineHeight:1.6}}/></div>
        <div style={{padding:"0 1.25rem 1rem"}}><Btn onClick={genQ} disabled={loadQ||!basePost.trim()} full>{loadQ?"Génération…":"Générer les questions →"}</Btn></div>
      </div>
      {questions.length>0&&<div style={{flex:1,overflowY:"auto",padding:"1rem 1.25rem",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em"}}>Questions</span>
          <span style={{fontSize:11,fontWeight:500,color:C.green,background:C.green+"18",padding:"2px 8px",borderRadius:6}}>3 générées</span>
        </div>
        {questions.map((q,i)=><div key={i}>
          <div style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:6}}>
            <div style={{background:C.navyLight,borderLeft:"3px solid "+C.navy,borderRadius:"0 8px 8px 0",padding:"8px 10px",flex:1}}><p style={{fontSize:12,fontWeight:500,color:C.navy}}>{q}</p></div>
            <button onClick={()=>regenQ(i)} disabled={regenIdx===i} style={{padding:"3px 8px",borderRadius:6,fontSize:10,fontWeight:500,color:C.gray600,border:"0.5px solid "+C.gray200,background:"#fff",cursor:"pointer",fontFamily:"inherit",flexShrink:0,opacity:regenIdx===i?0.5:1}}>{regenIdx===i?"…":"↺"}</button>
          </div>
          <textarea value={answers[i]||""} onChange={e=>{const v=e.target.value;setAnswers(p=>({...p,[i]:v}));}} placeholder="Votre réponse…" rows={2} style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"0.5px solid "+C.gray200,fontSize:12,resize:"none",outline:"none",fontFamily:"inherit",background:C.gray50}}/>
        </div>)}
        <Btn onClick={enrich} disabled={loadE} full>{loadE?"Réécriture…":"✦ Réécrire avec mon vécu"}</Btn>
      </div>}
    </div>
    <div style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"10px 16px",borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fff",flexShrink:0,borderTop:enriched?"3px solid "+C.green:"none"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:12,fontWeight:500,color:enriched?C.green:C.gray900}}>Post enrichi</span>{enriched&&<CharBadge n={enriched.length}/>}</div>
        {enriched&&<div style={{display:"flex",gap:10}}><IBtn onClick={()=>navigator.clipboard.writeText(enriched)} color={C.navy}>Copier</IBtn><IBtn onClick={()=>{onSavePost({content:enriched,axis:"",tone:"",style:""});showToast("✓ Post sauvegardé");}} color={C.green}>💾 Sauver</IBtn></div>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"1.5rem 2rem"}}>
        {enriched?<p style={{fontSize:13,lineHeight:1.85,color:C.gray900,whiteSpace:"pre-wrap",maxWidth:580,margin:"0 auto"}}>{enriched}</p>:<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:12}}><div style={{width:40,height:40,borderRadius:"50%",border:"1.5px solid "+C.gray200,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:14,height:14,borderRadius:"50%",background:C.navy,opacity:0.25}}/></div><p style={{fontSize:12,color:C.gray400,textAlign:"center",lineHeight:1.5}}>Le post enrichi<br/>apparaîtra ici</p></div>}
      </div>
      {enriched&&<div style={{padding:"10px 16px",borderTop:"0.5px solid "+C.gray200,display:"flex",gap:6,background:"#fff",flexShrink:0,flexWrap:"wrap"}}>
        <Pill onClick={enrich} disabled={loadE}>↺ Regénérer</Pill>
        <Pill onClick={()=>onGoAnalyser(enriched)}>→ Analyser</Pill>
        <Pill onClick={()=>onGoOptimiser(enriched)}>→ Optimiser</Pill>
      </div>}
    </div>
  </div>;
}

// ─── ANALYSER ─────────────────────────────────────────────────────
function AnalyserTab({analyserPost,setAnalyserPost,analysis,setAnalysis,onSavePost,showToast,onGoOptimiser}) {
  const [loading,setLoading]=useState(false);
  async function analyze() {
    if (!analyserPost) return; setLoading(true); setAnalysis(null);
    let attempts=0;
    while (attempts<3) {
      try {
        const sys='Tu es expert LinkedIn. Réponds UNIQUEMENT avec un objet JSON valide, sans texte avant ou après, sans markdown. Format : {"score":7,"hook":{"note":6,"comment":"..."},"structure":{"note":7,"comment":"..."},"ton":{"note":8,"comment":"..."},"longueur":{"note":5,"comment":"..."},"points_forts":["..."],"points_faibles":["..."],"recommandations":["..."]}';
        const p=parseJSON(await callClaude("Analyse ce post LinkedIn et retourne UNIQUEMENT le JSON :\n\n"+analyserPost,sys,1200));
        if (p?.score!==undefined) { setAnalysis(p); setLoading(false); return; }
      } catch(e) { if(attempts===2) showToast("⚠️ "+e.message); }
      attempts++;
    }
    showToast("⚠️ Analyse échouée, réessayez"); setLoading(false);
  }
  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",height:"100%",overflow:"hidden"}}>
    <div style={{background:"#fff",borderRight:"0.5px solid "+C.gray200,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"10px 16px",borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <span style={{fontSize:12,fontWeight:500}}>Post à analyser</span><CharBadge n={analyserPost.length}/>
      </div>
      <div style={{flex:1,padding:"1rem 1.25rem",overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <textarea value={analyserPost} onChange={e=>{setAnalyserPost(e.target.value);setAnalysis(null);}} placeholder="Collez votre post ici…" style={{flex:1,width:"100%",padding:"9px 12px",borderRadius:8,border:"0.5px solid "+C.gray200,fontSize:13,resize:"none",outline:"none",fontFamily:"inherit",background:C.gray50,lineHeight:1.8}}/>
      </div>
      <div style={{padding:"10px 16px",borderTop:"0.5px solid "+C.gray200,flexShrink:0}}>
        <Btn onClick={analyze} disabled={!analyserPost||loading} full>{loading?"Analyse…":"Analyser ce post"}</Btn>
      </div>
    </div>
    <div style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {!analysis?<div style={{display:"flex",alignItems:"center",justifyContent:"center",flex:1}}><p style={{fontSize:13,color:C.gray400}}>Les résultats apparaîtront ici.</p></div>:
        <React.Fragment>
          <div style={{padding:"14px 16px",borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",gap:16,flexShrink:0,background:"#fff"}}>
            <div style={{textAlign:"center",flexShrink:0}}>
              <p style={{fontSize:10,color:C.gray400,marginBottom:2}}>Score</p>
              <span style={{fontSize:32,fontWeight:500,color:analysis.score>=7?C.green:analysis.score>=5?C.amber:C.red,lineHeight:1}}>{analysis.score}<span style={{fontSize:13,color:C.gray400}}>/10</span></span>
            </div>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:5}}>
              {[{k:"hook",l:"Hook"},{k:"structure",l:"Structure"},{k:"ton",l:"Ton"},{k:"longueur",l:"Longueur"}].map(x=>analysis[x.k]?<div key={x.k}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:11,fontWeight:500}}>{x.l}</span><span style={{fontSize:11,fontWeight:500,color:analysis[x.k].note>=7?C.green:analysis[x.k].note>=5?C.amber:C.red}}>{analysis[x.k].note}/10</span></div>
                <div style={{height:3,background:C.gray100,borderRadius:10}}><div style={{height:3,borderRadius:10,width:(analysis[x.k].note*10)+"%",background:analysis[x.k].note>=7?C.green:analysis[x.k].note>=5?C.amber:C.red}}/></div>
              </div>:null)}
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:10}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {analysis.points_forts?.length>0&&<div style={{background:"#F0FDF4",borderRadius:8,padding:10}}><p style={{fontSize:10,fontWeight:500,color:"#15803D",marginBottom:5}}>Points forts</p>{analysis.points_forts.map((p,i)=><p key={i} style={{fontSize:11,color:"#166534",marginBottom:2}}>· {p}</p>)}</div>}
              {analysis.points_faibles?.length>0&&<div style={{background:"#FEF2F2",borderRadius:8,padding:10}}><p style={{fontSize:10,fontWeight:500,color:"#B91C1C",marginBottom:5}}>À améliorer</p>{analysis.points_faibles.map((p,i)=><p key={i} style={{fontSize:11,color:"#991B1B",marginBottom:2}}>· {p}</p>)}</div>}
            </div>
            {analysis.recommandations?.length>0&&<div style={{background:C.gray50,borderRadius:8,padding:10}}>
              <p style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".05em",marginBottom:7}}>Recommandations</p>
              {analysis.recommandations.map((r,i)=><p key={i} style={{fontSize:12,color:C.gray900,marginBottom:5}}>{i+1}. {r}</p>)}
            </div>}
          </div>
          <div style={{padding:"12px 16px",borderTop:"2px solid "+C.navy,background:"#fff",flexShrink:0,display:"flex",alignItems:"center",gap:8,boxShadow:"0 -4px 12px rgba(30,58,95,0.08)"}}>
            <Btn variant="secondary" onClick={()=>{onSavePost({content:analyserPost,axis:"",tone:"",style:""});showToast("✓ Post sauvegardé");}}>💾 Sauver</Btn>
            <Btn onClick={()=>onGoOptimiser(analyserPost)}>→ Optimiser</Btn>
          </div>
        </React.Fragment>
      }
    </div>
  </div>;
}

// ─── OPTIMISER ────────────────────────────────────────────────────
function OptimiserTab({optimiserPost,setOptimiserPost,onSavePost,showToast,onGoAnalyser,profile}) {
  const [selAxes,   setSelAxes]   = useState([]);
  const [freeInst,  setFreeInst]  = useState("");
  const [optimPost, setOptimPost] = useState("");
  const [loading,   setLoading]   = useState(false);
  async function optimize() {
    if (!optimiserPost) return; setLoading(true);
    try {
      const desc=selAxes.map(id=>{const a=OPTIM_AXES.find(x=>x.id===id);return a?"- "+a.label+" : "+a.desc:"";}).filter(Boolean).join("\n");
      const instr=[desc,freeInst.trim()].filter(Boolean).join("\n\nInstruction libre :\n")||"Améliore globalement.";
      setOptimPost(await callClaude("Optimise :\n"+instr+"\n\nPost :\n"+optimiserPost,LINKEDIN_RULES,1200));
    } catch(e) { showToast("⚠️ "+e.message); }
    setLoading(false);
  }
  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",height:"100%",overflow:"hidden"}}>
    <div style={{background:"#fff",borderRight:"0.5px solid "+C.gray200,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto",padding:"1.25rem",display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <div style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Axes d'optimisation</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>

// ─── CRÉER ────────────────────────────────────────────────────────
function CreerTab({profile,selectedAxes,prefill,onSavePost,showToast,onMarkDone}) {
  const [active,        setActive]        = useState("generer");
  const [genPost,       setGenPost]       = useState("");
  const [basePost,      setBasePost]      = useState("");
  const [enriched,      setEnriched]      = useState("");
  const [analyserPost,  setAnalyserPost]  = useState("");
  const [analysis,      setAnalysis]      = useState(null);
  const [optimiserPost, setOptimiserPost] = useState("");
  const TABS=[{id:"generer",label:"Générer"},{id:"interview",label:"Interview"},{id:"analyser",label:"Analyser"},{id:"optimiser",label:"Optimiser"}];
  const goInterview  = p=>{ setBasePost(p);     setActive("interview"); };
  const goAnalyser   = p=>{ setAnalyserPost(p); setAnalysis(null); setActive("analyser"); };
  const goOptimiser  = p=>{ setOptimiserPost(p);setActive("optimiser"); };
  return <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 56px)",overflow:"hidden"}}>
    <SubTabs tabs={TABS} active={active} onChange={setActive}/>
    <div style={{flex:1,overflow:"hidden"}}>
      {active==="generer"   && <GenererTab   key={prefill?.roadmapSug?.week||"gen"} profile={profile} selectedAxes={selectedAxes} prefill={prefill} onSavePost={onSavePost} showToast={showToast} post={genPost} setPost={setGenPost} onGoInterview={goInterview} onGoAnalyser={goAnalyser} onGoOptimiser={goOptimiser} onMarkDone={onMarkDone}/>}
      {active==="interview" && <InterviewTab basePost={basePost} setBasePost={setBasePost} enriched={enriched} setEnriched={setEnriched} onSavePost={onSavePost} showToast={showToast} onGoAnalyser={goAnalyser} onGoOptimiser={goOptimiser}/>}
      {active==="analyser"  && <AnalyserTab  analyserPost={analyserPost} setAnalyserPost={setAnalyserPost} analysis={analysis} setAnalysis={setAnalysis} onSavePost={onSavePost} showToast={showToast} onGoOptimiser={goOptimiser}/>}
      {active==="optimiser" && <OptimiserTab optimiserPost={optimiserPost} setOptimiserPost={setOptimiserPost} onSavePost={onSavePost} showToast={showToast} onGoAnalyser={goAnalyser} profile={profile}/>}
    </div>
  </div>;
}

// ─── INSIGHTS ─────────────────────────────────────────────────────
function InsightsTab({insights,posts,onAddInsight,onDeleteInsight,showToast}) {
  const [selPost,  setSelPost]  = useState("");
  const [metrics,  setMetrics]  = useState({impressions:"",likes:"",comments:""});
  const [analysis, setAnalysis] = useState("");
  const [loading,  setLoading]  = useState(false);
  const engRate=metrics.impressions?(((+metrics.likes||0)+(+metrics.comments||0))/+metrics.impressions*100).toFixed(1):null;
  const avgImp=insights.length?Math.round(insights.reduce((s,i)=>s+(+i.impressions||0),0)/insights.length):null;
  const avgEng=insights.length?(insights.reduce((s,i)=>{ const e=i.impressions?(((+i.likes||0)+(+i.comments||0))/+i.impressions*100):0; return s+e; },0)/insights.length).toFixed(1):null;

  async function analyze() {
    if (!selPost.trim()||!metrics.impressions) return;
    setLoading(true);
    try {
      const hist=insights.slice(0,5).map(i=>`- imp:${i.impressions} likes:${i.likes} comm:${i.comments} | extrait: "${i.postSnippet?.slice(0,80)}"`).join("\n");
      const prompt=`Analyse les performances de ce post LinkedIn publié.

POST :
${selPost}

PERFORMANCES :
- Impressions : ${metrics.impressions}
- Likes : ${metrics.likes}
- Commentaires : ${metrics.comments}
- Taux d'engagement : ${engRate||"—"}%
${hist?"\nHISTORIQUE DES POSTS PRÉCÉDENTS :\n"+hist:""}

Analyse ce qui a fonctionné ou non dans ce post : hook, longueur, ton, structure, angle. Donne des enseignements concrets pour les prochains posts. Ne régénère PAS le post. Sois direct et actionnable.`;
      setAnalysis(await callClaude(prompt,"Tu es expert LinkedIn. Analyse les performances d'un post publié et donne des enseignements concrets. Tu NE régénères PAS le post.",800));
      onAddInsight({postSnippet:selPost.slice(0,200),impressions:metrics.impressions,likes:metrics.likes,comments:metrics.comments,engRate:engRate||"0"});
      showToast("✓ Insight enregistré");
    } catch(e) { showToast("⚠️ "+e.message); }
    setLoading(false);
  }

  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",height:"calc(100vh - 56px)"}}>
    <div style={{padding:"1.5rem",background:"#fff",borderRight:"0.5px solid "+C.gray200,overflowY:"auto",display:"flex",flexDirection:"column",gap:14}}>
      <div>
        <p style={{fontSize:15,fontWeight:500,color:C.gray900,marginBottom:4}}>Insights J+7</p>
        <p style={{fontSize:12,color:C.gray400,lineHeight:1.5}}>Renseignez les performances d'un post publié pour enrichir votre stratégie.</p>
      </div>

      <div style={{border:"0.5px solid "+C.gray200,borderRadius:10,overflow:"hidden"}}>
        <div style={{padding:"8px 12px",background:C.gray50,borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:18,height:18,borderRadius:"50%",background:C.navy,color:"#fff",fontSize:9,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center"}}>1</div>
          <span style={{fontSize:11,fontWeight:500}}>Choisir le post publié</span>
        </div>
        {selPost?<div style={{padding:"10px 12px",background:C.navyLight,borderLeft:"3px solid "+C.navy}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <p style={{fontSize:12,fontWeight:500,color:C.navy,lineHeight:1.5,flex:1}}>{selPost.slice(0,120)}{selPost.length>120?"…":""}</p>
            <button onClick={()=>{setSelPost("");setAnalysis("");}} style={{fontSize:11,color:C.navy,background:"none",border:"none",cursor:"pointer",fontWeight:500,flexShrink:0,marginLeft:8,fontFamily:"inherit"}}>Changer →</button>
          </div>
        </div>:<div style={{padding:"10px 12px"}}>
          {posts.length>0&&<select value="" onChange={e=>setSelPost(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"0.5px solid "+C.gray200,fontSize:12,marginBottom:8,background:C.gray50,outline:"none",color:C.gray900,fontFamily:"inherit"}}>
            <option value="">Choisir un post sauvegardé…</option>
            {posts.map(p=><option key={p.id} value={p.content}>{p.axis?"["+p.axis+"] ":""}{p.date} — {p.content.slice(0,50)}…</option>)}
          </select>}
          <textarea value={selPost} onChange={e=>setSelPost(e.target.value)} placeholder="Ou collez votre post ici…" rows={3} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"0.5px solid "+C.gray200,fontSize:12,resize:"vertical",outline:"none",fontFamily:"inherit",background:C.gray50,lineHeight:1.6}}/>
        </div>}
      </div>

      <div style={{border:"0.5px solid "+C.gray200,borderRadius:10,overflow:"hidden"}}>
        <div style={{padding:"8px 12px",background:C.gray50,borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:18,height:18,borderRadius:"50%",background:C.navy,color:"#fff",fontSize:9,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center"}}>2</div>
          <span style={{fontSize:11,fontWeight:500}}>Performances J+7</span>
        </div>
        <div style={{padding:"10px 12px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
            {[{l:"Impressions",k:"impressions"},{l:"Likes",k:"likes"},{l:"Commentaires",k:"comments"}].map(x=><div key={x.k}>
              <p style={{fontSize:11,color:C.gray600,marginBottom:4}}>{x.l}</p>
              <input type="number" min="0" value={metrics[x.k]} onChange={e=>{const v=e.target.value;setMetrics(m=>({...m,[x.k]:v}));}} placeholder="0" style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"0.5px solid "+C.gray200,fontSize:13,outline:"none",fontFamily:"inherit",background:C.gray50}}/>
            </div>)}
          </div>
          {engRate&&<div style={{padding:"6px 10px",background:C.gray50,borderRadius:8,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,color:C.gray600}}>Taux d'engagement</span><span style={{fontSize:13,fontWeight:500,color:C.green}}>{engRate}%</span></div>}
        </div>
      </div>

      <Btn full onClick={analyze} disabled={!selPost.trim()||!metrics.impressions||loading}>{loading?"Analyse…":"📊 Analyser les performances"}</Btn>

      {analysis&&<div style={{background:C.navyLight,borderRadius:8,padding:14,border:"0.5px solid "+C.navyMid}}>
        <p style={{fontSize:11,fontWeight:500,color:C.navy,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Enseignements</p>

              <IBtn onClick={()=>onDeleteInsight(ins.id)} color={C.red}>Suppr.</IBtn>
            </div>
            <div style={{padding:"8px 12px",borderBottom:"0.5px solid "+C.gray200}}>
              <p style={{fontSize:11,color:C.gray400,fontStyle:"italic",lineHeight:1.4}}>{ins.postSnippet}…</p>
            </div>
            <div style={{padding:"8px 12px",display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
              {[{l:"Vues",v:ins.impressions},{l:"Likes",v:ins.likes},{l:"Comm.",v:ins.comments},{l:"Eng.",v:ins.engRate?ins.engRate+"%":(eng?eng+"%":"—"),g:true}].map(x=><div key={x.l} style={{background:C.gray50,borderRadius:6,padding:"6px 4px",textAlign:"center"}}><p style={{fontSize:10,color:C.gray400}}>{x.l}</p><p style={{fontSize:13,fontWeight:500,color:x.g?C.green:C.gray900}}>{x.v||"—"}</p></div>)}
            </div>
          </div>;
        })
      }
    </div>
  </div>;
}

// ─── APP SHELL ────────────────────────────────────────────────────
function AppShell() {
  const auth       = useAuth();
  const toastTimer = useRef(null);
  const saveTimer  = useRef(null);

  const [toast,        setToast]        = useState("");
  const [dataLoaded,   setDataLoaded]   = useState(false);
  const [activeTab,    setActiveTab]    = useState("profil");
  const [profile,      setProfile]      = useState(null);
  const [axesSessions, setAxesSessions] = useState([]);
  const [favAxes,      setFavAxes]      = useState([]);
  const [selectedAxes, setSelectedAxes] = useState([]);
  const [roadmaps,     setRoadmaps]     = useState([]);
  const [activeRmId,   setActiveRmId]   = useState(null);
  const [pubWeeks,     setPubWeeks]     = useState({});
  const [posts,        setPosts]        = useState([]);
  const [insights,     setInsights]     = useState([]);
  const [creerPrefill, setCreerPrefill] = useState(null);

  function showToast(m) { clearTimeout(toastTimer.current); setToast(m); toastTimer.current=setTimeout(()=>setToast(""),2800); }

  // Chargement
  useEffect(()=>{
    if (!auth.user||dataLoaded) return;
    const failsafe=setTimeout(()=>setDataLoaded(true),6000);
    loadUserData().then(d=>{
      clearTimeout(failsafe);
      if (d&&Object.keys(d).length>0) {
        if(d.profile)      setProfile(d.profile);
        if(d.axesSessions) setAxesSessions(d.axesSessions);
        if(d.favAxes)      setFavAxes(d.favAxes);
        if(d.selectedAxes) setSelectedAxes(d.selectedAxes);
        if(d.roadmaps)     setRoadmaps(d.roadmaps);
        if(d.activeRmId)   setActiveRmId(d.activeRmId);
        if(d.pubWeeks) {
          // Migration : ancien format tableau → nouveau format objet par roadmap
          if (Array.isArray(d.pubWeeks)) {
            // Ignore l'ancien format, repart à zéro proprement
            setPubWeeks({});
          } else if (typeof d.pubWeeks === 'object') {
            setPubWeeks(d.pubWeeks);
          }
        }
        if(d.posts)        setPosts(d.posts);
        if(d.insights)     setInsights(d.insights);
        showToast("✓ Données chargées");
      }
      setDataLoaded(true);
    }).catch(()=>{ clearTimeout(failsafe); setDataLoaded(true); });
  },[auth.user]);

  // Sauvegarde auto debounced
  useEffect(()=>{
    if (!dataLoaded) return;
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      saveUserData({profile,axesSessions,favAxes,selectedAxes,roadmaps,activeRmId,pubWeeks,posts,insights});
    },800);
    return ()=>clearTimeout(saveTimer.current);
  },[profile,axesSessions,favAxes,selectedAxes,roadmaps,activeRmId,pubWeeks,posts,insights,dataLoaded]);

  function createRoadmap() {
    const rm={id:uid(),name:"Roadmap "+(roadmaps.length+1),createdAt:toDay(),weeks:[]};
    setRoadmaps(p=>[...p,rm]); setActiveRmId(rm.id); return rm;
  }
  function deleteAxis(id) {
    setAxesSessions(p=>p.map(s=>({...s,axes:s.axes.filter(a=>a.id!==id)})).filter(s=>s.axes.length>0));
    setSelectedAxes(p=>p.filter(a=>a.id!==id));
    setFavAxes(p=>p.filter(x=>x!==id));
  }

  if (!dataLoaded&&auth.user) return <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,color:C.gray400}}>
    <div style={{width:32,height:32,borderRadius:8,background:C.navy,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:8,height:8,borderRadius:"50%",background:"#fff"}}/></div>
    <p style={{fontSize:13}}>Chargement de vos données…</p>
  </div>;

  return <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <Toast message={toast}/>
    <NavBar activeTab={activeTab} onTabChange={setActiveTab} postCount={posts.length} insightCount={insights.length}/>
    <main style={{flex:1,overflow:"hidden"}}>
      {activeTab==="profil"  && <ProfilTab profile={profile} onSave={p=>{setProfile(p);showToast("✓ Profil sauvegardé");}} showToast={showToast} onAxesGenerated={s=>{setAxesSessions(p=>[s,...p]);showToast("✓ 6 axes générés !");setActiveTab("axes");}}/>}
      {activeTab==="axes"    && <AxesTab
        axesSessions={axesSessions} favAxes={favAxes} selectedAxes={selectedAxes}
        onToggleAxis={a=>setSelectedAxes(p=>p.find(x=>x.id===a.id)?p.filter(x=>x.id!==a.id):[...p,a])}
        onToggleFav={id=>setFavAxes(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id])}
        onDeleteAxis={deleteAxis}
        onAxesGenerated={s=>{setAxesSessions(p=>[s,...p]);showToast("✓ Axes générés !");}}
        profile={profile} showToast={showToast}
        onGoRoadmap={()=>setActiveTab("roadmap")}
      />}
      {activeTab==="roadmap" && <RoadmapTab
        roadmaps={roadmaps}
        activeRmId={activeRmId}
        selectedAxes={selectedAxes}
        profile={profile}
        pubWeeks={new Set(pubWeeks[activeRmId]||[])}
        showToast={showToast}
        onSetActive={setActiveRmId}
        onNewRoadmap={createRoadmap}
        onRenameRoadmap={id=>{ const n=window.prompt("Nouveau nom :"); if(n?.trim()) setRoadmaps(p=>p.map(r=>r.id===id?{...r,name:n.trim()}:r)); }}
        onDeleteRoadmap={id=>{ setRoadmaps(p=>{ const nx=p.filter(r=>r.id!==id); if(activeRmId===id) setActiveRmId(nx[0]?.id||null); return nx; }); }}
        onRoadmapGenerated={rm=>{ setRoadmaps(p=>[...p,rm]); setActiveRmId(rm.id); showToast("✓ Roadmap générée !"); }}
        onRoadmapUpdated={(id,weeks,dur)=>{ setRoadmaps(p=>p.map(r=>r.id===id?{...r,weeks,dur,name:"Roadmap "+dur+"m — "+toDay()}:r)); showToast("✓ Roadmap générée !"); }}
        onWeekUpdated={w=>{ setRoadmaps(p=>p.map(r=>r.id===activeRmId?{...r,weeks:r.weeks.map(x=>x.week===w.week?{...w}:x)}:r)); }}
        onGoCreer={w=>{ setCreerPrefill({axis:selectedAxes.find(a=>a.title===w.axis)||selectedAxes[0]||null, tone:w.tone, style:w.style, roadmapSug:w}); setActiveTab("creer"); }}
      />}
      {activeTab==="creer"   && <CreerTab
        profile={profile}
        selectedAxes={selectedAxes}
        prefill={creerPrefill}
        onSavePost={p=>{ setPosts(prev=>[{...p,id:uid(),date:toDay()},...prev]); showToast("✓ Post sauvegardé"); }}
        showToast={showToast}
        onMarkDone={weekNum=>setPubWeeks(p=>new Set([...p,Number(weekNum)]))}
      />}
      {activeTab==="mesposts" && <MesPostsTab posts={posts} onDelete={id=>setPosts(p=>p.filter(x=>x.id!==id))} onAdd={p=>setPosts(prev=>[{...p,id:uid(),date:toDay()},...prev])}/>}
      {activeTab==="insights" && <InsightsTab insights={insights} posts={posts} onAddInsight={i=>setInsights(p=>[{...i,id:uid(),date:toDay()},...p])} onDeleteInsight={id=>setInsights(p=>p.filter(x=>x.id!==id))} showToast={showToast}/>}
    </main>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <AuthProvider><ProtectedRoute><AppShell/></ProtectedRoute></AuthProvider>
);
</script>
</body>
</html>
