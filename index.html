<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Strategy AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
body { font-family: Inter, system-ui, -apple-system, sans-serif; background: #F5F7FA; color: #0F172A; font-size: 14px; line-height: 1.5; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── CONFIG ────────────────────────────────────────────────────────
const PROXY = "/.netlify/functions/claude";
const MODEL  = "claude-sonnet-4-20250514";

const LINKEDIN_RULES = `Tu es un expert copywriting LinkedIn. Règles absolues :
- 800 à 1500 caractères, jamais de blocs denses
- Hook fort sur les 2 premières lignes (court, clivant, zéro jargon)
- 1 idée par ligne, sauts de ligne fréquents
- Ton direct, conversationnel, position assumée
- Pas de hashtags dans le corps, max 3 à la toute fin
Réponds uniquement avec le texte du post, sans commentaire.`;

const TONES  = ["Inspirant","Éducatif","Provocateur","Authentique","Expert"];
const STYLES = ["Storytelling","Liste / Tips","Opinion tranchée","Étude de cas","Question ouverte"];
const DURATIONS = [3,6,9,12,15,18];
const OPTIM_AXES = [
  {id:"hook",    label:"🎣 Hook",        desc:"Rendre les 2 premières lignes irrésistibles"},
  {id:"lisib",   label:"👁 Lisibilité",  desc:"Aérer, 1 idée par ligne"},
  {id:"ton",     label:"🎙 Ton direct",  desc:"Plus conversationnel"},
  {id:"cta",     label:"🚀 CTA",         desc:"Punchline finale plus forte"},
  {id:"short",   label:"✂️ Raccourcir",  desc:"Réduire à l'essentiel"},
  {id:"long",    label:"📝 Développer",  desc:"Enrichir avec un insight"},
  {id:"punch",   label:"⚡ Percutant",   desc:"Ton plus clivant"},
  {id:"story",   label:"📖 Storytelling",desc:"Transformer en récit"},
];

// ─── HELPERS ───────────────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const today = () => new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});

function parseJSON(txt) {
  if (!txt) return null;
  try { return JSON.parse(txt); } catch {}
  try { return JSON.parse(txt.replace(/```json|```/g,"").trim()); } catch {}
  const m = txt.match(/\{[\s\S]*\}/);
  if (m) try { return JSON.parse(m[0]); } catch {}
  return null;
}

async function callAPI(userMsg, system, maxTokens = 1200) {
  const res = await fetch(PROXY, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: maxTokens,
      system: system || "",
      messages: [{ role: "user", content: userMsg }]
    })
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error((e.error && e.error.message) || `Erreur ${res.status}`);
  }
  const d = await res.json();
  return (d.content && d.content[0] && d.content[0].text) || "";
}

// ─── STORAGE ───────────────────────────────────────────────────────
const SK = "csa_final_v1";
function stoSave(data) { try { localStorage.setItem(SK, JSON.stringify(data)); } catch {} }
function stoLoad() { try { const v = localStorage.getItem(SK); return v ? JSON.parse(v) : null; } catch { return null; } }

// ─── DESIGN TOKENS ────────────────────────────────────────────────
const C = {
  navy:     "#1E3A5F",
  navyLight:"#E8F0FA",
  navyMid:  "#A8C0DC",
  green:    "#10B981",
  amber:    "#F59E0B",
  red:      "#EF4444",
  gray50:   "#F8FAFC",
  gray100:  "#F1F5F9",
  gray200:  "#E2E8F0",
  gray400:  "#94A3B8",
  gray600:  "#475569",
  gray900:  "#0F172A",
};

// ─── UI PRIMITIVES ─────────────────────────────────────────────────
const sx = (base, ...more) => Object.assign({}, base, ...more.filter(Boolean));

function Btn({ onClick, disabled, children, variant="primary", sm, full, style }) {
  const base = {
    display: "inline-flex", alignItems: "center", gap: 6,
    padding: sm ? "6px 12px" : "9px 18px",
    borderRadius: 8, fontWeight: 600,
    fontSize: sm ? 12 : 13, cursor: disabled ? "not-allowed" : "pointer",
    whiteSpace: "nowrap", border: "none", transition: "opacity 0.15s",
    width: full ? "100%" : "auto", justifyContent: full ? "center" : "flex-start",
  };
  const variants = {
    primary:   { background: disabled ? "#C7D2FE" : C.navy, color: "#fff" },
    secondary: { background: C.gray100, color: C.gray600, border: `0.5px solid ${C.gray200}` },
    ghost:     { background: "transparent", color: C.navy, border: `0.5px solid ${C.navyMid}` },
    danger:    { background: "#FEF2F2", color: C.red, border: `0.5px solid #FCA5A5` },
    success:   { background: "#F0FDF4", color: "#15803D", border: "0.5px solid #86EFAC" },
  };
  return <button onClick={onClick} disabled={!!disabled} style={sx(base, variants[variant] || variants.primary, style)}>{children}</button>;
}

function Card({ children, style }) {
  return <div style={sx({ background: "#fff", borderRadius: 10, border: `0.5px solid ${C.gray200}`, padding: "1rem", marginBottom: 10 }, style)}>{children}</div>;
}

function Field({ label, value, onChange, placeholder, rows, style }) {
  const base = { width: "100%", padding: "9px 12px", borderRadius: 8, border: `0.5px solid ${C.gray200}`, fontSize: 13, outline: "none", color: C.gray900, fontFamily: "inherit", background: C.gray50 };
  return (
    <div style={{ marginBottom: 12, ...style }}>
      {label && <div style={{ fontSize: 12, fontWeight: 500, color: C.gray600, marginBottom: 4 }}>{label}</div>}
      {rows
        ? <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{ ...base, resize: "vertical", lineHeight: 1.6 }} />
        : <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={base} />
      }
    </div>
  );
}

function Tag({ label, active, onClick }) {
  return (
    <span onClick={onClick} style={{
      display: "inline-block", padding: "5px 12px", borderRadius: 20, fontSize: 12,
      border: `1.5px solid ${active ? C.navy : C.gray200}`,
      background: active ? C.navyLight : "#fff",
      color: active ? C.navy : C.gray600,
      cursor: "pointer", fontWeight: active ? 600 : 400, margin: "3px 3px 3px 0",
    }}>{label}</span>
  );
}

function CharBadge({ n }) {
  if (!n) return null;
  const c = n < 300 ? C.red : n <= 600 ? C.amber : n <= 1500 ? C.green : C.red;
  const l = n < 300 ? "Trop court" : n <= 600 ? "Court ✓" : n <= 1500 ? "Sweet spot ✓" : "Trop long";
  return <span style={{ fontSize: 11, fontWeight: 600, color: c, background: c+"18", padding: "2px 8px", borderRadius: 6 }}>{n} — {l}</span>;
}

function Toast({ msg }) {
  if (!msg) return null;
  return (
    <div style={{ position: "fixed", top: 16, right: 16, background: C.gray900, color: "#fff", padding: "10px 16px", borderRadius: 10, fontSize: 13, fontWeight: 500, zIndex: 9999, maxWidth: 300, boxShadow: "0 4px 20px rgba(0,0,0,0.15)" }}>
      {msg}
    </div>
  );
}

function Empty({ icon, text, btnLabel, onBtn }) {
  return (
    <div style={{ textAlign: "center", padding: "48px 24px" }}>
      <div style={{ fontSize: 36, marginBottom: 12 }}>{icon}</div>
      <p style={{ color: C.gray400, fontSize: 14, marginBottom: 16 }}>{text}</p>
      {onBtn && <Btn onClick={onBtn}>{btnLabel}</Btn>}
    </div>
  );
}

// ─── LOGO SVG ──────────────────────────────────────────────────────
function LogoIcon({ size = 14, color = "white" }) {
  return (
    <svg viewBox="0 0 16 16" fill="none" width={size} height={size}>
      <circle cx="8" cy="8" r="2.2" fill={color}/>
      {[[8,1.5,8,4],[8,12,8,14.5],[1.5,8,4,8],[12,8,14.5,8],[3.6,3.6,5.4,5.4],[10.6,10.6,12.4,12.4],[12.4,3.6,10.6,5.4],[5.4,10.6,3.6,12.4]].map(([x1,y1,x2,y2],i) => (
        <path key={i} d={`M${x1} ${y1}L${x2} ${y2}`} stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
      ))}
    </svg>
  );
}

// ─── NAV ───────────────────────────────────────────────────────────
const NAV_ITEMS = [
  { id: "profil",    icon: "👤", label: "Profil" },
  { id: "axes",      icon: "🎯", label: "Axes" },
  { id: "roadmap",   icon: "🗓", label: "Roadmap" },
  { id: "creer",     icon: "✦",  label: "Créer" },
  { id: "mesposts",  icon: "💾", label: "Mes Posts" },
  { id: "insights",  icon: "📊", label: "Insights" },
];

function NavBar({ tab, setTab, profile, postCount, insightCount, onProfileClick }) {
  return (
    <nav style={{ height: 56, borderBottom: `0.5px solid ${C.gray200}`, display: "flex", alignItems: "center", padding: "0 1.25rem", gap: "0.75rem", background: "#fff", flexShrink: 0 }}>
      {/* Logo */}
      <div style={{ display: "flex", alignItems: "center", gap: 9, flexShrink: 0, marginRight: 8 }}>
        <div style={{ width: 32, height: 32, borderRadius: 9, background: C.navy, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <LogoIcon />
        </div>
        <div>
          <div style={{ fontSize: 13, fontWeight: 500, color: C.gray900, lineHeight: 1 }}>Content Strategy AI</div>
          <div style={{ fontSize: 10, color: C.gray400, marginTop: 1 }}>Powered by Claude</div>
        </div>
      </div>
      {/* Pills */}
      <div style={{ display: "flex", gap: 2, flex: 1, flexWrap: "nowrap", overflowX: "auto" }}>
        {NAV_ITEMS.map(item => {
          const isOn = tab === item.id;
          const count = item.id === "mesposts" ? postCount : item.id === "insights" ? insightCount : 0;
          return (
            <button key={item.id} onClick={() => setTab(item.id)} style={{
              padding: "5px 12px", borderRadius: 20, fontSize: 12,
              background: isOn ? C.navyLight : "transparent",
              color: isOn ? C.navy : C.gray400,
              fontWeight: isOn ? 600 : 400,
              whiteSpace: "nowrap", border: "none", cursor: "pointer",
              display: "flex", alignItems: "center", gap: 4,
            }}>
              {item.icon} {item.label}
              {count > 0 && <span style={{ background: C.navy, color: "#fff", borderRadius: 10, padding: "1px 5px", fontSize: 9 }}>{count}</span>}
            </button>
          );
        })}
      </div>
      {/* Profile */}
      <button onClick={onProfileClick} style={{ display: "flex", alignItems: "center", gap: 7, padding: "5px 10px", borderRadius: 10, border: `0.5px solid ${C.gray200}`, background: "#fff", cursor: "pointer", flexShrink: 0 }}>
        <div style={{ width: 24, height: 24, borderRadius: "50%", background: C.navy, color: "#fff", fontSize: 9, fontWeight: 600, display: "flex", alignItems: "center", justifyContent: "center" }}>
          {profile?.name ? profile.name[0].toUpperCase() : "?"}
        </div>
        <span style={{ fontSize: 12, color: C.gray900, maxWidth: 100, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{profile?.name || "Profil"}</span>
        <span style={{ fontSize: 10, color: C.gray400 }}>▾</span>
      </button>
    </nav>
  );
}

// ─── PROFIL TAB ────────────────────────────────────────────────────
function ProfilTab({ profile, onSave, onGenAxes, loading }) {
  const [name, setName] = useState(profile?.name || "");
  const [vision, setVision] = useState(profile?.vision || "");
  const [context, setContext] = useState(profile?.context || "");
  useEffect(() => { setName(profile?.name||""); setVision(profile?.vision||""); setContext(profile?.context||""); }, [profile]);
  const ok = name.trim() && vision.trim() && context.trim();
  return (
    <div style={{ maxWidth: 600, margin: "0 auto", padding: "1.5rem" }}>
      <Card>
        <div style={{ fontSize: 16, fontWeight: 500, marginBottom: 4 }}>👤 {profile?.name || "Votre profil"}</div>
        <p style={{ fontSize: 12, color: C.gray400, marginBottom: 18 }}>Ces informations personnalisent tous les contenus générés.</p>
        <Field label="Nom / marque" value={name} onChange={setName} placeholder="Ex: Nicolas Girodet" />
        <Field label="Vision" value={vision} onChange={setVision} placeholder="Ex: Transformer les ESN en acteurs de l'IA" rows={3} />
        <Field label="Contexte" value={context} onChange={setContext} placeholder="Ex: CEO d'une ESN de 80 consultants, 10 ans d'expérience" rows={3} />
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 4 }}>
          <Btn variant="primary" onClick={() => onSave({ name, vision, context })} disabled={!ok}>💾 Sauvegarder</Btn>
          <Btn variant="secondary" onClick={() => onGenAxes({ name, vision, context })} disabled={!ok || loading === "axes"}>
            {loading === "axes" ? "Génération…" : "→ Générer mes axes"}
          </Btn>
        </div>
      </Card>
    </div>
  );
}

// ─── AXES TAB ──────────────────────────────────────────────────────
function AxesTab({ axesSessions, favAxes, selectedAxes, onToggle, onToggleFav, onRegen, onRegenSelected, onGoRoadmap, onGoCreer, loading }) {
  const [mode, setMode] = useState("select"); // select | replace
  const [marked, setMarked] = useState([]);
  const [filter, setFilter] = useState("all"); // all | fav | used | new

  const allAxes = axesSessions.flatMap(s => s.axes);
  const usedIds = new Set(selectedAxes.map(a => a.id));
  const favIds  = new Set(favAxes);

  const filteredSessions = axesSessions.map(s => ({
    ...s,
    axes: s.axes.filter(a => {
      if (filter === "fav")  return favIds.has(a.id);
      if (filter === "used") return usedIds.has(a.id);
      if (filter === "new")  return !usedIds.has(a.id) && !favIds.has(a.id);
      return true;
    })
  })).filter(s => s.axes.length > 0);

  const toggleMark = (a) => setMarked(p => p.find(x => x.id === a.id) ? p.filter(x => x.id !== a.id) : [...p, a]);
  const kept = allAxes.filter(a => !marked.find(x => x.id === a.id));

  return (
    <div style={{ maxWidth: 760, margin: "0 auto", padding: "1.5rem" }}>
      {/* Toolbar */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        <div style={{ display: "flex", gap: 4 }}>
          {[{k:"all",l:`Tous (${allAxes.length})`},{k:"fav",l:"⭐ Favoris"},{k:"used",l:"✓ Sélectionnés"},{k:"new",l:"Nouveaux"}].map(({k,l}) => (
            <button key={k} onClick={() => setFilter(k)} style={{ padding: "4px 10px", borderRadius: 20, fontSize: 11, cursor: "pointer", background: filter===k ? C.navyLight : C.gray100, color: filter===k ? C.navy : C.gray600, border: filter===k ? `0.5px solid ${C.navyMid}` : `0.5px solid ${C.gray200}`, fontWeight: filter===k ? 600 : 400 }}>{l}</button>
          ))}
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
          <button onClick={() => { setMode(m => m === "replace" ? "select" : "replace"); setMarked([]); }} style={{ padding: "4px 10px", borderRadius: 20, fontSize: 11, cursor: "pointer", background: mode==="replace" ? "#FEF3C7" : C.gray100, color: mode==="replace" ? "#92400E" : C.gray600, border: `0.5px solid ${mode==="replace" ? C.amber : C.gray200}` }}>
            {mode==="replace" ? "✕ Annuler" : "↺ Remplacer des axes"}
          </button>
          <Btn sm variant="secondary" onClick={onRegen} disabled={loading==="axes"}>{loading==="axes"?"…":"↺ Regénérer 6 nouveaux"}</Btn>
        </div>
      </div>

      {mode === "replace" && marked.length > 0 && (
        <div style={{ background: "#FEF3C7", border: `0.5px solid ${C.amber}`, borderRadius: 8, padding: "8px 12px", marginBottom: 12, display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 12, color: "#92400E" }}>{marked.length} axe(s) marqué(s) à remplacer</span>
          <Btn sm variant="secondary" onClick={() => onRegenSelected(marked.length, kept)} disabled={loading==="axes"} style={{ marginLeft: "auto" }}>
            {loading==="axes" ? "Génération…" : `↺ Remplacer ${marked.length} axe(s)`}
          </Btn>
        </div>
      )}

      {filteredSessions.length === 0 && <Empty icon="🎯" text="Aucun axe trouvé." />}

      {filteredSessions.map((session, si) => (
        <div key={si} style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 11, fontWeight: 500, color: C.gray400, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
            {session.label}
            <span style={{ background: C.gray100, borderRadius: 10, padding: "1px 6px", fontSize: 10 }}>{session.axes.length}</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 9 }}>
            {session.axes.map(a => {
              const isSel   = usedIds.has(a.id);
              const isFav   = favIds.has(a.id);
              const isMarked = !!marked.find(x => x.id === a.id);
              const border = isMarked ? C.amber : isFav ? C.amber : isSel ? C.navy : C.gray200;
              const bg     = isMarked ? "#FFFBEB" : isSel ? C.navyLight : "#fff";
              return (
                <div key={a.id} style={{ border: `0.5px solid ${border}`, borderRadius: 9, padding: 11, background: bg, cursor: "pointer" }}
                  onClick={() => mode === "replace" ? toggleMark(a) : onToggle(a)}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 4 }}>
                    <span style={{ fontSize: 15 }}>{a.emoji}</span>
                    <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                      {mode !== "replace" && (
                        <span onClick={e => { e.stopPropagation(); onToggleFav(a.id); }} style={{ fontSize: 13, color: isFav ? C.amber : C.gray200, cursor: "pointer" }}>
                          {isFav ? "★" : "☆"}
                        </span>
                      )}
                      {mode === "replace" && isMarked && <span style={{ fontSize: 10, background: C.amber, color: "#fff", borderRadius: 4, padding: "1px 5px" }}>↺</span>}
                      {mode !== "replace" && isSel && (
                        <div style={{ width: 15, height: 15, borderRadius: "50%", background: C.navy, color: "#fff", fontSize: 8, display: "flex", alignItems: "center", justifyContent: "center" }}>✓</div>
                      )}
                    </div>
                  </div>
                  <div style={{ fontSize: 12, fontWeight: 500, color: isSel ? C.navy : isFav ? "#92400E" : C.gray900, marginBottom: 2 }}>{a.title}</div>
                  <div style={{ fontSize: 11, color: C.gray400, lineHeight: 1.3, marginBottom: 6 }}>{a.description}</div>
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                    {isSel && <span style={{ fontSize: 9, padding: "1px 5px", background: "#F0FDF4", color: "#15803D", borderRadius: 3 }}>✓ Sélectionné</span>}
                    {isFav && !isSel && <span style={{ fontSize: 9, padding: "1px 5px", background: "#FEF3C7", color: "#92400E", borderRadius: 3 }}>⭐ Favori</span>}
                    {!isSel && !isFav && <span style={{ fontSize: 9, padding: "1px 5px", background: C.gray100, color: C.gray400, borderRadius: 3 }}>{session.label}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {selectedAxes.length > 0 && mode === "select" && (
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 8 }}>
          <Btn onClick={onGoRoadmap} disabled={loading==="roadmap"}>{loading==="roadmap"?"Génération…":"→ Générer la roadmap"}</Btn>
          <Btn variant="secondary" onClick={onGoCreer}>→ Créer un post directement</Btn>
        </div>
      )}
    </div>
  );
}

// ─── ROADMAP TAB ───────────────────────────────────────────────────
function RoadmapTab({ roadmaps, activeRmId, onSetActive, onNewRoadmap, onRenameRoadmap, onDeleteRoadmap, onGenRoadmap, onGoCreer, loading, publishedWeeks, onMarkPublished, selectedAxes }) {
  const [duration, setDuration] = useState(6);
  const [openQ, setOpenQ] = useState([0]);
  const activeRm = roadmaps.find(r => r.id === activeRmId) || roadmaps[0];
  const weeks = activeRm?.weeks || [];

  const toggleQ = (i) => setOpenQ(p => p.includes(i) ? p.filter(x => x !== i) : [...p, i]);

  const quarters = [];
  const months = [...new Set(weeks.map(w => w.month))];
  for (let i = 0; i < months.length; i += 3) {
    const qMonths = months.slice(i, i+3);
    const qWeeks = weeks.filter(w => qMonths.includes(w.month));
    const done = qWeeks.filter(w => publishedWeeks.has(w.week)).length;
    const cur  = qWeeks.find(w => !publishedWeeks.has(w.week));
    quarters.push({ index: i/3, months: qMonths, weeks: qWeeks, done, current: cur });
  }

  return (
    <div style={{ display: "grid", gridTemplateColumns: "240px 1fr", height: "calc(100vh - 56px)", gap: 0 }}>
      {/* Sidebar roadmaps */}
      <div style={{ background: C.gray50, borderRight: `0.5px solid ${C.gray200}`, padding: "1rem", display: "flex", flexDirection: "column", gap: 8, overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
          <div style={{ fontSize: 12, fontWeight: 500, color: C.gray900 }}>Mes roadmaps</div>
          <Btn sm variant="primary" onClick={onNewRoadmap}>+ Nouvelle</Btn>
        </div>
        {roadmaps.length === 0 && <p style={{ fontSize: 12, color: C.gray400 }}>Aucune roadmap.</p>}
        {roadmaps.map(rm => (
          <div key={rm.id} onClick={() => onSetActive(rm.id)} style={{
            border: `0.5px solid ${rm.id === activeRmId ? C.navy : C.gray200}`,
            borderRadius: 10, padding: "10px 12px", cursor: "pointer",
            background: rm.id === activeRmId ? C.navyLight : "#fff",
            display: "flex", alignItems: "center", gap: 10
          }}>
            <div style={{ width: 32, height: 32, borderRadius: 7, background: rm.id === activeRmId ? C.navy : C.gray100, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>
              🗓
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 12, fontWeight: 500, color: rm.id === activeRmId ? C.navy : C.gray900, display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{rm.name}</span>
                {rm.id === activeRmId && <span style={{ fontSize: 9, background: C.navy, color: "#fff", borderRadius: 8, padding: "1px 5px", flexShrink: 0 }}>Active</span>}
              </div>
              <div style={{ fontSize: 10, color: C.gray400 }}>{rm.weeks?.length || 0} sem. · {rm.createdAt}</div>
            </div>
            <button onClick={e => { e.stopPropagation(); onDeleteRoadmap(rm.id); }} style={{ fontSize: 11, color: C.gray400, background: "none", border: "none", cursor: "pointer", flexShrink: 0, padding: "2px 4px" }}>✕</button>
          </div>
        ))}
      </div>

      {/* Contenu roadmap */}
      <div style={{ overflowY: "auto", display: "flex", flexDirection: "column" }}>
        {/* Toolbar */}
        <div style={{ padding: "10px 1.25rem", borderBottom: `0.5px solid ${C.gray200}`, display: "flex", alignItems: "center", gap: 12, background: C.gray50, flexShrink: 0, flexWrap: "wrap" }}>
          <span style={{ fontSize: 12, color: C.gray600, flexShrink: 0 }}>Durée :</span>
          <div style={{ display: "flex", gap: 3 }}>
            {DURATIONS.map(d => (
              <button key={d} onClick={() => setDuration(d)} style={{
                width: 36, height: 34, borderRadius: 7, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 1,
                border: `0.5px solid ${duration===d ? C.navy : C.gray200}`,
                background: duration===d ? C.navy : "#fff", cursor: "pointer"
              }}>
                <span style={{ fontSize: 13, fontWeight: 500, color: duration===d ? "#fff" : C.gray600, lineHeight: 1 }}>{d}</span>
                <span style={{ fontSize: 8, color: duration===d ? "rgba(255,255,255,0.7)" : C.gray400, lineHeight: 1 }}>mois</span>
              </button>
            ))}
          </div>
          <div style={{ width: 1, height: 20, background: C.gray200, flexShrink: 0 }}></div>
          <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: C.gray600 }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: C.green }}></div>
            Anti-doublon — {publishedWeeks.size} sem. mémorisées
          </div>
          <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
            {activeRm && <Btn sm variant="secondary" onClick={() => onRenameRoadmap(activeRm.id)}>Renommer</Btn>}
            <Btn sm variant="primary" onClick={() => onGenRoadmap(duration)} disabled={loading==="roadmap" || selectedAxes.length===0}>
              {loading==="roadmap" ? "Génération…" : activeRm?.weeks?.length ? "↺ Regénérer" : "→ Générer"}
            </Btn>
          </div>
        </div>

        {/* Roadmap body */}
        <div style={{ padding: "1rem 1.25rem", flex: 1 }}>
          {selectedAxes.length === 0 && <div style={{ background: "#FEF3C7", border: `0.5px solid ${C.amber}`, borderRadius: 8, padding: "8px 12px", marginBottom: 12, fontSize: 12, color: "#92400E" }}>⚠ Sélectionnez d'abord vos axes avant de générer une roadmap.</div>}
          {!activeRm?.weeks?.length
            ? <Empty icon="🗓" text={selectedAxes.length===0?"Sélectionnez vos axes puis générez une roadmap.":"Cliquez sur Générer pour créer votre première roadmap."} btnLabel={selectedAxes.length>0?"Générer la roadmap":null} onBtn={selectedAxes.length>0?()=>onGenRoadmap(duration):null}/>
            : quarters.map((q, qi) => {
                const isOpen = openQ.includes(qi);
                return (
                  <div key={qi} style={{ marginBottom: 8 }}>
                    {/* Accordéon header */}
                    <div onClick={() => toggleQ(qi)} style={{
                      display: "flex", alignItems: "center", gap: 10, padding: "10px 14px",
                      background: isOpen ? C.navyLight : C.gray100,
                      border: `0.5px solid ${isOpen ? C.navy : C.gray200}`,
                      borderRadius: isOpen ? "9px 9px 0 0" : 9,
                      borderBottom: isOpen ? "none" : undefined,
                      cursor: "pointer", userSelect: "none",
                    }}>
                      <span style={{ fontSize: 12, fontWeight: 500, color: C.navy }}>Trimestre {q.index+1}</span>
                      <span style={{ fontSize: 11, color: C.gray400 }}>{q.months.join(" · ")}</span>
                      <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 12 }}>
                        {q.done > 0 && <span style={{ fontSize: 11, color: C.green, display: "flex", alignItems: "center", gap: 4 }}><div style={{ width: 7, height: 7, borderRadius: "50%", background: C.green }}></div>{q.done} publié{q.done>1?"s":""}</span>}
                        {q.current && <span style={{ fontSize: 11, color: C.navy, display: "flex", alignItems: "center", gap: 4 }}><div style={{ width: 7, height: 7, borderRadius: "50%", background: C.navy }}></div>S{q.current.week} en cours</span>}
                        {!q.done && !q.current && <span style={{ fontSize: 11, color: C.gray400 }}>{q.weeks.length} semaines à venir</span>}
                        <span style={{ fontSize: 12, color: C.gray400, transform: isOpen ? "rotate(90deg)" : "none", transition: "transform 0.15s" }}>›</span>
                      </div>
                    </div>
                    {/* Accordéon content */}
                    {isOpen && (
                      <div style={{ border: `0.5px solid ${C.navy}`, borderTop: "none", borderRadius: "0 0 9px 9px", padding: 12, background: "#fff" }}>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
                          {q.months.map(month => {
                            const mWeeks = q.weeks.filter(w => w.month === month);
                            return (
                              <div key={month}>
                                <div style={{ fontSize: 10, fontWeight: 500, color: C.navy, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 8, paddingBottom: 5, borderBottom: `0.5px solid ${C.gray200}` }}>{month}</div>
                                {mWeeks.map(w => {
                                  const isDone = publishedWeeks.has(w.week);
                                  const isCur  = q.current?.week === w.week;
                                  return (
                                    <div key={w.week} style={{
                                      border: `0.5px solid ${isCur ? C.navy : C.gray200}`,
                                      borderRadius: 7, padding: 9, marginBottom: 7,
                                      background: isCur ? C.navyLight : "#fff",
                                      opacity: isDone ? 0.55 : 1,
                                    }}>
                                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                                        <span style={{ fontSize: 10, color: C.gray400, fontWeight: 500 }}>Sem. {w.week}</span>
                                        {isDone
                                          ? <span style={{ fontSize: 10, color: C.green, fontWeight: 500 }}>✓ Publié</span>
                                          : <button onClick={() => onGoCreer(w)} style={{ fontSize: 10, color: C.navy, border: `0.5px solid ${C.navyMid}`, borderRadius: 4, padding: "2px 6px", background: C.navyLight, cursor: "pointer" }}>Créer →</button>
                                        }
                                      </div>
                                      <div style={{ fontSize: 12, fontWeight: 500, color: C.gray900, lineHeight: 1.3, marginBottom: 3 }}>{w.theme}</div>
                                      <div style={{ fontSize: 11, color: C.gray400, lineHeight: 1.4, marginBottom: 5 }}>{w.detail}</div>
                                      <div style={{ display: "flex", alignItems: "center", gap: 4, flexWrap: "wrap" }}>
                                        <span style={{ padding: "2px 6px", background: C.navyLight, color: C.navy, borderRadius: 4, fontSize: 10, fontWeight: 500 }}>{w.axis}</span>
                                        <span style={{ fontSize: 10, color: C.gray400 }}>{w.tone} · {w.style}</span>
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })
          }
        </div>

        {/* Legend */}
        <div style={{ padding: "8px 1.25rem", borderTop: `0.5px solid ${C.gray200}`, display: "flex", gap: "1rem", background: C.gray50, flexShrink: 0 }}>
          {[{c:C.navy,l:"Semaine courante"},{c:C.green,l:"Publié"},{c:C.gray200,l:"À venir"}].map(({c,l}) => (
            <div key={l} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: C.gray400 }}>
              <div style={{ width: 10, height: 10, borderRadius: 3, background: c }}></div>{l}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── CRÉER TAB ─────────────────────────────────────────────────────
function CreerTab({ profile, selectedAxes, prefill, onSavePost, setToast }) {
  const [step, setStep] = useState("generer"); // generer | interview | analyser | optimiser
  const STEPS = [
    { id: "generer",   label: "Générer" },
    { id: "interview", label: "Interview" },
    { id: "analyser",  label: "Analyser" },
    { id: "optimiser", label: "Optimiser" },
  ];
  const [done, setDone] = useState(new Set());

  // Générer
  const [tone, setTone]       = useState(prefill?.tone || "");
  const [style, setStyle]     = useState(prefill?.style || "");
  const [chosenAxis, setChosenAxis] = useState(prefill?.axis || selectedAxes[0] || null);
  const [genPost, setGenPost] = useState("");
  const [loadingPost, setLoadingPost] = useState(false);

  // Interview
  const [questions, setQuestions]   = useState([]);
  const [answers, setAnswers]       = useState({});
  const [enrichedPost, setEnrichedPost] = useState("");
  const [loadingInterview, setLoadingInterview] = useState(false);
  const [loadingEnrich, setLoadingEnrich] = useState(false);

  // Analyser
  const [analysis, setAnalysis]   = useState(null);
  const [loadingAnalysis, setLoadingAnalysis] = useState(false);

  // Optimiser
  const [selOptAxes, setSelOptAxes] = useState([]);
  const [customPrompt, setCustomPrompt] = useState("");
  const [optimPost, setOptimPost]   = useState("");
  const [loadingOptim, setLoadingOptim] = useState(false);

  const currentPost = optimPost || enrichedPost || genPost;

  useEffect(() => {
    if (prefill?.axis) setChosenAxis(prefill.axis);
    if (prefill?.tone) setTone(prefill.tone);
    if (prefill?.style) setStyle(prefill.style);
  }, [prefill]);

  const markDone = (s) => setDone(p => new Set([...p, s]));

  async function doGenerate() {
    if (!chosenAxis || !tone || !style || !profile) return;
    setLoadingPost(true);
    try {
      const sug = prefill?.roadmapSug ? `\nThème suggéré par la roadmap : "${prefill.roadmapSug.theme}"` : "";
      const txt = await callAPI(
        `Profil : ${profile.name} — ${profile.vision}\nContexte : ${profile.context}\nAxe : ${chosenAxis.title} — ${chosenAxis.description}\nTon : ${tone}\nStyle : ${style}${sug}\nGénère le post LinkedIn.`,
        LINKEDIN_RULES, 1200
      );
      setGenPost(txt); markDone("generer");
    } catch(e) { setToast("⚠️ " + e.message); }
    setLoadingPost(false);
  }

  async function doGenQuestions() {
    if (!genPost) return;
    setLoadingInterview(true);
    try {
      const txt = await callAPI(
        `Voici un post LinkedIn généré par IA :\n\n${genPost}\n\nPose 3 questions courtes et précises pour extraire le vécu, les anecdotes terrain et les opinions personnelles de l'auteur.`,
        `Tu es un journaliste expert LinkedIn. Réponds UNIQUEMENT en JSON valide. Format : {"questions":["Q1","Q2","Q3"]}`,
        400
      );
      const p = parseJSON(txt);
      if (p?.questions) setQuestions(p.questions);
    } catch(e) { setToast("⚠️ " + e.message); }
    setLoadingInterview(false);
  }

  async function doEnrich() {
    if (!genPost) return;
    setLoadingEnrich(true);
    try {
      const answersText = questions.map((q,i) => `Q: ${q}\nR: ${answers[i]||"—"}`).join("\n\n");
      const txt = await callAPI(
        `Post original :\n${genPost}\n\nVécu et anecdotes de l'auteur :\n${answersText}\n\nRéécris ce post en intégrant naturellement ces éléments personnels. Garde la structure mais rends-le authentique et unique.`,
        LINKEDIN_RULES, 1200
      );
      setEnrichedPost(txt); markDone("interview");
    } catch(e) { setToast("⚠️ " + e.message); }
    setLoadingEnrich(false);
  }

  async function doAnalyze() {
    if (!currentPost) return;
    setLoadingAnalysis(true);
    try {
      const txt = await callAPI(
        `Analyse ce post LinkedIn :\n\n${currentPost}`,
        `Expert LinkedIn. Réponds UNIQUEMENT en JSON valide. Format : {"score":7,"hook":{"note":6,"comment":"..."},"structure":{"note":7,"comment":"..."},"ton":{"note":8,"comment":"..."},"longueur":{"note":5,"comment":"..."},"points_forts":["..."],"points_faibles":["..."],"recommandations":["..."]}`,
        700
      );
      const p = parseJSON(txt);
      if (p) { setAnalysis(p); markDone("analyser"); }
    } catch(e) { setToast("⚠️ " + e.message); }
    setLoadingAnalysis(false);
  }

  async function doOptimize() {
    if (!currentPost) return;
    setLoadingOptim(true);
    try {
      const axDesc = selOptAxes.map(id => { const a = OPTIM_AXES.find(x=>x.id===id); return a ? `- ${a.label} : ${a.desc}` : ""; }).filter(Boolean).join("\n");
      const instr  = [axDesc, customPrompt.trim()].filter(Boolean).join("\n\nInstruction libre :\n") || "Améliore globalement.";
      const txt = await callAPI(`Optimise ce post selon :\n${instr}\n\nPost :\n${currentPost}`, LINKEDIN_RULES, 1200);
      setOptimPost(txt); markDone("optimiser");
    } catch(e) { setToast("⚠️ " + e.message); }
    setLoadingOptim(false);
  }

  function saveCurrentPost() {
    if (!currentPost) return;
    onSavePost({ content: currentPost, axis: chosenAxis?.title || "", tone, style, date: today() });
    setToast("✓ Post ajouté à Mes Posts");
  }

  function ScoreBar({ label, note }) {
    const c = (note||0)>=7 ? C.green : (note||0)>=5 ? C.amber : C.red;
    return (
      <div style={{ marginBottom: 8 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
          <span style={{ fontSize: 12, fontWeight: 500 }}>{label}</span>
          <span style={{ fontSize: 12, fontWeight: 600, color: c }}>{note}/10</span>
        </div>
        <div style={{ height: 4, background: C.gray100, borderRadius: 10 }}>
          <div style={{ height: 4, borderRadius: 10, width: `${(note||0)*10}%`, background: c }}/>
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 56px)" }}>
      {/* Sub-steps */}
      <div style={{ display: "flex", alignItems: "center", padding: "0 1.25rem", borderBottom: `0.5px solid ${C.gray200}`, background: "#fff", height: 40, flexShrink: 0 }}>
        {STEPS.map((s, i) => {
          const isOn   = step === s.id;
          const isDone = done.has(s.id);
          return (
            <React.Fragment key={s.id}>
              {i > 0 && <span style={{ fontSize: 10, color: C.gray200, padding: "0 2px" }}>›</span>}
              <button onClick={() => setStep(s.id)} style={{
                display: "flex", alignItems: "center", gap: 5, padding: "0 12px", height: 40,
                fontSize: 12, color: isOn ? C.navy : isDone ? C.green : C.gray400,
                borderBottom: `2px solid ${isOn ? C.navy : "transparent"}`,
                fontWeight: isOn ? 600 : 400, cursor: "pointer", background: "none", border: "none",
                borderBottom: `2px solid ${isOn ? C.navy : "transparent"}`,
              }}>
                <div style={{ width: 16, height: 16, borderRadius: "50%", fontSize: 8, fontWeight: 600, display: "flex", alignItems: "center", justifyContent: "center", background: isOn ? C.navy : isDone ? C.green : C.gray100, color: (isOn||isDone) ? "#fff" : C.gray400, border: (!isOn&&!isDone) ? `0.5px solid ${C.gray200}` : "none" }}>
                  {isDone ? "✓" : i+1}
                </div>
                {s.label}
              </button>
            </React.Fragment>
          );
        })}
        <span style={{ marginLeft: "auto", fontSize: 10, color: C.gray400, background: C.gray100, border: `0.5px solid ${C.gray200}`, padding: "2px 8px", borderRadius: 10 }}>Accès libre</span>
      </div>

      {/* Content */}
      <div style={{ flex: 1, overflowY: "auto", padding: "1.25rem", background: C.gray50 }}>

        {/* GÉNÉRER */}
        {step === "generer" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, maxWidth: 900, margin: "0 auto" }}>
            <Card>
              <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 14 }}>✦ Paramètres</div>
              <div style={{ fontSize: 12, fontWeight: 500, marginBottom: 8 }}>Axe</div>
              {selectedAxes.length > 0
                ? <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 12 }}>
                    {selectedAxes.map(a => (
                      <div key={a.id} onClick={() => setChosenAxis(a)} style={{ padding: "8px 12px", borderRadius: 8, border: `2px solid ${chosenAxis?.id===a.id ? C.navy : C.gray200}`, background: chosenAxis?.id===a.id ? C.navyLight : "#fff", cursor: "pointer", fontSize: 12, fontWeight: 500, color: chosenAxis?.id===a.id ? C.navy : C.gray900 }}>
                        {a.emoji} {a.title}
                      </div>
                    ))}
                  </div>
                : <p style={{ fontSize: 12, color: C.gray400, marginBottom: 12 }}>Aucun axe sélectionné.</p>
              }
              <div style={{ fontSize: 12, fontWeight: 500, marginBottom: 8 }}>Ton</div>
              <div style={{ marginBottom: 12 }}>{TONES.map(t => <Tag key={t} label={t} active={tone===t} onClick={() => setTone(t)} />)}</div>
              <div style={{ fontSize: 12, fontWeight: 500, marginBottom: 8 }}>Style</div>
              <div style={{ marginBottom: 14 }}>{STYLES.map(s => <Tag key={s} label={s} active={style===s} onClick={() => setStyle(s)} />)}</div>
              <Btn onClick={doGenerate} disabled={!chosenAxis||!tone||!style||loadingPost}>{loadingPost?"Génération…":"✦ Générer le post"}</Btn>
            </Card>
            <div>
              {genPost
                ? <Card>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 14, fontWeight: 500 }}>Post généré</span><CharBadge n={genPost.length}/></div>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={() => navigator.clipboard.writeText(genPost)} style={{ fontSize: 11, color: C.navy, background: "none", border: "none", cursor: "pointer", fontWeight: 500 }}>Copier</button>
                        <button onClick={saveCurrentPost} style={{ fontSize: 11, color: C.green, background: "none", border: "none", cursor: "pointer", fontWeight: 500 }}>💾 Sauvegarder</button>
                      </div>
                    </div>
                    <div style={{ background: C.gray50, borderRadius: 8, padding: 14, fontSize: 13, lineHeight: 1.7, whiteSpace: "pre-wrap", marginBottom: 12, color: C.gray900 }}>{genPost}</div>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                      <Btn sm variant="secondary" onClick={doGenerate} disabled={loadingPost}>↺ Regénérer</Btn>
                      <Btn sm variant="ghost" onClick={() => setStep("interview")}>→ Interview</Btn>
                      <Btn sm variant="ghost" onClick={() => setStep("analyser")}>→ Analyser</Btn>
                    </div>
                  </Card>
                : <Card style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: 200, background: C.gray50 }}>
                    <p style={{ fontSize: 13, color: C.gray400, textAlign: "center" }}>Le post apparaîtra ici après génération.</p>
                  </Card>
              }
            </div>
          </div>
        )}

        {/* INTERVIEW */}
        {step === "interview" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, maxWidth: 900, margin: "0 auto" }}>
            <Card>
              <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 4 }}>Post de base</div>
              <div style={{ fontSize: 12, color: C.gray400, marginBottom: 10 }}>Lecture seule — le post enrichi apparaîtra à droite.</div>
              <div style={{ background: C.gray50, borderRadius: 8, padding: 12, fontSize: 12, lineHeight: 1.7, whiteSpace: "pre-wrap", opacity: 0.75, marginBottom: 12, maxHeight: 200, overflowY: "auto" }}>{genPost || "Aucun post généré."}</div>
              {questions.length === 0
                ? <Btn onClick={doGenQuestions} disabled={!genPost || loadingInterview}>{loadingInterview ? "Génération…" : "🎤 Générer les questions"}</Btn>
                : <p style={{ fontSize: 12, color: C.green }}>✓ {questions.length} questions générées</p>
              }
            </Card>
            <Card>
              <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 4 }}>🎤 Vos réponses</div>
              <p style={{ fontSize: 12, color: C.gray400, marginBottom: 12 }}>Plus vos réponses sont précises, meilleur sera le post final.</p>
              {questions.length === 0
                ? <p style={{ fontSize: 12, color: C.gray400 }}>Générez les questions d'abord.</p>
                : <>
                    {questions.map((q, i) => (
                      <div key={i} style={{ marginBottom: 12 }}>
                        <div style={{ fontSize: 12, fontWeight: 500, color: C.navy, marginBottom: 5 }}>{i+1}. {q}</div>
                        <textarea value={answers[i]||""} onChange={e => setAnswers(p => ({...p,[i]:e.target.value}))} placeholder="Votre réponse…" rows={2} style={{ width: "100%", padding: "8px 10px", borderRadius: 7, border: `0.5px solid ${C.gray200}`, fontSize: 12, resize: "vertical", outline: "none", fontFamily: "inherit", background: C.gray50 }} />
                      </div>
                    ))}
                    <Btn full onClick={doEnrich} disabled={loadingEnrich}>{loadingEnrich?"Réécriture…":"✦ Réécrire avec mon vécu"}</Btn>
                  </>
              }
              {enrichedPost && (
                <div style={{ marginTop: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 13, fontWeight: 500, color: C.green }}>✦ Post enrichi</span><CharBadge n={enrichedPost.length}/></div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => navigator.clipboard.writeText(enrichedPost)} style={{ fontSize: 11, color: C.navy, background: "none", border: "none", cursor: "pointer", fontWeight: 500 }}>Copier</button>
                      <button onClick={saveCurrentPost} style={{ fontSize: 11, color: C.green, background: "none", border: "none", cursor: "pointer", fontWeight: 500 }}>💾 Sauvegarder</button>
                    </div>
                  </div>
                  <div style={{ background: "#F0FDF4", borderRadius: 8, padding: 12, fontSize: 12, lineHeight: 1.7, whiteSpace: "pre-wrap", marginBottom: 10 }}>{enrichedPost}</div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <Btn sm variant="ghost" onClick={() => setStep("analyser")}>→ Analyser</Btn>
                    <Btn sm variant="ghost" onClick={() => setStep("optimiser")}>→ Optimiser</Btn>
                  </div>
                </div>
              )}
            </Card>
          </div>
        )}

        {/* ANALYSER */}
        {step === "analyser" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, maxWidth: 900, margin: "0 auto" }}>
            <Card>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <span style={{ fontSize: 14, fontWeight: 500 }}>Post à analyser</span>
                <CharBadge n={currentPost.length}/>
              </div>
              <div style={{ background: C.gray50, borderRadius: 8, padding: 12, fontSize: 12, lineHeight: 1.7, whiteSpace: "pre-wrap", marginBottom: 12, maxHeight: 220, overflowY: "auto" }}>{currentPost || "Aucun post disponible."}</div>
              <Btn onClick={doAnalyze} disabled={!currentPost || loadingAnalysis}>{loadingAnalysis?"Analyse…":"🔍 Analyser ce post"}</Btn>
            </Card>
            <Card>
              {!analysis
                ? <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: 200 }}><p style={{ fontSize: 13, color: C.gray400 }}>Les résultats apparaîtront ici.</p></div>
                : <>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                      <span style={{ fontSize: 14, fontWeight: 500 }}>Résultats</span>
                      <span style={{ fontSize: 28, fontWeight: 500, color: analysis.score>=7?C.green:analysis.score>=5?C.amber:C.red, lineHeight: 1 }}>{analysis.score}<span style={{ fontSize: 13, color: C.gray400 }}>/10</span></span>
                    </div>
                    {[{k:"hook",l:"🎣 Hook"},{k:"structure",l:"📐 Structure"},{k:"ton",l:"🎙 Ton"},{k:"longueur",l:"📏 Longueur"}].map(({k,l}) => analysis[k] && <ScoreBar key={k} label={l} note={analysis[k].note} />)}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 12 }}>
                      {analysis.points_forts?.length > 0 && <div style={{ background: "#F0FDF4", borderRadius: 8, padding: 10 }}><div style={{ fontSize: 11, fontWeight: 500, color: "#15803D", marginBottom: 5 }}>✓ Points forts</div>{analysis.points_forts.map((p,i) => <div key={i} style={{ fontSize: 11, color: "#166534", marginBottom: 3 }}>· {p}</div>)}</div>}
                      {analysis.points_faibles?.length > 0 && <div style={{ background: "#FEF2F2", borderRadius: 8, padding: 10 }}><div style={{ fontSize: 11, fontWeight: 500, color: "#B91C1C", marginBottom: 5 }}>⚠ À améliorer</div>{analysis.points_faibles.map((p,i) => <div key={i} style={{ fontSize: 11, color: "#991B1B", marginBottom: 3 }}>· {p}</div>)}</div>}
                    </div>
                    {analysis.recommandations?.length > 0 && <div style={{ background: C.navyLight, borderRadius: 8, padding: 10, marginTop: 10 }}><div style={{ fontSize: 12, fontWeight: 500, color: C.navy, marginBottom: 7 }}>💡 Recommandations</div>{analysis.recommandations.map((r,i) => <div key={i} style={{ fontSize: 12, color: C.gray600, marginBottom: 5 }}>{i+1}. {r}</div>)}</div>}
                    <div style={{ marginTop: 12 }}><Btn sm variant="ghost" onClick={() => setStep("optimiser")}>→ Optimiser</Btn></div>
                  </>
              }
            </Card>
          </div>
        )}

        {/* OPTIMISER */}
        {step === "optimiser" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, maxWidth: 900, margin: "0 auto" }}>
            <Card>
              <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 12 }}>⚡ Axes d'optimisation</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 7, marginBottom: 14 }}>
                {OPTIM_AXES.map(a => {
                  const sel = selOptAxes.includes(a.id);
                  return <div key={a.id} onClick={() => setSelOptAxes(p => sel ? p.filter(x=>x!==a.id) : [...p,a.id])} style={{ padding: "9px 10px", borderRadius: 8, border: `0.5px solid ${sel?C.navy:C.gray200}`, background: sel?C.navyLight:"#fff", cursor: "pointer" }}>
                    <div style={{ fontSize: 12, fontWeight: 500, color: sel?C.navy:C.gray900, marginBottom: 1 }}>{a.label}</div>
                    <div style={{ fontSize: 10, color: C.gray400 }}>{a.desc}</div>
                  </div>;
                })}
              </div>
              <Field label="✍️ Instruction libre" value={customPrompt} onChange={setCustomPrompt} placeholder="Ex: Rends plus adapté à une audience DSI…" rows={3} />
              <Btn full onClick={doOptimize} disabled={(!selOptAxes.length && !customPrompt.trim()) || loadingOptim}>{loadingOptim?"Optimisation…":`⚡ Optimiser${selOptAxes.length>0?" ("+selOptAxes.length+")"`:""}`}</Btn>
            </Card>
            <div>
              <Card>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <span style={{ fontSize: 13, fontWeight: 500 }}>Post de base</span>
                  <CharBadge n={currentPost.length}/>
                </div>
                <div style={{ background: C.gray50, borderRadius: 8, padding: 12, fontSize: 12, lineHeight: 1.7, whiteSpace: "pre-wrap", maxHeight: 150, overflowY: "auto", opacity: 0.75 }}>{currentPost||"—"}</div>
              </Card>
              {optimPost && (
                <Card style={{ borderTop: `3px solid ${C.green}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 13, fontWeight: 500, color: C.green }}>✦ Post optimisé</span><CharBadge n={optimPost.length}/></div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => navigator.clipboard.writeText(optimPost)} style={{ fontSize: 11, color: C.navy, background: "none", border: "none", cursor: "pointer", fontWeight: 500 }}>Copier</button>
                      <button onClick={saveCurrentPost} style={{ fontSize: 11, color: C.green, background: "none", border: "none", cursor: "pointer", fontWeight: 500 }}>💾 Sauvegarder</button>
                    </div>
                  </div>
                  <div style={{ background: "#F0FDF4", borderRadius: 8, padding: 12, fontSize: 12, lineHeight: 1.7, whiteSpace: "pre-wrap", marginBottom: 10 }}>{optimPost}</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    <Btn sm variant="secondary" onClick={doOptimize} disabled={loadingOptim}>↺ Regénérer</Btn>
                    <Btn sm variant="secondary" onClick={() => { setGenPost(optimPost); setEnrichedPost(""); setOptimPost(""); setStep("generer"); }}>→ Nouvelle base</Btn>
                  </div>
                </Card>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── INSIGHTS TAB ──────────────────────────────────────────────────
function InsightsTab({ insights, posts, onAddInsight, onDeleteInsight, setToast }) {
  const [selectedPost, setSelectedPost] = useState("");
  const [metrics, setMetrics] = useState({ impressions: "", likes: "", comments: "" });
  const [improved, setImproved] = useState("");
  const [loading, setLoading] = useState(false);

  async function doImprove() {
    if (!selectedPost.trim()) return;
    setLoading(true);
    try {
      const hist = insights.slice(0,3).map(i => `impressions:${i.impressions} likes:${i.likes} commentaires:${i.comments}`).join(" | ");
      const txt = await callAPI(
        `Post :\n${selectedPost}\nPerf : impressions=${metrics.impressions}, likes=${metrics.likes}, commentaires=${metrics.comments}${hist?"\nHistorique : "+hist:""}\n\nAnalyse les performances et génère une version améliorée.`,
        LINKEDIN_RULES, 1200
      );
      setImproved(txt);
      onAddInsight({ id: uid(), postSnippet: selectedPost.slice(0,200), ...metrics, date: today() });
      setToast("✓ Analyse enregistrée");
    } catch(e) { setToast("⚠️ " + e.message); }
    setLoading(false);
  }

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 1, background: C.gray200, height: "calc(100vh - 56px)" }}>
      {/* Gauche */}
      <div style={{ background: "#fff", padding: "1.5rem", overflowY: "auto" }}>
        <div style={{ fontSize: 15, fontWeight: 500, marginBottom: 4 }}>📊 Insights J+7</div>
        <p style={{ fontSize: 12, color: C.gray400, marginBottom: 16 }}>{insights.length > 0 ? `L'IA tient compte de vos ${insights.length} analyse(s).` : "Renseignez vos performances pour améliorer les futurs posts."}</p>
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 12, fontWeight: 500, color: C.gray600, marginBottom: 6 }}>Le post publié</div>
          {posts.length > 0 && (
            <select value={selectedPost} onChange={e => setSelectedPost(e.target.value)} style={{ width: "100%", padding: "8px 10px", borderRadius: 7, border: `0.5px solid ${C.gray200}`, fontSize: 12, marginBottom: 8, background: C.gray50, outline: "none", color: C.gray900 }}>
              <option value="">Choisir un post sauvegardé…</option>
              {posts.map(p => <option key={p.id} value={p.content}>{p.axis} — {p.date} — {p.content.slice(0,50)}…</option>)}
            </select>
          )}
          <textarea value={selectedPost} onChange={e => setSelectedPost(e.target.value)} placeholder="Ou collez votre post ici…" rows={4} style={{ width: "100%", padding: "9px 12px", borderRadius: 7, border: `0.5px solid ${C.gray200}`, fontSize: 12, resize: "vertical", outline: "none", fontFamily: "inherit", background: C.gray50 }} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 14 }}>
          {[{l:"👁 Impressions",k:"impressions"},{l:"❤️ Likes",k:"likes"},{l:"💬 Commentaires",k:"comments"}].map(({l,k}) => (
            <div key={k}>
              <div style={{ fontSize: 11, fontWeight: 500, marginBottom: 4 }}>{l}</div>
              <input value={metrics[k]} onChange={e => setMetrics(m => ({...m,[k]:e.target.value}))} placeholder="0" style={{ width: "100%", padding: "8px 10px", borderRadius: 7, border: `0.5px solid ${C.gray200}`, fontSize: 13, outline: "none", background: C.gray50 }} />
            </div>
          ))}
        </div>
        <Btn full onClick={doImprove} disabled={!selectedPost.trim()||loading}>{loading?"Analyse…":"✦ Analyser & améliorer"}</Btn>
        {improved && (
          <div style={{ marginTop: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <span style={{ fontSize: 13, fontWeight: 500 }}>🚀 Post amélioré</span>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => navigator.clipboard.writeText(improved)} style={{ fontSize: 11, color: C.navy, background: "none", border: "none", cursor: "pointer", fontWeight: 500 }}>Copier</button>
              </div>
            </div>
            <div style={{ background: C.gray50, borderRadius: 8, padding: 12, fontSize: 12, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{improved}</div>
          </div>
        )}
      </div>
      {/* Droite */}
      <div style={{ background: "#fff", padding: "1.5rem", overflowY: "auto" }}>
        <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 12 }}>Historique d'engagement</div>
        {insights.length === 0 ? <Empty icon="📈" text="Aucune analyse enregistrée." /> :
          <>
            {insights.map(ins => {
              const eng = ins.impressions ? ((((+ins.likes||0)+(+ins.comments||0)) / +ins.impressions)*100).toFixed(1) : null;
              return (
                <div key={ins.id} style={{ border: `0.5px solid ${C.gray200}`, borderRadius: 9, padding: 12, marginBottom: 8 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <span style={{ fontSize: 11, color: C.gray400 }}>{ins.date}</span>
                    <button onClick={() => onDeleteInsight(ins.id)} style={{ fontSize: 11, color: C.red, background: "none", border: "none", cursor: "pointer" }}>Suppr.</button>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 8 }}>
                    {[{l:"👁",v:ins.impressions},{l:"❤️",v:ins.likes},{l:"💬",v:ins.comments},{l:"📈",v:eng?eng+"%":"—"}].map(({l,v}) => (
                      <div key={l} style={{ background: C.gray50, borderRadius: 7, padding: "8px 4px", textAlign: "center" }}>
                        <div style={{ fontSize: 11, color: C.gray400 }}>{l}</div>
                        <div style={{ fontSize: 14, fontWeight: 500 }}>{v||"—"}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ fontSize: 11, color: C.gray400, fontStyle: "italic" }}>{ins.postSnippet}…</div>
                </div>
              );
            })}
          </>
        }
      </div>
    </div>
  );
}

// ─── MAIN APP ──────────────────────────────────────────────────────
function App() {
  const [ready, setReady]     = useState(false);
  const [tab, setTab]         = useState("profil");
  const [toast, setToast]     = useState("");
  const [loading, setLoading] = useState("");

  // Data
  const [profile, setProfile]             = useState(null);
  const [axesSessions, setAxesSessions]   = useState([]);
  const [favAxes, setFavAxes]             = useState([]);
  const [selectedAxes, setSelectedAxes]   = useState([]);
  const [roadmaps, setRoadmaps]           = useState([]);
  const [activeRmId, setActiveRmId]       = useState(null);
  const [publishedWeeks, setPublishedWeeks] = useState(new Set());
  const [posts, setPosts]                 = useState([]);
  const [insights, setInsights]           = useState([]);
  const [creerPrefill, setCreerPrefill]   = useState(null);

  // Auto-save
  const saveTimer = useRef(null);
  useEffect(() => {
    if (!ready) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      stoSave({ profile, axesSessions, favAxes, selectedAxes, roadmaps, activeRmId, publishedWeeks: [...publishedWeeks], posts, insights });
    }, 700);
  }, [profile, axesSessions, favAxes, selectedAxes, roadmaps, activeRmId, publishedWeeks, posts, insights]);

  // Load
  useEffect(() => {
    const d = stoLoad();
    if (d) {
      if (d.profile)       setProfile(d.profile);
      if (d.axesSessions)  setAxesSessions(d.axesSessions);
      if (d.favAxes)       setFavAxes(d.favAxes);
      if (d.selectedAxes)  setSelectedAxes(d.selectedAxes);
      if (d.roadmaps)      setRoadmaps(d.roadmaps);
      if (d.activeRmId)    setActiveRmId(d.activeRmId);
      if (d.publishedWeeks) setPublishedWeeks(new Set(d.publishedWeeks));
      if (d.posts)         setPosts(d.posts);
      if (d.insights)      setInsights(d.insights);
    }
    setReady(true);
  }, []);

  const showToast = (m) => { setToast(m); setTimeout(() => setToast(""), 2800); };

  // ── Profile ──
  function saveProfile(p) { setProfile(p); showToast("✓ Profil sauvegardé"); }

  async function genAxes(profileData) {
    if (!profileData?.name) return;
    setLoading("axes");
    showToast("⏳ Génération des axes…");
    try {
      const txt = await callAPI(
        `Nom : ${profileData.name}\nVision : ${profileData.vision}\nContexte : ${profileData.context}\nGénère 6 axes de contenu LinkedIn stratégiques en français.`,
        `Tu es un stratège LinkedIn. Réponds UNIQUEMENT en JSON valide. Format : {"axes":[{"title":"...","description":"...","emoji":"..."}]} avec exactement 6 items.`,
        900
      );
      const p = parseJSON(txt);
      if (p?.axes?.length) {
        const withIds = p.axes.map(a => ({ ...a, id: uid() }));
        const newSession = { id: uid(), label: `Génération — ${today()}`, createdAt: today(), axes: withIds };
        setAxesSessions(prev => [newSession, ...prev]);
        showToast("✓ 6 axes générés !");
        setTab("axes");
      } else showToast("⚠️ Format inattendu, réessayez");
    } catch(e) { showToast("⚠️ " + e.message); }
    setLoading("");
  }

  // ── Axes ──
  function toggleAxis(a) { setSelectedAxes(prev => prev.find(x => x.id===a.id) ? prev.filter(x=>x.id!==a.id) : [...prev,a]); }
  function toggleFav(id)  { setFavAxes(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev,id]); }

  async function regenAxes() {
    if (!profile) { showToast("⚠️ Complétez votre profil d'abord"); return; }
    await genAxes(profile);
  }

  async function regenSelected(count, kept) {
    if (!profile) return;
    setLoading("axes");
    showToast("⏳ Regénération…");
    try {
      const txt = await callAPI(
        `Profil : ${profile.name} — ${profile.vision}\nAxes à ne pas reproduire : ${JSON.stringify(kept.map(a=>a.title))}\nGénère ${count} NOUVEAUX axes LinkedIn en français.`,
        `Réponds UNIQUEMENT en JSON valide. Format : {"axes":[{"title":"...","description":"...","emoji":"..."}]} avec exactement ${count} items.`,
        700
      );
      const p = parseJSON(txt);
      if (p?.axes?.length) {
        const withIds = p.axes.map(a => ({ ...a, id: uid() }));
        const merged  = [...kept, ...withIds];
        const newSession = { id: uid(), label: `Regénération — ${today()}`, createdAt: today(), axes: merged };
        setAxesSessions(prev => [newSession, ...prev]);
        showToast(`✓ ${p.axes.length} axe(s) remplacé(s)`);
      } else showToast("⚠️ Format inattendu, réessayez");
    } catch(e) { showToast("⚠️ " + e.message); }
    setLoading("");
  }

  // ── Roadmap ──
  function newRoadmap() {
    const rm = { id: uid(), name: `Roadmap ${roadmaps.length+1}`, createdAt: today(), weeks: [] };
    setRoadmaps(prev => [...prev, rm]);
    setActiveRmId(rm.id);
    showToast("✓ Nouvelle roadmap créée");
  }

  function renameRoadmap(id) {
    const name = window.prompt("Nouveau nom :");
    if (name?.trim()) { setRoadmaps(prev => prev.map(r => r.id===id ? {...r,name:name.trim()} : r)); }
  }

  function deleteRoadmap(id) {
    setRoadmaps(prev => {
      const next = prev.filter(r => r.id!==id);
      if (activeRmId===id) setActiveRmId(next[0]?.id||null);
      return next;
    });
    showToast("Roadmap supprimée");
  }

  async function genRoadmap(duration) {
    if (!selectedAxes.length) { showToast("⚠️ Sélectionnez des axes d'abord"); return; }
    setLoading("roadmap");
    showToast("⏳ Génération de la roadmap…");
    try {
      const titles = selectedAxes.map(a=>a.title);
      const doneThemes = [...publishedWeeks].join(", ");
      const txt = await callAPI(
        `Profil : ${profile?.name||""} — ${profile?.vision||""}\nAxes : ${JSON.stringify(titles)}\nSemaines déjà publiées (thèmes à ne pas reproduire) : ${doneThemes||"aucune"}\nGénère une roadmap LinkedIn de ${duration} mois (${duration*4} semaines) en français. Répartis équitablement les axes. Pour chaque semaine : week(1-${duration*4}), month("Mois 1"..."Mois ${duration}"), theme(thème précis), detail(1 phrase d'angle), axis(exact match), tone(Inspirant/Éducatif/Provocateur/Authentique/Expert), style(Storytelling/Liste Tips/Opinion tranchée/Étude de cas/Question ouverte), hook(accroche d'exemple en français).`,
        `Réponds UNIQUEMENT en JSON valide. Format : {"weeks":[{"week":1,"month":"Mois 1","theme":"...","detail":"...","axis":"...","tone":"...","style":"...","hook":"..."}]}`,
        2000
      );
      const p = parseJSON(txt);
      if (p?.weeks?.length) {
        const rm = { id: uid(), name: `Roadmap ${duration}m — ${today()}`, createdAt: today(), weeks: p.weeks, duration };
        setRoadmaps(prev => [...prev, rm]);
        setActiveRmId(rm.id);
        showToast(`✓ Roadmap ${duration} mois générée !`);
        setTab("roadmap");
      } else showToast("⚠️ Format inattendu, réessayez");
    } catch(e) { showToast("⚠️ " + e.message); }
    setLoading("");
  }

  function goCreerFromRoadmap(week) {
    const axis = selectedAxes.find(a => a.title===week.axis) || selectedAxes[0] || null;
    setCreerPrefill({ axis, tone: week.tone, style: week.style, roadmapSug: week });
    setTab("creer");
  }

  // ── Posts ──
  function addPost(post) { setPosts(prev => [{ ...post, id: uid() }, ...prev]); }
  function deletePost(id) { setPosts(prev => prev.filter(p => p.id!==id)); }

  // ── Insights ──
  function addInsight(ins) { setInsights(prev => [ins, ...prev]); }
  function deleteInsight(id) { setInsights(prev => prev.filter(i => i.id!==id)); }

  // ── Profile picker modal ──
  const [showProfileModal, setShowProfileModal] = useState(false);

  if (!ready) return (
    <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif", background: "#F5F7FA" }}>
      <div style={{ textAlign: "center", color: C.gray400 }}>
        <div style={{ width: 40, height: 40, borderRadius: 11, background: C.navy, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 12px" }}><LogoIcon /></div>
        <p>Chargement…</p>
      </div>
    </div>
  );

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Toast msg={toast} />
      <NavBar tab={tab} setTab={setTab} profile={profile} postCount={posts.length} insightCount={insights.length} onProfileClick={() => setShowProfileModal(true)} />
      <div style={{ flex: 1, overflow: "hidden" }}>
        {tab === "profil"   && <ProfilTab profile={profile} onSave={saveProfile} onGenAxes={p => { saveProfile(p); genAxes(p); }} loading={loading} />}
        {tab === "axes"     && <AxesTab axesSessions={axesSessions} favAxes={favAxes} selectedAxes={selectedAxes} onToggle={toggleAxis} onToggleFav={toggleFav} onRegen={regenAxes} onRegenSelected={regenSelected} onGoRoadmap={() => { newRoadmap(); setTab("roadmap"); }} onGoCreer={() => setTab("creer")} loading={loading} />}
        {tab === "roadmap"  && <RoadmapTab roadmaps={roadmaps} activeRmId={activeRmId} onSetActive={setActiveRmId} onNewRoadmap={newRoadmap} onRenameRoadmap={renameRoadmap} onDeleteRoadmap={deleteRoadmap} onGenRoadmap={genRoadmap} onGoCreer={goCreerFromRoadmap} loading={loading} publishedWeeks={publishedWeeks} onMarkPublished={w => setPublishedWeeks(p => new Set([...p, w]))} selectedAxes={selectedAxes} />}
        {tab === "creer"    && <CreerTab profile={profile} selectedAxes={selectedAxes} prefill={creerPrefill} onSavePost={p => { addPost(p); }} setToast={showToast} />}
        {tab === "mesposts" && <MesPostsTab posts={posts} onDelete={deletePost} />}
        {tab === "insights" && <InsightsTab insights={insights} posts={posts} onAddInsight={addInsight} onDeleteInsight={deleteInsight} setToast={showToast} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
