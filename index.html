<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Strategy AI</title>
  <link rel="stylesheet" href="src/index.css">
</head>
<body>
  <div id="root"></div>

  <!-- Netlify Identity -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- React + Babel via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- 1. Globals (fonctions, constantes, composants UI) -->
  <script src="src/globals.js"></script>

  <!-- 2. Features -->
  <script type="text/babel" src="src/features/profil/ProfilTab.js"></script>
  <script type="text/babel" src="src/features/axes/AxesTab.js"></script>
  <script type="text/babel" src="src/features/roadmap/RoadmapTab.js"></script>
  <script type="text/babel" src="src/features/creer/CreerTab.js"></script>
  <script type="text/babel" src="src/features/mesposts/MesPostsTab.js"></script>
  <script type="text/babel" src="src/features/insights/InsightsTab.js"></script>

  <!-- 3. Layout -->
  <script type="text/babel" src="src/components/layout/NavBar.js"></script>

  <!-- 4. Auth -->
  <script type="text/babel" src="src/pages/LoginPage.js"></script>
  <script type="text/babel" src="src/auth/AuthContext.js"></script>
  <script type="text/babel" src="src/auth/ProtectedRoute.js"></script>

  <!-- 5. App shell -->
  <script type="text/babel" src="src/App.js"></script>

  <!-- 6. Point d'entrée -->
  <script type="text/babel">
    const { AuthProvider }   = window;
    const { ProtectedRoute } = window;
    const { AppShell }       = window;

    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(AuthProvider, null,
        React.createElement(ProtectedRoute, null,
          React.createElement(AppShell, null)
        )
      )
    );
  </script>

</body>
</html>
