function parseJSON(txt) {
  if (!txt) return null;
  var c = txt.replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
  try { return JSON.parse(c); } catch {}
  var m = c.match(/\{[\s\S]*\}/); if (m) try { return JSON.parse(m[0]); } catch {}
  var a = c.match(/\[[\s\S]*\]/); if (a) try { return { weeks: JSON.parse(a[0]) }; } catch {}
  return null;
}

async function getToken() {
  var user = netlifyIdentity.currentUser();
  if (!user) throw new Error("Non authentifié");
  try { await user.jwt(true); user = netlifyIdentity.currentUser(); } catch {}
  var token = user?.token?.access_token;
  if (!token) throw new Error("Token invalide");
  return token;
}

async function callClaude(userMsg, system, maxTokens) {
  const token = await getToken();
  var res = await fetch("/.netlify/functions/claude", {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
    body: JSON.stringify({system:system||"", max_tokens:maxTokens||1200, messages:[{role:"user",content:userMsg}]}),
  });
  if (!res.ok) { var e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||"Erreur "+res.status); }
  var d = await res.json();
  return d?.content?.[0]?.text || "";
}

// ─── NETLIFY BLOBS ────────────────────────────────────────────────
async function loadUserData() {
  try {
    const token = await getToken();
    const res = await fetch("/.netlify/functions/save", {
      headers:{"Authorization":"Bearer "+token}
    });
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

async function saveUserData(data) {
  try {
    const token = await getToken();
    await fetch("/.netlify/functions/save", {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
      body: JSON.stringify(data),
    });
  } catch(e) { console.error("Save error:", e); }
}

// ─── AUTH ─────────────────────────────────────────────────────────
var AuthContext = React.createContext(null);
function AuthProvider({children}) {
  const [user,    setUser]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [error,   setError]   = useState(null);
  function isAllowed(u) { return ALLOWED_DOMAINS.some(d=>u?.email?.endsWith(d)); }
  function logout() { netlifyIdentity.logout(); setUser(null); }
  useEffect(()=>{
    var t = setTimeout(()=>{
      setLoading(prev=>{ if(prev){ var cur=netlifyIdentity.currentUser(); if(cur&&isAllowed(cur)) setUser(cur); } return false; });
    },4000);
    netlifyIdentity.on("init", u=>{ clearTimeout(t); if(u){ if(isAllowed(u)){setUser(u);setError(null);}else{netlifyIdentity.logout();setError("Domaine non autorisé.");} } setLoading(false); });
    netlifyIdentity.on("login",u=>{ clearTimeout(t); netlifyIdentity.close(); if(isAllowed(u)){setUser(u);setError(null);}else{netlifyIdentity.logout();setError("Accès réservé aux adresses : "+ALLOWED_DOMAINS.join(", "));} setLoading(false); });
    netlifyIdentity.on("logout",()=>{ setUser(null); setLoading(false); });
    var cur=netlifyIdentity.currentUser(); if(cur){ clearTimeout(t); if(isAllowed(cur))setUser(cur); else{netlifyIdentity.logout();setError("Domaine non autorisé.");} setLoading(false); }
    return ()=>{ clearTimeout(t); netlifyIdentity.off("init"); netlifyIdentity.off("login"); netlifyIdentity.off("logout"); };
  },[]);
  return <AuthContext.Provider value={{user,loading,error,logout}}>{children}</AuthContext.Provider>;
}
function useAuth() { return React.useContext(AuthContext); }

// ─── PROFIL ───────────────────────────────────────────────────────
function ProfilTab({profile,onSave,showToast,onAxesGenerated}) {
  const [name,      setName]      = useState(profile?.name||"");
  const [vision,    setVision]    = useState(profile?.vision||"");
  const [context,   setContext]   = useState(profile?.context||"");
  const [audience,  setAudience]  = useState(profile?.audience||"");
  const [objectif,  setObjectif]  = useState(profile?.objectif||"");
  const [tonalites, setTonalites] = useState(profile?.tonalites||[]);
  const [eviter,    setEviter]    = useState(profile?.eviter||"");
  const [loading,   setLoading]   = useState(false);

  useEffect(()=>{ setName(profile?.name||""); setVision(profile?.vision||""); setContext(profile?.context||""); setAudience(profile?.audience||""); setObjectif(profile?.objectif||""); setTonalites(profile?.tonalites||[]); setEviter(profile?.eviter||""); },[profile]);

  const filledCount = [name,vision,context,audience,objectif,tonalites.length>0,eviter].filter(Boolean).length;
  const completion  = Math.round((filledCount/7)*100);
  const isValid     = name.trim()&&vision.trim()&&context.trim();
  function toggleTon(t) { setTonalites(p=>p.includes(t)?p.filter(x=>x!==t):p.length<3?[...p,t]:p); }
  function buildProfile() { return {name,vision,context,audience,objectif,tonalites,eviter}; }

  async function handleGenAxes() {
    if (!isValid) return;
    onSave(buildProfile()); setLoading(true);
    try {
      const prompt="Nom : "+name+"\nVision : "+vision+"\nContexte : "+context+(audience?"\nAudience : "+audience:"")+(objectif?"\nObjectif : "+objectif:"")+(tonalites.length?"\nTonalités : "+tonalites.join(", "):"")+"\nGénère 6 axes de contenu LinkedIn stratégiques en français.";
      const sys='Tu es un stratège LinkedIn. Réponds UNIQUEMENT en JSON valide. Format : {"axes":[{"title":"...","description":"...","emoji":"..."}]} avec exactement 6 items.';
      const parsed=parseJSON(await callClaude(prompt,sys,900));
      if (parsed?.axes?.length) { onAxesGenerated({id:uid(),label:"Génération — "+toDay(),createdAt:toDay(),axes:parsed.axes.map(a=>({...a,id:uid()}))}); }
      else showToast("⚠️ Format inattendu, réessayez");
    } catch(e) { showToast("⚠️ "+e.message); }
    setLoading(false);
  }

  const audienceTags = audience?audience.split(",").map(s=>s.trim()).filter(Boolean):[];

  return <div style={{height:"calc(100vh - 56px)",display:"grid",gridTemplateColumns:"1fr 1fr",overflow:"hidden"}}>

      <Field label="Nom ou marque" value={name} onChange={setName} placeholder="Ex : Nicolas Dupont"/>
      <Field label="Vision" value={vision} onChange={setVision} placeholder="Ex : Transformer les ESN en acteurs de l'IA" rows={4}/>
      <Field label="Contexte" value={context} onChange={setContext} placeholder="Ex : CEO d'une ESN de 80 consultants, 10 ans d'expérience…" rows={5}/>
      <p style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10,paddingBottom:5,borderBottom:"0.5px solid "+C.gray200,marginTop:16}}>Stratégie</p>
      <Field label="Audience cible" value={audience} onChange={setAudience} placeholder="Ex : DSI, dirigeants de PME, DRH"/>

        <div style={{fontSize:12,fontWeight:500,color:C.gray600,marginBottom:4}}>Tonalité dominante <span style={{fontWeight:400,color:C.gray400}}>(max 3)</span></div>
        <div>{TONALITES.map(t=><Tag key={t} label={t} active={tonalites.includes(t)} onClick={()=>toggleTon(t)}/>)}</div>

      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>

          <div><p style={{fontSize:13,fontWeight:500,color:C.gray900}}>{name||"—"}</p><p style={{fontSize:11,color:C.gray400}}>{[OBJECTIFS.find(o=>o.id===objectif)?.label,...tonalites].filter(Boolean).join(" · ")||"Complétez votre profil"}</p></div>
        </div>
        {audienceTags.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{audienceTags.map((t,i)=><span key={i} style={{padding:"2px 8px",background:C.navyLight,color:C.navy,borderRadius:4,fontSize:10,fontWeight:500}}>{t}</span>)}</div>}
      </div>
      <div style={{background:"#fff",border:"0.5px solid "+C.gray200,borderRadius:10,padding:"12px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <p style={{fontSize:12,fontWeight:500,color:C.gray900}}>Profil complété</p>
          <span style={{fontSize:14,fontWeight:500,color:completion>=80?C.green:completion>=50?C.amber:C.red}}>{completion}%</span>

          <div style={{height:6,borderRadius:10,width:completion+"%",background:completion>=80?C.green:completion>=50?C.amber:C.red,transition:"width 0.3s"}}/>

      <p style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em"}}>Comment ça marche</p>
      {[{n:"1",t:"Remplissez votre profil",d:"Identité + stratégie. 5 minutes chrono."},{n:"2",t:"Vos axes sont générés",d:"6 thèmes calibrés sur votre audience et objectif."},{n:"3",t:"Créez et planifiez",d:"Roadmap, posts, analyse, optimisation."}].map(s=><div key={s.n} style={{background:"#fff",border:"0.5px solid "+C.gray200,borderRadius:10,padding:"10px 12px",display:"flex",gap:10,alignItems:"flex-start"}}>
        <div style={{width:22,height:22,borderRadius:"50%",background:C.navyLight,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:10,fontWeight:500,color:C.navy}}>{s.n}</span></div>
        <div><p style={{fontSize:12,fontWeight:500,color:C.gray900,marginBottom:2}}>{s.t}</p><p style={{fontSize:11,color:C.gray400,lineHeight:1.4}}>{s.d}</p></div>
      </div>)}
      <div style={{marginTop:"auto",background:C.navy,borderRadius:10,padding:"10px 14px"}}>
        <p style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:2}}>Données sauvegardées dans le cloud</p>
        <p style={{fontSize:11,color:"#fff",fontWeight:500}}>Accessibles depuis n'importe quel appareil</p>
      </div>
    </div>
  </div>;
}

// ─── AXES ─────────────────────────────────────────────────────────
function AxesTab({axesSessions,favAxes,selectedAxes,onToggleAxis,onToggleFav,onDeleteAxis,onAxesGenerated,profile,showToast,onGoRoadmap}) {
  const [mode,    setMode]    = useState("select");
  const [marked,  setMarked]  = useState([]);
  const [filter,  setFilter]  = useState("all");
  const [loading, setLoading] = useState(false);

  const allAxes    = axesSessions.flatMap(s=>s.axes);
  const usedIds    = new Set(selectedAxes.map(a=>a.id));
  const favIds     = new Set(favAxes);
  const seen       = new Set();
  const uniqueAxes = allAxes.filter(a=>{ if(seen.has(a.title))return false; seen.add(a.title); return true; });
  const filtered   = uniqueAxes.filter(a=>{
    if(filter==="fav")  return favIds.has(a.id);
    if(filter==="used") return usedIds.has(a.id);
    if(filter==="new")  return !usedIds.has(a.id)&&!favIds.has(a.id);
    return true;
  });

  async function regen(count,toKeep) {
    if (!profile) { showToast("⚠️ Complétez votre profil d'abord"); return; }
    setLoading(true);
    try {
      const prompt="Profil : "+profile.name+" — "+profile.vision+"\nAxes existants à ne pas reproduire : "+JSON.stringify(toKeep.map(a=>a.title))+"\nGénère "+count+" nouveaux axes LinkedIn différents en français.";
      const sys='Réponds UNIQUEMENT en JSON valide. Format : {"axes":[{"title":"...","description":"...","emoji":"..."}]} avec exactement '+count+' items.';
      const parsed=parseJSON(await callClaude(prompt,sys,900));
      if (parsed?.axes?.length) {
        const withIds=parsed.axes.map(a=>({...a,id:uid()}));
        onAxesGenerated({id:uid(),label:"Regénération — "+toDay(),createdAt:toDay(),axes:count===6?withIds:toKeep.concat(withIds)});
        setMarked([]); setMode("select"); showToast("✓ "+parsed.axes.length+" axe(s) générés");
      } else showToast("⚠️ Format inattendu");
    } catch(e) { showToast("⚠️ "+e.message); }
    setLoading(false);
  }

  return <div style={{height:"calc(100vh - 56px)",display:"flex",flexDirection:"column"}}>
    {/* Toolbar filtres */}
    <div style={{height:44,background:"#fff",borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",padding:"0 1.25rem",gap:6,flexShrink:0}}>
      <Pill active={filter==="all"}  onClick={()=>setFilter("all")}>Tous ({uniqueAxes.length})</Pill>
      <Pill active={filter==="fav"}  onClick={()=>setFilter("fav")}>Favoris ★ {favAxes.length}</Pill>
      <Pill active={filter==="used"} onClick={()=>setFilter("used")}>Sélectionnés ✓ {selectedAxes.length}</Pill>
      <Pill active={filter==="new"}  onClick={()=>setFilter("new")}>Nouveaux</Pill>
      <div style={{marginLeft:"auto",display:"flex",gap:6}}>
        <Pill warn={mode==="replace"} onClick={()=>{ setMode(m=>m==="replace"?"select":"replace"); setMarked([]); }}>{mode==="replace"?"✕ Annuler":"↺ Remplacer"}</Pill>
        <Pill onClick={()=>regen(6,[])} disabled={loading}>{loading?"…":"↺ Regénérer"}</Pill>
      </div>
    </div>
    {mode==="replace"&&marked.length>0&&<div style={{background:"#FEF3C7",border:"0.5px solid "+C.amber,padding:"8px 1.25rem",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
      <span style={{fontSize:12,color:"#92400E"}}>{marked.length} axe(s) à remplacer</span>
      <Pill warn onClick={()=>regen(marked.length,uniqueAxes.filter(a=>!marked.find(x=>x.id===a.id)))} style={{marginLeft:"auto"}}>{loading?"…":"↺ Remplacer "+marked.length+" axe(s)"}</Pill>
    </div>}
    {/* Grille */}
    <div style={{flex:1,overflowY:"auto",padding:"1rem 1.25rem",background:C.gray50}}>
      {filtered.length===0?<Empty icon="🎯" text="Aucun axe trouvé."/>:
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:10}}>
          {filtered.map(a=>{
            const isSel=usedIds.has(a.id),isFav=favIds.has(a.id),isMk=!!marked.find(x=>x.id===a.id);
            return <div key={a.id} onClick={()=>{ if(mode==="replace") setMarked(p=>p.find(x=>x.id===a.id)?p.filter(x=>x.id!==a.id):[...p,a]); else onToggleAxis(a); }}
              style={{borderWidth:isSel&&!isMk?"1.5px":"0.5px",borderStyle:"solid",borderColor:isMk?C.amber:isSel?C.navy:isFav?C.amber:C.gray200,borderRadius:10,padding:12,background:isMk?"#FFFBEB":isSel?C.navyLight:"#fff",cursor:"pointer",display:"flex",flexDirection:"column",gap:6}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <span style={{fontSize:16}}>{a.emoji}</span>
                <div style={{display:"flex",gap:5,alignItems:"center"}}>
                  {mode!=="replace"&&<span onClick={e=>{e.stopPropagation();onToggleFav(a.id);}} style={{fontSize:13,color:isFav?C.amber:C.gray200,cursor:"pointer"}}>{isFav?"★":"☆"}</span>}
                  {isSel&&mode!=="replace"&&<div style={{width:14,height:14,borderRadius:"50%",background:C.navy,color:"#fff",fontSize:8,display:"flex",alignItems:"center",justifyContent:"center"}}>✓</div>}
                  {isMk&&<span style={{fontSize:10,background:C.amber,color:"#fff",borderRadius:4,padding:"1px 5px"}}>↺</span>}
                  {mode!=="replace"&&<button onClick={e=>{e.stopPropagation();onDeleteAxis(a.id);}} style={{fontSize:11,color:C.gray400,background:"none",border:"none",cursor:"pointer",padding:"0 2px",fontFamily:"inherit"}}>✕</button>}
                </div>
              </div>
              <p style={{fontSize:12,fontWeight:500,color:isSel?C.navy:C.gray900}}>{a.title}</p>
              <p style={{fontSize:11,color:C.gray400,lineHeight:1.3}}>{a.description}</p>
              {(isSel||isFav)&&<span style={{fontSize:9,padding:"1px 5px",borderRadius:3,alignSelf:"flex-start",background:isSel?"#F0FDF4":isFav?"#FEF3C7":"transparent",color:isSel?"#15803D":isFav?"#92400E":"transparent"}}>{isSel?"✓ Sélectionné":isFav?"★ Favori":""}</span>}
            </div>;
          })}
        </div>
      }
    </div>
    {/* Footer CTA — plus visible */}
    {selectedAxes.length>0&&mode==="select"&&(
      <div style={{background:"#fff",borderTop:"2px solid "+C.navy,padding:"16px 1.25rem",display:"flex",alignItems:"center",gap:16,flexShrink:0,boxShadow:"0 -4px 12px rgba(30,58,95,0.08)"}}>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <span style={{fontSize:13,fontWeight:500,color:C.gray900}}>{selectedAxes.length} axe{selectedAxes.length>1?"s":""} sélectionné{selectedAxes.length>1?"s":""}</span>
          <span style={{fontSize:11,color:C.navy}}>{selectedAxes.slice(0,3).map(a=>a.title).join(" · ")}{selectedAxes.length>3?" …":""}</span>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          <Btn variant="ghost" onClick={()=>{}}>→ Créer un post</Btn>
          <Btn onClick={onGoRoadmap}>→ Générer la roadmap</Btn>
        </div>
      </div>
    )}
  </div>;
}

// ─── ROADMAP ──────────────────────────────────────────────────────
function RoadmapTab({roadmaps,activeRmId,onSetActive,onNewRoadmap,onRenameRoadmap,onDeleteRoadmap,onRoadmapGenerated,onGoCreer,pubWeeks,selectedAxes,profile,showToast}) {
  const [dur,         setDur]         = useState(6);
  const [openQ,       setOpenQ]       = useState([0]);
  const [loading,     setLoading]     = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const activeRm = roadmaps.find(r=>r.id===activeRmId)||roadmaps[0];
  const weeks    = activeRm?.weeks||[];
  const monthSet = []; weeks.forEach(w=>{ if(!monthSet.includes(w.month)) monthSet.push(w.month); });
  const quarters = [];
  for (let i=0;i<monthSet.length;i+=3) {
    const qM=monthSet.slice(i,i+3), qW=weeks.filter(w=>qM.includes(w.month));
    quarters.push({index:i/3,months:qM,weeks:qW,done:qW.filter(w=>pubWeeks.has(w.week)).length,current:qW.find(w=>!pubWeeks.has(w.week))});
  }

  async function handleGen() {
    if (!selectedAxes.length) { showToast("⚠️ Sélectionnez des axes d'abord"); return; }
    setLoading(true); showToast("⏳ Génération en cours…");
    try {
      const prompt="Profil : "+(profile?.name||"")+" — "+(profile?.vision||"")+"\nAxes : "+JSON.stringify(selectedAxes.map(a=>a.title))+"\nGénère une roadmap LinkedIn de "+dur+" mois ("+(dur*4)+" semaines).\nIMPORTANT : sois très concis, max 5 mots par champ.\nRéponds UNIQUEMENT avec un objet JSON valide, sans texte avant ou après.";
      const sys='{"weeks":[{"week":1,"month":"Mois 1","theme":"Titre court","detail":"Une phrase","axis":"Axe exact","tone":"Inspirant","style":"Storytelling","hook":"Accroche"}]}';
      let parsed=parseJSON(await callClaude(prompt,sys,2500));
      if (parsed&&!parsed.weeks&&Array.isArray(parsed)) parsed={weeks:parsed};
      if (parsed?.weeks?.length) { onRoadmapGenerated({id:uid(),name:"Roadmap "+dur+"m — "+toDay(),createdAt:toDay(),weeks:parsed.weeks,dur}); }
      else showToast("⚠️ Format inattendu");
    } catch(e) { showToast("⚠️ "+e.message); }
    setLoading(false);
  }

  return <div style={{display:"grid",gridTemplateColumns:sidebarOpen?"220px 1fr":"44px 1fr",height:"calc(100vh - 56px)",transition:"grid-template-columns 0.2s"}}>
    <div style={{background:C.gray50,borderRight:"0.5px solid "+C.gray200,padding:"10px 0",display:"flex",flexDirection:"column",alignItems:sidebarOpen?"stretch":"center",gap:6,overflowY:"auto"}}>
      <button onClick={()=>setSidebarOpen(o=>!o)} style={{width:30,height:30,borderRadius:8,background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",margin:sidebarOpen?"0 10px 8px":"0 auto 8px",border:"none"}}>
        <span style={{color:"#fff",fontSize:14,transform:sidebarOpen?"rotate(180deg)":"none",transition:"transform 0.2s"}}>›</span>
      </button>
      {roadmaps.map((rm,i)=><div key={rm.id} onClick={()=>onSetActive(rm.id)} style={{borderRadius:6,border:"0.5px solid "+(rm.id===activeRmId?C.navy:C.gray200),background:rm.id===activeRmId?C.navyLight:"#fff",cursor:"pointer",display:"flex",alignItems:"center",...(sidebarOpen?{padding:"8px 10px",margin:"0 8px",gap:8}:{width:28,height:28,justifyContent:"center",margin:"0 auto"})}}>
        {sidebarOpen?<React.Fragment><div style={{flex:1,minWidth:0}}><p style={{fontSize:12,fontWeight:500,color:rm.id===activeRmId?C.navy:C.gray900,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rm.name}</p><p style={{fontSize:10,color:C.gray400}}>{rm.weeks?.length||0} sem.</p></div><button onClick={e=>{e.stopPropagation();onDeleteRoadmap(rm.id);}} style={{fontSize:11,color:C.gray400,background:"none",border:"none",cursor:"pointer"}}>✕</button></React.Fragment>:<span style={{fontSize:9,fontWeight:500,color:rm.id===activeRmId?C.navy:C.gray600}}>R{i+1}</span>}
      </div>)}
      {sidebarOpen?<Btn sm onClick={onNewRoadmap} style={{margin:"4px 8px 0"}}>+ Nouvelle</Btn>:<div onClick={onNewRoadmap} style={{width:28,height:28,borderRadius:6,border:"0.5px dashed "+C.gray200,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",margin:"0 auto"}}><span style={{fontSize:14,color:C.gray400}}>+</span></div>}
    </div>
    <div style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{height:48,background:C.gray50,borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",padding:"0 1.25rem",gap:10,flexShrink:0,flexWrap:"wrap"}}>
        {activeRm&&<React.Fragment><span style={{fontSize:12,fontWeight:500,color:C.gray900}}>{activeRm.name}</span><span style={{fontSize:10,padding:"2px 8px",background:C.navyLight,color:C.navy,borderRadius:20,fontWeight:500}}>Active</span></React.Fragment>}
        <span style={{fontSize:11,color:C.gray600,marginLeft:8}}>Durée :</span>
        <div style={{display:"flex",gap:3}}>
          {DURATIONS.map(d=><button key={d} onClick={()=>setDur(d)} style={{width:34,height:30,borderRadius:7,border:"0.5px solid "+(dur===d?C.navy:C.gray200),background:dur===d?C.navy:"#fff",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,fontFamily:"inherit"}}>
            <span style={{fontSize:11,fontWeight:500,color:dur===d?"#fff":C.gray600,lineHeight:1}}>{d}</span>
            <span style={{fontSize:8,color:dur===d?"rgba(255,255,255,0.7)":C.gray400,lineHeight:1}}>m</span>
          </button>)}
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:6}}>
          {activeRm&&<Btn sm variant="secondary" onClick={()=>onRenameRoadmap(activeRm.id)}>Renommer</Btn>}
          <Btn sm onClick={handleGen} disabled={loading||!selectedAxes.length}>{loading?"Génération…":activeRm?.weeks?.length?"↺ Regénérer":"→ Générer"}</Btn>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"1rem 1.25rem",background:C.gray50}}>
        {!selectedAxes.length&&<div style={{background:"#FEF3C7",border:"0.5px solid "+C.amber,borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#92400E"}}>⚠ Sélectionnez d'abord vos axes.</div>}
        {!(activeRm?.weeks?.length)?<Empty icon="🗓" text="Cliquez sur Générer pour créer votre première roadmap." btnLabel={selectedAxes.length?"Générer":null} onBtn={selectedAxes.length?handleGen:null}/>:
          quarters.map((q,qi)=>{
            const isOpen=openQ.includes(qi);
            return <div key={qi} style={{marginBottom:8}}>
              <div onClick={()=>setOpenQ(p=>p.includes(qi)?p.filter(x=>x!==qi):[...p,qi])} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",userSelect:"none",background:isOpen?C.navyLight:C.gray100,border:"0.5px solid "+(isOpen?C.navy:C.gray200),borderRadius:isOpen?"9px 9px 0 0":"9px"}}>
                <span style={{fontSize:12,fontWeight:500,color:C.navy}}>Trimestre {q.index+1}</span>
                <span style={{fontSize:11,color:C.gray400}}>{q.months.join(" · ")}</span>
                <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:12}}>
                  {q.done>0&&<span style={{fontSize:11,color:C.green}}>{q.done} publié{q.done>1?"s":""}</span>}
                  <span style={{fontSize:12,color:C.gray400,transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.15s"}}>›</span>
                </div>
              </div>
              {isOpen&&<div style={{border:"0.5px solid "+C.navy,borderTop:"none",borderRadius:"0 0 9px 9px",padding:12,background:"#fff"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                  {q.months.map(month=><div key={month}>
                    <div style={{fontSize:10,fontWeight:500,color:C.navy,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8,paddingBottom:5,borderBottom:"0.5px solid "+C.gray200}}>{month}</div>
                    {q.weeks.filter(w=>w.month===month).map(w=>{
                      const isDone=pubWeeks.has(w.week),isCur=q.current?.week===w.week;
                      return <div key={w.week} style={{border:"0.5px solid "+(isCur?C.navy:C.gray200),borderRadius:7,padding:9,marginBottom:7,background:isCur?C.navyLight:"#fff",opacity:isDone?0.55:1}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                          <span style={{fontSize:10,color:C.gray400}}>Sem. {w.week}</span>
                          {isDone?<span style={{fontSize:10,color:C.green,fontWeight:500}}>✓ Publié</span>:<button onClick={()=>onGoCreer(w)} style={{fontSize:10,color:C.navy,border:"0.5px solid "+C.navyMid,borderRadius:4,padding:"2px 6px",background:C.navyLight,cursor:"pointer",fontFamily:"inherit"}}>Créer →</button>}
                        </div>
                        <p style={{fontSize:12,fontWeight:500,lineHeight:1.3,marginBottom:3}}>{w.theme}</p>
                        <p style={{fontSize:11,color:C.gray400,lineHeight:1.4,marginBottom:5}}>{w.detail}</p>
                        <span style={{padding:"2px 6px",background:C.navyLight,color:C.navy,borderRadius:4,fontSize:10,fontWeight:500}}>{w.axis}</span>
                      </div>;
                    })}
                  </div>)}
                </div>
              </div>}
            </div>;
          })
        }
      </div>
    </div>
  </div>;
}

// ─── GÉNÉRER — 2 colonnes ─────────────────────────────────────────
function GenererTab({profile,selectedAxes,prefill,onSavePost,showToast,post,setPost,onGoInterview,onGoAnalyser,onGoOptimiser}) {
  const [axis,    setAxis]    = useState(prefill?.axis||selectedAxes[0]||null);
  const [tone,    setTone]    = useState(prefill?.tone||"");
  const [style,   setStyle]   = useState(prefill?.style||"");
  const [loading, setLoading] = useState(false);

  useEffect(()=>{ if(prefill?.axis) setAxis(prefill.axis); if(prefill?.tone) setTone(prefill.tone); if(prefill?.style) setStyle(prefill.style); },[prefill]);

  async function handleGen() {
    if (!axis||!tone||!style||!profile) return;
    setLoading(true);
    try {
      const extras=(profile.audience?"\nAudience : "+profile.audience:"")+(profile.objectif?"\nObjectif : "+profile.objectif:"")+(profile.tonalites?.length?"\nTonalités : "+profile.tonalites.join(", "):"")+(profile.eviter?"\nMots à éviter : "+profile.eviter:"");
      const sug=prefill?.roadmapSug?"\nThème suggéré : "+prefill.roadmapSug.theme:"";
      const prompt="Profil : "+profile.name+" — "+profile.vision+"\nContexte : "+profile.context+extras+"\nAxe : "+axis.title+" — "+axis.description+"\nTon : "+tone+"\nStyle : "+style+sug+"\nGénère le post LinkedIn.";
      setPost(await callClaude(prompt,LINKEDIN_RULES,1200));
    } catch(e) { showToast("⚠️ "+e.message); }
    setLoading(false);
  }

  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",height:"100%",overflow:"hidden"}}>
    {/* Colonne gauche : paramètres */}
    <div style={{background:"#fff",borderRight:"0.5px solid "+C.gray200,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto",padding:"1.25rem",display:"flex",flexDirection:"column",gap:16}}>
        <div>
          <div style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Axe</div>
          {selectedAxes.length>0?selectedAxes.map(a=><div key={a.id} onClick={()=>setAxis(a)} style={{padding:"8px 10px",borderRadius:8,cursor:"pointer",fontSize:12,border:"1.5px solid "+(axis?.id===a.id?C.navy:C.gray200),background:axis?.id===a.id?C.navyLight:"#fff",fontWeight:axis?.id===a.id?500:400,color:axis?.id===a.id?C.navy:C.gray900,marginBottom:5}}>{a.emoji} {a.title}</div>):<p style={{fontSize:12,color:C.gray400}}>Aucun axe sélectionné.</p>}
        </div>
        <div>
          <div style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Ton</div>
          {TONES.map(t=><Tag key={t} label={t} active={tone===t} onClick={()=>setTone(t)}/>)}
        </div>
        <div>
          <div style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Style</div>
          {STYLES.map(s=><Tag key={s} label={s} active={style===s} onClick={()=>setStyle(s)}/>)}
        </div>
      </div>
      <div style={{padding:"1rem 1.25rem",borderTop:"0.5px solid "+C.gray200,flexShrink:0}}>
        <Btn onClick={handleGen} disabled={!axis||!tone||!style||loading} full>{loading?"Génération…":"✦ Générer le post"}</Btn>
      </div>
    </div>
    {/* Colonne droite : post */}
    <div style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"10px 16px",borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fff",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:12,fontWeight:500}}>Post généré</span>{post&&<CharBadge n={post.length}/>}</div>
        {post&&<div style={{display:"flex",gap:12}}>
          <InlineBtn onClick={()=>navigator.clipboard.writeText(post)} color={C.navy}>Copier</InlineBtn>
          <InlineBtn onClick={()=>{onSavePost({content:post,axis:axis?.title||"",tone,style});showToast("✓ Post sauvegardé");}} color={C.green}>💾 Sauver</InlineBtn>
        </div>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"1.5rem 2.5rem"}}>
        {post?<p style={{fontSize:13,lineHeight:1.85,color:C.gray900,whiteSpace:"pre-wrap",maxWidth:640,margin:"0 auto"}}>{post}</p>:<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%"}}><p style={{fontSize:13,color:C.gray400}}>Le post apparaîtra ici après génération.</p></div>}
      </div>
      {post&&<div style={{padding:"10px 16px",borderTop:"0.5px solid "+C.gray200,display:"flex",gap:6,background:"#fff",flexShrink:0,flexWrap:"wrap"}}>
        <Pill onClick={handleGen} disabled={loading}>↺ Regénérer</Pill>
        <Pill onClick={()=>onGoInterview(post)}>→ Interview</Pill>
        <Pill onClick={()=>onGoAnalyser(post)}>→ Analyser</Pill>
        <Pill onClick={()=>onGoOptimiser(post)}>→ Optimiser</Pill>
      </div>}
    </div>
  </div>;
}

// ─── INTERVIEW ────────────────────────────────────────────────────
function InterviewTab({basePost,setBasePost,enriched,setEnriched,onSavePost,showToast,onGoAnalyser,onGoOptimiser}) {
  const [questions, setQuestions] = useState([]);
  const [answers,   setAnswers]   = useState({});
  const [loadQ,     setLoadQ]     = useState(false);
  const [loadE,     setLoadE]     = useState(false);
  const [regenIdx,  setRegenIdx]  = useState(null);

  async function handleGenQ() {
    if (!basePost.trim()) return;
    setLoadQ(true);
    try {
      const p=parseJSON(await callClaude("Post :\n"+basePost+"\n\nPose 3 questions courtes pour extraire le vécu de l'auteur.",'Réponds UNIQUEMENT en JSON valide. Format : {"questions":["Q1","Q2","Q3"]}',400));
      if(p?.questions) { setQuestions(p.questions); setAnswers({}); }
    } catch(e) { showToast("⚠️ "+e.message); }
    setLoadQ(false);
  }

  async function handleRegenQ(idx) {
    setRegenIdx(idx);
    try {
      const others=questions.filter((_,i)=>i!==idx);
      const p=parseJSON(await callClaude("Post :\n"+basePost+"\nQuestions existantes : "+JSON.stringify(others)+"\n\nGénère 1 nouvelle question différente.",'Réponds UNIQUEMENT en JSON valide. Format : {"question":"..."}',200));
      if(p?.question) setQuestions(prev=>prev.map((q,i)=>i===idx?p.question:q));
    } catch(e) { showToast("⚠️ "+e.message); }
    setRegenIdx(null);
  }

  async function handleEnrich() {
    setLoadE(true);
    try {
      const qa=questions.map((q,i)=>"Q: "+q+"\nR: "+(answers[i]||"—")).join("\n\n");
      setEnriched(await callClaude("Post original :\n"+basePost+"\n\nVécu de l'auteur :\n"+qa+"\n\nRéécris ce post en intégrant naturellement ces éléments personnels.",LINKEDIN_RULES,1200));
    } catch(e) { showToast("⚠️ "+e.message); }
    setLoadE(false);
  }

  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",height:"100%",overflow:"hidden"}}>
    {/* Gauche */}
    <div style={{borderRight:"0.5px solid "+C.gray200,display:"flex",flexDirection:"column",background:"#fff",overflow:"hidden"}}>
      {/* Post de base */}
      <div style={{flexShrink:0,borderBottom:"0.5px solid "+C.gray200}}>
        <div style={{padding:"10px 16px",borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:12,fontWeight:500}}>Post de base</span>
          <span style={{fontSize:11,color:C.gray400}}>depuis Générer ou coller</span>
        </div>
        <div style={{padding:"1rem 1.25rem"}}>
          <textarea value={basePost} onChange={e=>{setBasePost(e.target.value);setQuestions([]);setAnswers({});setEnriched("");}} placeholder="Collez votre post ici…" rows={5} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"0.5px solid "+C.gray200,fontSize:12,resize:"none",outline:"none",fontFamily:"inherit",background:C.gray50,lineHeight:1.6}}/>
        </div>
        <div style={{padding:"0 1.25rem 1rem"}}>
          <Btn onClick={handleGenQ} disabled={loadQ||!basePost.trim()} full>{loadQ?"Génération…":"Générer les questions →"}</Btn>
        </div>
      </div>
      {/* Questions */}
      {questions.length>0&&<div style={{flex:1,overflowY:"auto",padding:"1rem 1.25rem",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em"}}>Questions</span>
          <span style={{fontSize:11,fontWeight:500,color:C.green,background:C.green+"18",padding:"2px 8px",borderRadius:6}}>3 générées</span>
        </div>
        {questions.map((q,i)=><div key={i}>
          <div style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:6}}>
            <div style={{background:C.navyLight,borderLeft:"3px solid "+C.navy,borderRadius:"0 8px 8px 0",padding:"8px 10px",flex:1}}><p style={{fontSize:12,fontWeight:500,color:C.navy}}>{q}</p></div>
            <button onClick={()=>handleRegenQ(i)} disabled={regenIdx===i} style={{padding:"3px 8px",borderRadius:6,fontSize:10,fontWeight:500,color:C.gray600,border:"0.5px solid "+C.gray200,background:"#fff",cursor:"pointer",fontFamily:"inherit",flexShrink:0,opacity:regenIdx===i?0.5:1}}>{regenIdx===i?"…":"↺"}</button>
          </div>
          <textarea value={answers[i]||""} onChange={e=>{const v=e.target.value;setAnswers(p=>({...p,[i]:v}));}} placeholder="Votre réponse…" rows={2} style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"0.5px solid "+C.gray200,fontSize:12,resize:"none",outline:"none",fontFamily:"inherit",background:C.gray50}}/>
        </div>)}
        <Btn onClick={handleEnrich} disabled={loadE} full>{loadE?"Réécriture…":"✦ Réécrire avec mon vécu"}</Btn>
      </div>}
    </div>
    {/* Droite : post enrichi */}
    <div style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"10px 16px",borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fff",flexShrink:0,borderTop:enriched?"3px solid "+C.green:"none"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:12,fontWeight:500,color:enriched?C.green:C.gray900}}>Post enrichi</span>{enriched&&<CharBadge n={enriched.length}/>}</div>
        {enriched&&<div style={{display:"flex",gap:10}}>
          <InlineBtn onClick={()=>navigator.clipboard.writeText(enriched)} color={C.navy}>Copier</InlineBtn>
          <InlineBtn onClick={()=>{onSavePost({content:enriched,axis:"",tone:"",style:""});showToast("✓ Post sauvegardé");}} color={C.green}>💾 Sauver</InlineBtn>
        </div>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"1.5rem 2rem"}}>
        {enriched?<p style={{fontSize:13,lineHeight:1.85,color:C.gray900,whiteSpace:"pre-wrap",maxWidth:580,margin:"0 auto"}}>{enriched}</p>:<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:12}}>
          <div style={{width:40,height:40,borderRadius:"50%",border:"1.5px solid "+C.gray200,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:14,height:14,borderRadius:"50%",background:C.navy,opacity:0.25}}/></div>
          <p style={{fontSize:12,color:C.gray400,textAlign:"center",lineHeight:1.5}}>Le post enrichi<br/>apparaîtra ici</p>
        </div>}
      </div>
      {enriched&&<div style={{padding:"10px 16px",borderTop:"0.5px solid "+C.gray200,display:"flex",gap:6,background:"#fff",flexShrink:0,flexWrap:"wrap"}}>
        <Pill onClick={handleEnrich} disabled={loadE}>↺ Regénérer</Pill>
        <Pill onClick={()=>onGoAnalyser(enriched)}>→ Analyser</Pill>
        <Pill onClick={()=>onGoOptimiser(enriched)}>→ Optimiser</Pill>
      </div>}
    </div>
  </div>;
}

// ─── ANALYSER ─────────────────────────────────────────────────────
function AnalyserTab({analyserPost,setAnalyserPost,analysis,setAnalysis,showToast,onGoOptimiser}) {
  const [loading,setLoading]=useState(false);

  async function handleAnalyze() {
    if (!analyserPost) return;
    setLoading(true); setAnalysis(null);
    let attempts = 0;
    while (attempts < 3) {
      try {
        const sys = 'Tu es un expert LinkedIn. Tu DOIS répondre UNIQUEMENT avec un objet JSON valide, sans aucun texte avant ou après, sans balises markdown, sans explication. Réponds SEULEMENT avec ce JSON : {"score":7,"hook":{"note":6,"comment":"commentaire"},"structure":{"note":7,"comment":"commentaire"},"ton":{"note":8,"comment":"commentaire"},"longueur":{"note":5,"comment":"commentaire"},"points_forts":["point 1","point 2"],"points_faibles":["point 1"],"recommandations":["reco 1","reco 2"]}';
        const userMsg = 'Analyse ce post LinkedIn et retourne UNIQUEMENT le JSON demandé :\n\n' + analyserPost;
        const txt = await callClaude(userMsg, sys, 1200);
        const p = parseJSON(txt);
        if (p?.score !== undefined) {
          setAnalysis(p);
          setLoading(false);
          return;
        }
      } catch(e) {
        if (attempts === 2) { showToast("⚠️ " + e.message); }
      }
      attempts++;
    }
    showToast("⚠️ Analyse échouée après 3 tentatives, réessayez");
    setLoading(false);
  }

  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",height:"100%",overflow:"hidden"}}>
    {/* Post */}
    <div style={{background:"#fff",borderRight:"0.5px solid "+C.gray200,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"10px 16px",borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <span style={{fontSize:12,fontWeight:500}}>Post à analyser</span>
        <CharBadge n={analyserPost.length}/>
      </div>
      <div style={{flex:1,padding:"1rem 1.25rem",overflow:"hidden",display:"flex",flexDirection:"column",gap:12}}>
        <textarea value={analyserPost} onChange={e=>{setAnalyserPost(e.target.value);setAnalysis(null);}} placeholder="Collez votre post ici…" style={{flex:1,width:"100%",padding:"9px 12px",borderRadius:8,border:"0.5px solid "+C.gray200,fontSize:13,resize:"none",outline:"none",fontFamily:"inherit",background:C.gray50,lineHeight:1.8}}/>
      </div>
      <div style={{padding:"10px 16px",borderTop:"0.5px solid "+C.gray200,flexShrink:0}}>
        <Btn onClick={handleAnalyze} disabled={!analyserPost||loading} full>{loading?"Analyse…":"Analyser ce post"}</Btn>
      </div>
    </div>
    {/* Résultats */}
    <div style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {!analysis
        ?<div style={{display:"flex",alignItems:"center",justifyContent:"center",flex:1}}><p style={{fontSize:13,color:C.gray400}}>Les résultats apparaîtront ici.</p></div>
        :<React.Fragment>
          <div style={{padding:"14px 16px",borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",gap:16,flexShrink:0,background:"#fff"}}>
            <div style={{textAlign:"center",flexShrink:0}}>
              <p style={{fontSize:10,color:C.gray400,marginBottom:2}}>Score</p>
              <span style={{fontSize:32,fontWeight:500,color:analysis.score>=7?C.green:analysis.score>=5?C.amber:C.red,lineHeight:1}}>{analysis.score}<span style={{fontSize:13,color:C.gray400}}>/10</span></span>
            </div>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:5}}>
              {[{k:"hook",l:"Hook"},{k:"structure",l:"Structure"},{k:"ton",l:"Ton"},{k:"longueur",l:"Longueur"}].map(x=>analysis[x.k]?<div key={x.k}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:11,fontWeight:500}}>{x.l}</span><span style={{fontSize:11,fontWeight:500,color:analysis[x.k].note>=7?C.green:analysis[x.k].note>=5?C.amber:C.red}}>{analysis[x.k].note}/10</span></div>
                <div style={{height:3,background:C.gray100,borderRadius:10}}><div style={{height:3,borderRadius:10,width:(analysis[x.k].note*10)+"%",background:analysis[x.k].note>=7?C.green:analysis[x.k].note>=5?C.amber:C.red}}/></div>
              </div>:null)}
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:10}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {analysis.points_forts?.length>0&&<div style={{background:"#F0FDF4",borderRadius:8,padding:10}}><p style={{fontSize:10,fontWeight:500,color:"#15803D",marginBottom:5}}>Points forts</p>{analysis.points_forts.map((p,i)=><p key={i} style={{fontSize:11,color:"#166534",marginBottom:2}}>· {p}</p>)}</div>}
              {analysis.points_faibles?.length>0&&<div style={{background:"#FEF2F2",borderRadius:8,padding:10}}><p style={{fontSize:10,fontWeight:500,color:"#B91C1C",marginBottom:5}}>À améliorer</p>{analysis.points_faibles.map((p,i)=><p key={i} style={{fontSize:11,color:"#991B1B",marginBottom:2}}>· {p}</p>)}</div>}
            </div>
            {analysis.recommandations?.length>0&&<div style={{background:C.gray50,borderRadius:8,padding:10}}>
              <p style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".05em",marginBottom:7}}>Recommandations</p>
              {analysis.recommandations.map((r,i)=><p key={i} style={{fontSize:12,color:C.gray900,marginBottom:5}}>{i+1}. {r}</p>)}
            </div>}
          </div>
          <div style={{padding:"12px 16px",borderTop:"2px solid "+C.navy,background:"#fff",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 -4px 12px rgba(30,58,95,0.08)"}}>
            <div style={{display:"flex",gap:8}}>
              <Btn variant="secondary" onClick={()=>{onSavePost({content:analyserPost,axis:"",tone:"",style:""});showToast("✓ Post sauvegardé");}}>💾 Sauver ce post</Btn>
              <Btn onClick={()=>onGoOptimiser(analyserPost)}>→ Optimiser ce post</Btn>
            </div>
          </div>
        </React.Fragment>
      }
    </div>
  </div>;
}

// ─── OPTIMISER — 2 colonnes ───────────────────────────────────────
function OptimiserTab({optimiserPost,setOptimiserPost,onSavePost,showToast,onGoAnalyser}) {
  const [selAxes,   setSelAxes]   = useState([]);
  const [freeInst,  setFreeInst]  = useState("");
  const [optimPost, setOptimPost] = useState("");
  const [loading,   setLoading]   = useState(false);

  async function handleOptimize() {
    if (!optimiserPost) return;
    setLoading(true);
    try {
      const desc=selAxes.map(id=>{const a=OPTIM_AXES.find(x=>x.id===id);return a?"- "+a.label+" : "+a.desc:"";}).filter(Boolean).join("\n");
      const instr=[desc,freeInst.trim()].filter(Boolean).join("\n\nInstruction libre :\n")||"Améliore globalement.";
      setOptimPost(await callClaude("Optimise :\n"+instr+"\n\nPost :\n"+optimiserPost,LINKEDIN_RULES,1200));
    } catch(e) { showToast("⚠️ "+e.message); }
    setLoading(false);
  }

  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",height:"100%",overflow:"hidden"}}>
    {/* Colonne gauche : axes + post à optimiser */}
    <div style={{background:"#fff",borderRight:"0.5px solid "+C.gray200,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto",padding:"1.25rem",display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <div style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Axes d'optimisation</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {OPTIM_AXES.map(a=>{
              const sel=selAxes.includes(a.id);
              return <div key={a.id} onClick={()=>setSelAxes(p=>sel?p.filter(x=>x!==a.id):[...p,a.id])} style={{padding:"8px 10px",borderRadius:8,border:sel?"1.5px solid "+C.navy:"0.5px solid "+C.gray200,background:sel?C.navyLight:"#fff",cursor:"pointer"}}>
                <p style={{fontSize:12,fontWeight:sel?500:400,color:sel?C.navy:C.gray900,marginBottom:1}}>{a.label}</p>
                <p style={{fontSize:10,color:C.gray400,lineHeight:1.3}}>{a.desc}</p>
              </div>;
            })}
          </div>
        </div>
        <div>
          <div style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Post à optimiser</div>
          <textarea value={optimiserPost} onChange={e=>setOptimiserPost(e.target.value)} placeholder="Collez votre post ici…" rows={6} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"0.5px solid "+C.gray200,fontSize:12,resize:"none",outline:"none",fontFamily:"inherit",background:C.gray50,lineHeight:1.6}}/>
        </div>
        <div>
          <div style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Instruction libre</div>
          <textarea value={freeInst} onChange={e=>setFreeInst(e.target.value)} placeholder="Ex : Rends plus adapté à une audience DSI…" rows={2} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"0.5px solid "+C.gray200,fontSize:12,resize:"none",outline:"none",fontFamily:"inherit",background:C.gray50}}/>
        </div>
      </div>
      <div style={{padding:"1rem 1.25rem",borderTop:"0.5px solid "+C.gray200,flexShrink:0}}>
        <Btn onClick={handleOptimize} disabled={!optimiserPost||(selAxes.length===0&&!freeInst.trim())||loading} full>{loading?"Optimisation…":"⚡ Optimiser"+(selAxes.length?" ("+selAxes.length+")":"")}</Btn>
      </div>
    </div>

    {/* Colonne droite : post optimisé + aperçu LinkedIn */}
    <div style={{display:"flex",flexDirection:"column",overflowY:"auto",background:C.gray50}}>
      {/* Post optimisé */}
      <div style={{background:"#fff",borderBottom:"0.5px solid "+C.gray200,flexShrink:0}}>
        <div style={{padding:"10px 16px",borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",justifyContent:"space-between",borderTop:optimPost?"3px solid "+C.green:"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:12,fontWeight:500,color:optimPost?C.green:C.gray900}}>Post optimisé</span>
            {optimPost&&<CharBadge n={optimPost.length}/>}
          </div>
          {optimPost&&<div style={{display:"flex",gap:10}}>
            <InlineBtn onClick={()=>navigator.clipboard.writeText(optimPost)} color={C.navy}>Copier</InlineBtn>
            <InlineBtn onClick={()=>{onSavePost({content:optimPost,axis:"",tone:"",style:""});showToast("✓ Post sauvegardé");}} color={C.green}>💾 Sauver</InlineBtn>
          </div>}
        </div>
        {optimPost?<React.Fragment>
          <div style={{padding:"1.25rem 2rem"}}>
            <p style={{fontSize:13,lineHeight:1.85,color:C.gray900,whiteSpace:"pre-wrap",maxWidth:560,margin:"0 auto"}}>{optimPost}</p>
          </div>
          <div style={{padding:"10px 16px",borderTop:"0.5px solid "+C.gray200,display:"flex",gap:6,flexWrap:"wrap"}}>
            <Pill onClick={handleOptimize} disabled={loading}>↺ Regénérer</Pill>
            <Pill onClick={()=>{setOptimiserPost(optimPost);setOptimPost("");}}>→ Nouvelle base</Pill>
            <Pill onClick={()=>onGoAnalyser(optimPost)}>↺ Ré-analyser</Pill>
          </div>
        </React.Fragment>:<div style={{padding:"2rem",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <p style={{fontSize:13,color:C.gray400}}>Le post optimisé apparaîtra ici.</p>
        </div>}
      </div>
      {/* Aperçu LinkedIn */}
      {optimPost&&<div style={{padding:"1.25rem 2rem"}}>
        <p style={{fontSize:10,fontWeight:500,color:C.gray400,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>Aperçu LinkedIn</p>
        <div style={{background:"#fff",border:"0.5px solid "+C.gray200,borderRadius:10,padding:14,maxWidth:480,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <div style={{width:40,height:40,borderRadius:"50%",background:C.navy,color:"#fff",fontSize:14,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>N</div>
            <div><p style={{fontSize:13,fontWeight:500,color:C.gray900}}>Nicolas Girodet</p><p style={{fontSize:11,color:C.gray400}}>Co-Founder · Code Busters · À l'instant · 🌐</p></div>
          </div>
          <p style={{fontSize:12,lineHeight:1.7,color:C.gray900,marginBottom:10}}>{optimPost.slice(0,180)}{optimPost.length>180&&<span style={{color:C.gray400}}>… voir plus</span>}</p>
          <div style={{borderTop:"0.5px solid "+C.gray200,paddingTop:8,display:"flex",gap:20}}>
            <span style={{fontSize:11,color:C.gray400}}>👍 J'aime</span>
            <span style={{fontSize:11,color:C.gray400}}>💬 Commenter</span>
            <span style={{fontSize:11,color:C.gray400}}>🔁 Partager</span>
          </div>
        </div>
        <p style={{fontSize:11,color:C.gray400,textAlign:"center",marginTop:10}}>Aperçu non contractuel</p>
      </div>}
    </div>
  </div>;
}

// ─── CRÉER ────────────────────────────────────────────────────────
function CreerTab({profile,selectedAxes,prefill,onSavePost,showToast}) {
  const [activeTab,     setActiveTab]     = useState("generer");
  const [genPost,       setGenPost]       = useState("");
  const [basePost,      setBasePost]      = useState("");
  const [enriched,      setEnriched]      = useState("");
  const [analyserPost,  setAnalyserPost]  = useState("");
  const [analysis,      setAnalysis]      = useState(null);
  const [optimiserPost, setOptimiserPost] = useState("");

  const TABS=[{id:"generer",label:"Générer"},{id:"interview",label:"Interview"},{id:"analyser",label:"Analyser"},{id:"optimiser",label:"Optimiser"}];

  function goInterview(post)  { setBasePost(post);                       setActiveTab("interview"); }
  function goAnalyser(post)   { setAnalyserPost(post); setAnalysis(null); setActiveTab("analyser");  }
  function goOptimiser(post)  { setOptimiserPost(post);                  setActiveTab("optimiser"); }

  return <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 56px)",overflow:"hidden"}}>
    <SubTabs tabs={TABS} active={activeTab} onChange={setActiveTab}/>
    <div style={{flex:1,overflow:"hidden"}}>
      {activeTab==="generer"   && <GenererTab   profile={profile} selectedAxes={selectedAxes} prefill={prefill} onSavePost={onSavePost} showToast={showToast} post={genPost} setPost={setGenPost} onGoInterview={goInterview} onGoAnalyser={goAnalyser} onGoOptimiser={goOptimiser}/>}
      {activeTab==="interview" && <InterviewTab basePost={basePost} setBasePost={setBasePost} enriched={enriched} setEnriched={setEnriched} onSavePost={onSavePost} showToast={showToast} onGoAnalyser={goAnalyser} onGoOptimiser={goOptimiser}/>}
      {activeTab==="analyser"  && <AnalyserTab  analyserPost={analyserPost} setAnalyserPost={setAnalyserPost} analysis={analysis} setAnalysis={setAnalysis} showToast={showToast} onGoOptimiser={goOptimiser}/>}
      {activeTab==="optimiser" && <OptimiserTab optimiserPost={optimiserPost} setOptimiserPost={setOptimiserPost} onSavePost={onSavePost} showToast={showToast} onGoAnalyser={goAnalyser}/>}
    </div>
  </div>;
}

// ─── MES POSTS ────────────────────────────────────────────────────

  return <div style={{height:"calc(100vh - 56px)",overflowY:"auto",padding:"1.5rem",background:C.gray50}}>
    <div style={{maxWidth:1200,margin:"0 auto"}}>
      <p style={{fontSize:16,fontWeight:500,color:C.gray900,marginBottom:14}}>Mes posts <span style={{fontSize:13,color:C.gray400,fontWeight:400}}>({posts.length})</span></p>
      <div style={{display:"flex",gap:5,marginBottom:16,flexWrap:"wrap"}}>
        {["all",...axes].map(a=><button key={a} onClick={()=>setFilter(a)} style={{padding:"4px 10px",borderRadius:20,fontSize:11,cursor:"pointer",background:filter===a?C.navyLight:C.gray100,color:filter===a?C.navy:C.gray600,border:filter===a?"0.5px solid "+C.navyMid:"0.5px solid "+C.gray200,fontWeight:filter===a?500:400,fontFamily:"inherit"}}>{a==="all"?"Tous":a}</button>)}
      </div>
      {filtered.length===0?<Empty icon="📝" text="Aucun post sauvegardé."/>:
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,minmax(0,1fr))",gap:10}}>
          {filtered.map(p=><div key={p.id} style={{background:"#fff",border:"0.5px solid "+C.gray200,borderRadius:10,padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {p.axis&&<span style={{padding:"2px 8px",background:C.navyLight,color:C.navy,borderRadius:4,fontSize:11,fontWeight:500}}>{p.axis}</span>}
                {p.tone&&<span style={{fontSize:11,color:C.gray400}}>{p.tone}{p.style?" · "+p.style:""}</span>}
              </div>
              <span style={{fontSize:11,color:C.gray400,flexShrink:0}}>{p.date}</span>
            </div>
            <p style={{fontSize:13,color:C.gray900,lineHeight:1.6,whiteSpace:"pre-wrap",maxHeight:80,overflow:"hidden",WebkitMaskImage:"linear-gradient(to bottom, black 50%, transparent)",marginBottom:10}}>{p.content}</p>
            <div style={{display:"flex",gap:10,borderTop:"0.5px solid "+C.gray200,paddingTop:8}}>
              <button onClick={()=>navigator.clipboard.writeText(p.content)} style={{fontSize:11,color:C.navy,background:"none",border:"none",cursor:"pointer",fontWeight:500,fontFamily:"inherit"}}>Copier</button>
              <button onClick={()=>onDelete(p.id)} style={{fontSize:11,color:C.red,background:"none",border:"none",cursor:"pointer",marginLeft:"auto",fontFamily:"inherit"}}>Supprimer</button>
            </div>
          </div>)}
        </div>
      }
    </div>
  </div>;
}

// ─── INSIGHTS ─────────────────────────────────────────────────────
function InsightsTab({insights,posts,onAddInsight,onDeleteInsight,showToast}) {
  const [selPost,  setSelPost]  = useState("");
  const [metrics,  setMetrics]  = useState({impressions:"",likes:"",comments:""});
  const [improved, setImproved] = useState("");
  const [loading,  setLoading]  = useState(false);
  const engRate=metrics.impressions?(((+metrics.likes||0)+(+metrics.comments||0))/+metrics.impressions*100).toFixed(1):null;
  const avgImp=insights.length?Math.round(insights.reduce((s,i)=>s+(+i.impressions||0),0)/insights.length):null;
  const avgEng=insights.length?(insights.reduce((s,i)=>{const e=i.impressions?(((+i.likes||0)+(+i.comments||0))/+i.impressions*100):0;return s+e;},0)/insights.length).toFixed(1):null;
  async function handleAnalyze() {
    if (!selPost.trim()) return;
    setLoading(true);
    try {
      const hist=insights.slice(0,3).map(i=>"impressions:"+i.impressions+" likes:"+i.likes+" comments:"+i.comments).join(" | ");
      setImproved(await callClaude("Post :\n"+selPost+"\nPerf : impressions="+metrics.impressions+", likes="+metrics.likes+", commentaires="+metrics.comments+(hist?"\nHistorique : "+hist:"")+"\n\nAnalyse et génère une version améliorée.",LINKEDIN_RULES,1200));
      onAddInsight({postSnippet:selPost.slice(0,200),impressions:metrics.impressions,likes:metrics.likes,comments:metrics.comments});
      showToast("✓ Analyse enregistrée");
    } catch(e) { showToast("⚠️ "+e.message); }
    setLoading(false);
  }
  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",height:"calc(100vh - 56px)"}}>
    <div style={{padding:"1.5rem",background:"#fff",borderRight:"0.5px solid "+C.gray200,overflowY:"auto",display:"flex",flexDirection:"column",gap:14}}>
      <div><p style={{fontSize:15,fontWeight:500,color:C.gray900,marginBottom:4}}>Insights J+7</p><p style={{fontSize:12,color:C.gray400,lineHeight:1.5}}>{insights.length>0?"L'IA tient compte de vos "+insights.length+" analyse(s) précédente(s).":"Renseignez les performances d'un post publié."}</p></div>
      <div style={{border:"0.5px solid "+C.gray200,borderRadius:10,overflow:"hidden"}}>
        <div style={{padding:"8px 12px",background:C.gray50,borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",gap:8}}><div style={{width:18,height:18,borderRadius:"50%",background:C.navy,color:"#fff",fontSize:9,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center"}}>1</div><span style={{fontSize:11,fontWeight:500}}>Choisir le post</span></div>
        {selPost?<div style={{padding:"10px 12px",background:C.navyLight,borderLeft:"3px solid "+C.navy}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
            <p style={{fontSize:12,fontWeight:500,color:C.navy,lineHeight:1.5,flex:1}}>{selPost.slice(0,120)}{selPost.length>120?"…":""}</p>
            <button onClick={()=>{setSelPost("");setImproved("");}} style={{fontSize:11,color:C.navy,background:"none",border:"none",cursor:"pointer",fontWeight:500,flexShrink:0,marginLeft:8,fontFamily:"inherit"}}>Changer →</button>
          </div>
        </div>:<div style={{padding:"10px 12px"}}>
          {posts.length>0&&<select value="" onChange={e=>setSelPost(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"0.5px solid "+C.gray200,fontSize:12,marginBottom:8,background:C.gray50,outline:"none",color:C.gray900,fontFamily:"inherit"}}>
            <option value="">Choisir un post sauvegardé…</option>
            {posts.map(p=><option key={p.id} value={p.content}>{p.axis?"["+p.axis+"] ":""}{p.date} — {p.content.slice(0,50)}…</option>)}
          </select>}
          <textarea value={selPost} onChange={e=>setSelPost(e.target.value)} placeholder="Ou collez votre post ici…" rows={3} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"0.5px solid "+C.gray200,fontSize:12,resize:"vertical",outline:"none",fontFamily:"inherit",background:C.gray50,lineHeight:1.6}}/>
        </div>}
      </div>
      <div style={{border:"0.5px solid "+C.gray200,borderRadius:10,overflow:"hidden"}}>
        <div style={{padding:"8px 12px",background:C.gray50,borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",gap:8}}><div style={{width:18,height:18,borderRadius:"50%",background:C.navy,color:"#fff",fontSize:9,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center"}}>2</div><span style={{fontSize:11,fontWeight:500}}>Performances J+7</span><span style={{fontSize:10,color:C.gray400}}>— à saisir après publication</span></div>
        <div style={{padding:"10px 12px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
            {[{l:"Impressions",k:"impressions"},{l:"Likes",k:"likes"},{l:"Commentaires",k:"comments"}].map(x=><div key={x.k}>
              <p style={{fontSize:11,color:C.gray600,marginBottom:4}}>{x.l}</p>
              <input type="number" min="0" value={metrics[x.k]} onChange={e=>{const v=e.target.value;setMetrics(m=>({...m,[x.k]:v}));}} placeholder="0" style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"0.5px solid "+C.gray200,fontSize:13,outline:"none",fontFamily:"inherit",background:C.gray50}}/>
            </div>)}
          </div>
          {engRate&&<div style={{padding:"6px 10px",background:C.gray50,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,color:C.gray600}}>Taux d'engagement calculé</span><span style={{fontSize:13,fontWeight:500,color:C.green}}>{engRate}%</span></div>}
        </div>
      </div>
      <Btn full onClick={handleAnalyze} disabled={!selPost.trim()||loading}>{loading?"Analyse…":"✦ Analyser & générer une version améliorée"}</Btn>
      {improved&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontSize:13,fontWeight:500,color:C.green}}>Post amélioré</span><InlineBtn onClick={()=>navigator.clipboard.writeText(improved)} color={C.navy}>Copier</InlineBtn></div>
        <div style={{background:"#F0FDF4",borderRadius:8,padding:12,fontSize:12,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{improved}</div>
      </div>}
    </div>
    <div style={{padding:"1.5rem",background:C.gray50,overflowY:"auto"}}>
      <p style={{fontSize:14,fontWeight:500,color:C.gray900,marginBottom:12}}>Historique des analyses</p>
      {insights.length>0&&<div style={{display:"flex",gap:8,marginBottom:16}}>
        {[{l:"Moy. impressions",v:avgImp?avgImp.toLocaleString("fr-FR"):"—"},{l:"Moy. engagement",v:avgEng?avgEng+"%":"—",g:true},{l:"Posts analysés",v:insights.length}].map(x=><div key={x.l} style={{flex:1,background:"#fff",borderRadius:8,padding:10,textAlign:"center"}}><p style={{fontSize:10,color:C.gray400,marginBottom:4}}>{x.l}</p><p style={{fontSize:20,fontWeight:500,color:x.g?C.green:C.gray900}}>{x.v}</p></div>)}
      </div>}
      {insights.length===0?<Empty icon="📈" text="Aucune analyse enregistrée."/>:
        insights.map(ins=>{
          const eng=ins.impressions?(((+ins.likes||0)+(+ins.comments||0))/+ins.impressions*100).toFixed(1):null;
          return <div key={ins.id} style={{background:"#fff",border:"0.5px solid "+C.gray200,borderRadius:10,overflow:"hidden",marginBottom:8}}>
            <div style={{padding:"8px 12px",borderBottom:"0.5px solid "+C.gray200,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,color:C.gray400}}>{ins.date}</span><button onClick={()=>onDeleteInsight(ins.id)} style={{fontSize:11,color:C.red,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Suppr.</button></div>
            <div style={{padding:"8px 12px",borderBottom:"0.5px solid "+C.gray200}}><p style={{fontSize:11,color:C.gray400,fontStyle:"italic",lineHeight:1.4}}>{ins.postSnippet}…</p></div>
            <div style={{padding:"8px 12px",display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
              {[{l:"Vues",v:ins.impressions},{l:"Likes",v:ins.likes},{l:"Comm.",v:ins.comments},{l:"Eng.",v:eng?eng+"%":"—",g:true}].map(x=><div key={x.l} style={{background:C.gray50,borderRadius:6,padding:"6px 4px",textAlign:"center"}}><p style={{fontSize:10,color:C.gray400}}>{x.l}</p><p style={{fontSize:13,fontWeight:500,color:x.g?C.green:C.gray900}}>{x.v||"—"}</p></div>)}
            </div>
          </div>;
        })
      }
    </div>
  </div>;
}

// ─── APP SHELL — avec Netlify Blobs ───────────────────────────────
function AppShell() {
  const auth = useAuth();
  const toastTimer = useRef(null);
  const saveTimer  = useRef(null);
  const [toastMsg,     setToastMsg]     = useState("");
  const [dataLoaded,   setDataLoaded]   = useState(false);
  const [activeTab,    setActiveTab]    = useState("profil");
  const [profile,      setProfile]      = useState(null);
  const [axesSessions, setAxesSessions] = useState([]);
  const [favAxes,      setFavAxes]      = useState([]);
  const [selectedAxes, setSelectedAxes] = useState([]);
  const [roadmaps,     setRoadmaps]     = useState([]);
  const [activeRmId,   setActiveRmId]   = useState(null);
  const [pubWeeks,     setPubWeeks]     = useState(new Set());
  const [posts,        setPosts]        = useState([]);
  const [insights,     setInsights]     = useState([]);
  const [creerPrefill, setCreerPrefill] = useState(null);

  function showToast(m) { clearTimeout(toastTimer.current); setToastMsg(m); toastTimer.current=setTimeout(()=>setToastMsg(""),2800); }

  // Chargement des données depuis Netlify Blobs au login
  useEffect(()=>{
    if (!auth.user || dataLoaded) return;
    const timeout = setTimeout(()=>{ setDataLoaded(true); }, 6000); // failsafe 6s
    loadUserData().then(data=>{
      clearTimeout(timeout);
      if (data && Object.keys(data).length>0) {
        if (data.profile)      setProfile(data.profile);
        if (data.axesSessions) setAxesSessions(data.axesSessions);
        if (data.favAxes)      setFavAxes(data.favAxes);
        if (data.selectedAxes) setSelectedAxes(data.selectedAxes);
        if (data.roadmaps)     setRoadmaps(data.roadmaps);
        if (data.activeRmId)   setActiveRmId(data.activeRmId);
        if (data.pubWeeks)     setPubWeeks(new Set(data.pubWeeks));
        if (data.posts)        setPosts(data.posts);
        if (data.insights)     setInsights(data.insights);
        showToast("✓ Données chargées");
      }
      setDataLoaded(true);
    }).catch(()=>{ clearTimeout(timeout); setDataLoaded(true); });
  },[auth.user]);

  // Sauvegarde auto debounced (500ms après chaque changement)
  const allData = { profile, axesSessions, favAxes, selectedAxes, roadmaps, activeRmId, pubWeeks: Array.from(pubWeeks), posts, insights };
  useEffect(()=>{
    if (!dataLoaded) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(()=>{ saveUserData(allData); }, 500);
    return ()=>clearTimeout(saveTimer.current);
  },[profile,axesSessions,favAxes,selectedAxes,roadmaps,activeRmId,pubWeeks,posts,insights,dataLoaded]);

  function createRoadmap() { const rm={id:uid(),name:"Roadmap "+(roadmaps.length+1),createdAt:toDay(),weeks:[]}; setRoadmaps(p=>[...p,rm]); setActiveRmId(rm.id); return rm; }
  function handleDeleteAxis(id) { setAxesSessions(p=>p.map(s=>({...s,axes:s.axes.filter(a=>a.id!==id)})).filter(s=>s.axes.length>0)); setSelectedAxes(p=>p.filter(a=>a.id!==id)); setFavAxes(p=>p.filter(x=>x!==id)); }

  if (!dataLoaded && auth.user) return <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,color:C.gray400}}>
    <div style={{width:32,height:32,borderRadius:8,background:C.navy,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:8,height:8,borderRadius:"50%",background:"#fff"}}/></div>
    <p style={{fontSize:13}}>Chargement de vos données…</p>
  </div>;

  return <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <Toast message={toastMsg}/>
    <NavBar activeTab={activeTab} onTabChange={setActiveTab} postCount={posts.length} insightCount={insights.length}/>
    <main style={{flex:1,overflow:"hidden"}}>
      {activeTab==="profil"  && <ProfilTab profile={profile} onSave={p=>{setProfile(p);showToast("✓ Profil sauvegardé");}} showToast={showToast} onAxesGenerated={s=>{setAxesSessions(p=>[s,...p]);showToast("✓ 6 axes générés !");setActiveTab("axes");}}/>}
      {activeTab==="axes"    && <AxesTab axesSessions={axesSessions} favAxes={favAxes} selectedAxes={selectedAxes} onToggleAxis={a=>setSelectedAxes(p=>p.find(x=>x.id===a.id)?p.filter(x=>x.id!==a.id):[...p,a])} onToggleFav={id=>setFavAxes(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id])} onDeleteAxis={handleDeleteAxis} onAxesGenerated={s=>{setAxesSessions(p=>[s,...p]);showToast("✓ Axes générés !");}} profile={profile} showToast={showToast} onGoRoadmap={()=>{createRoadmap();setActiveTab("roadmap");}}/>}
      {activeTab==="roadmap" && <RoadmapTab roadmaps={roadmaps} activeRmId={activeRmId} onSetActive={setActiveRmId} onNewRoadmap={createRoadmap} onRenameRoadmap={id=>{const n=window.prompt("Nouveau nom :");if(n?.trim())setRoadmaps(p=>p.map(r=>r.id===id?{...r,name:n.trim()}:r));}} onDeleteRoadmap={id=>setRoadmaps(p=>{const nx=p.filter(r=>r.id!==id);if(activeRmId===id)setActiveRmId(nx.length?nx[0].id:null);return nx;})} onRoadmapGenerated={rm=>{setRoadmaps(p=>[...p,rm]);setActiveRmId(rm.id);showToast("✓ Roadmap générée !");setActiveTab("roadmap");}} onGoCreer={w=>{setCreerPrefill({axis:selectedAxes.find(a=>a.title===w.axis)||selectedAxes[0]||null,tone:w.tone,style:w.style,roadmapSug:w});setActiveTab("creer");}} pubWeeks={pubWeeks} selectedAxes={selectedAxes} profile={profile} showToast={showToast}/>}
      {activeTab==="creer"   && <CreerTab profile={profile} selectedAxes={selectedAxes} prefill={creerPrefill} onSavePost={p=>setPosts(prev=>[{...p,id:uid(),date:toDay()},...prev])} showToast={showToast}/>}
      {activeTab==="mesposts"&& <MesPostsTab posts={posts} onDelete={id=>setPosts(p=>p.filter(x=>x.id!==id))}/>}
      {activeTab==="insights"&& <InsightsTab insights={insights} posts={posts} onAddInsight={i=>setInsights(p=>[{...i,id:uid(),date:toDay()},...p])} onDeleteInsight={id=>setInsights(p=>p.filter(x=>x.id!==id))} showToast={showToast}/>}
    </main>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <AuthProvider><ProtectedRoute><AppShell/></ProtectedRoute></AuthProvider>
);
</script>
</body>
