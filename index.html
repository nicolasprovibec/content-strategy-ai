function parseJSON(txt) {
  if (!txt) return null;
  try { return JSON.parse(txt); } catch {}
  try { return JSON.parse(txt.replace(/```json|```/g,"").trim()); } catch {}
  const m = txt.match(/\{[\s\S]*\}/);
  if (m) try { return JSON.parse(m[0]); } catch {}
  const a = txt.match(/\[[\s\S]*\]/);
  if (a) try { return { weeks: JSON.parse(a[0]) }; } catch {}
  return null;
}

async function callClaude(userMsg, system, maxTokens) {
  if (!system) system = "";
  if (!maxTokens) maxTokens = 1200;
  var user = netlifyIdentity.currentUser();
  if (!user) throw new Error("Utilisateur non authentifié.");
  try { await user.jwt(true); user = netlifyIdentity.currentUser(); } catch(e) {}
  var token = user && user.token && user.token.access_token ? user.token.access_token : null;
  if (!token) throw new Error("Token invalide.");
  var res = await fetch("/.netlify/functions/claude", {
    method: "POST",
    headers: {"Content-Type":"application/json","Authorization":"Bearer " + token},
    body: JSON.stringify({system:system, max_tokens:maxTokens, messages:[{role:"user",content:userMsg}]}),
  });
  if (!res.ok) {
    var e = await res.json().catch(function(){return {};});
    throw new Error((e && e.error && e.error.message) ? e.error.message : "Erreur " + res.status);
  }
  var d = await res.json();
  return d && d.content && d.content[0] && d.content[0].text ? d.content[0].text : "";
}

        </div>
        <div style={{border:"0.5px solid "+C.gray200,borderRadius:10,overflow:"hidden"}}>
          <div style={{padding:"8px 12px",background:C.gray50,borderBottom:"0.5px solid "+C.gray200,display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:18,height:18,borderRadius:"50%",background:C.navy,color:"#fff",fontSize:9,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center"}}>2</div>
            <span style={{fontSize:11,fontWeight:500,color:C.gray900}}>Performances J+7</span>
            <span style={{fontSize:10,color:C.gray400}}>— à saisir après publication</span>
          </div>
          <div style={{padding:"10px 12px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
              {[{l:"Impressions",k:"impressions"},{l:"Likes",k:"likes"},{l:"Commentaires",k:"comments"}].map(function(x){return <div key={x.k}>
                <p style={{fontSize:11,color:C.gray600,marginBottom:4}}>{x.l}</p>
                <input type="number" min="0" value={metrics[x.k]} onChange={function(e){var v=e.target.value; setMetrics(function(m){var n=Object.assign({},m); n[x.k]=v; return n;});}} placeholder="0" style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"0.5px solid "+C.gray200,fontSize:13,outline:"none",fontFamily:"inherit",background:C.gray50}}/>
              </div>;})}
            </div>
            {engRate&&<div style={{padding:"6px 10px",background:C.gray50,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,color:C.gray600}}>Taux d'engagement calculé</span><span style={{fontSize:13,fontWeight:500,color:C.green}}>{engRate}%</span></div>}
          </div>
        </div>
        <Btn full onClick={handleAnalyze} disabled={!selPost.trim()||loading}>{loading?"Analyse…":"✦ Analyser & générer une version améliorée"}</Btn>
        {improved&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:500,color:C.green}}>Post amélioré</span>
            <button onClick={function(){navigator.clipboard.writeText(improved);}} style={{fontSize:11,color:C.navy,background:"none",border:"none",cursor:"pointer",fontWeight:500,fontFamily:"inherit"}}>Copier</button>
          </div>
          <div style={{background:"#F0FDF4",borderRadius:8,padding:12,fontSize:12,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{improved}</div>
        </div>}
      </div>
      <div style={{padding:"1.5rem",background:C.gray50,overflowY:"auto"}}>
        <p style={{fontSize:14,fontWeight:500,color:C.gray900,marginBottom:12}}>Historique des analyses</p>
        {props.insights.length>0&&<div style={{display:"flex",gap:8,marginBottom:16}}>
          {[{l:"Moy. impressions",v:avgImp?avgImp.toLocaleString("fr-FR"):"—"},{l:"Moy. engagement",v:avgEng?avgEng+"%":"—",g:true},{l:"Posts analysés",v:props.insights.length}].map(function(x){return <div key={x.l} style={{flex:1,background:"#fff",borderRadius:8,padding:10,textAlign:"center"}}><p style={{fontSize:10,color:C.gray400,marginBottom:4}}>{x.l}</p><p style={{fontSize:20,fontWeight:500,color:x.g?C.green:C.gray900}}>{x.v}</p></div>;})}</div>}
        {props.insights.length===0
          ?<Empty icon="📈" text="Aucune analyse enregistrée."/>
          :props.insights.map(function(ins){
            var eng = ins.impressions ? (((+ins.likes||0)+(+ins.comments||0))/+ins.impressions*100).toFixed(1) : null;
            return <div key={ins.id} style={{background:"#fff",border:"0.5px solid "+C.gray200,borderRadius:10,overflow:"hidden",marginBottom:8}}>
              <div style={{padding:"8px 12px",borderBottom:"0.5px solid "+C.gray200,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,color:C.gray400}}>{ins.date}</span><button onClick={function(){props.onDeleteInsight(ins.id);}} style={{fontSize:11,color:C.red,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Suppr.</button></div>
              <div style={{padding:"8px 12px",borderBottom:"0.5px solid "+C.gray200}}><p style={{fontSize:11,color:C.gray400,fontStyle:"italic",lineHeight:1.4}}>{ins.postSnippet}…</p></div>
              <div style={{padding:"8px 12px",display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                {[{l:"Vues",v:ins.impressions},{l:"Likes",v:ins.likes},{l:"Comm.",v:ins.comments},{l:"Eng.",v:eng?eng+"%":"—",g:true}].map(function(x){return <div key={x.l} style={{background:C.gray50,borderRadius:6,padding:"6px 4px",textAlign:"center"}}><p style={{fontSize:10,color:C.gray400}}>{x.l}</p><p style={{fontSize:13,fontWeight:500,color:x.g?C.green:C.gray900}}>{x.v||"—"}</p></div>;})}</div>
            </div>;
          })
        }
      </div>
    </div>
  );
}

function AppShell() {
  var _tm=useState(""); var toastMsg=_tm[0]; var setToastMsg=_tm[1];
  var toastTimer = useRef(null);
  function showToast(m) { clearTimeout(toastTimer.current); setToastMsg(m); toastTimer.current=setTimeout(function(){setToastMsg("");},2800); }

  var _at=useState("profil"); var activeTab=_at[0]; var setActiveTab=_at[1];
  var _pr=useState(function(){return store.get(SK.PROFILE);}); var profile=_pr[0]; var setProfile=_pr[1];
  var _as=useState(function(){return store.get(SK.AXES,[]);}); var axesSessions=_as[0]; var setAxesSessions=_as[1];
  var _fa=useState(function(){return store.get(SK.FAV,[]);}); var favAxes=_fa[0]; var setFavAxes=_fa[1];
  var _sa=useState(function(){return store.get(SK.SEL,[]);}); var selectedAxes=_sa[0]; var setSelectedAxes=_sa[1];
  var _rm=useState(function(){return store.get(SK.ROADMAPS,[]);}); var roadmaps=_rm[0]; var setRoadmaps=_rm[1];
  var _ar=useState(function(){return store.get(SK.ACTIVE_RM);}); var activeRmId=_ar[0]; var setActiveRmId=_ar[1];
  var _pw=useState(function(){return new Set(store.get(SK.PUB,[]));;}); var pubWeeks=_pw[0]; var setPubWeeks=_pw[1];
  var _po=useState(function(){return store.get(SK.POSTS,[]);}); var posts=_po[0]; var setPosts=_po[1];
  var _in=useState(function(){return store.get(SK.INSIGHTS,[]);}); var insights=_in[0]; var setInsights=_in[1];
  var _cp=useState(null); var creerPrefill=_cp[0]; var setCreerPrefill=_cp[1];

  function persist(key, setter) {
    return function(val) {
      setter(function(prev) {
        var v = typeof val === "function" ? val(prev) : val;
        store.set(key, v instanceof Set ? Array.from(v) : v);
        return v;
      });
    };
  }
  var saveProfile      = persist(SK.PROFILE,  setProfile);
  var saveAxesSessions = persist(SK.AXES,      setAxesSessions);
  var saveFavAxes      = persist(SK.FAV,       setFavAxes);
  var saveSelectedAxes = persist(SK.SEL,       setSelectedAxes);
  var saveRoadmaps     = persist(SK.ROADMAPS,  setRoadmaps);
  var saveActiveRmId   = persist(SK.ACTIVE_RM, setActiveRmId);
  var savePosts        = persist(SK.POSTS,     setPosts);
  var saveInsights     = persist(SK.INSIGHTS,  setInsights);

  function createRoadmap() {
    var rm = {id:uid(), name:"Roadmap "+(roadmaps.length+1), createdAt:toDay(), weeks:[]};
    saveRoadmaps(function(p){return [...p,rm];});
    saveActiveRmId(rm.id);
    return rm;
  }
  function handleDeleteAxis(id) {
    saveAxesSessions(function(p){return p.map(function(s){return Object.assign({},s,{axes:s.axes.filter(function(a){return a.id!==id;})});}).filter(function(s){return s.axes.length>0;});});
    saveSelectedAxes(function(p){return p.filter(function(a){return a.id!==id;});});
    saveFavAxes(function(p){return p.filter(function(x){return x!==id;});});
  }

  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <Toast message={toastMsg}/>
      <NavBar activeTab={activeTab} onTabChange={setActiveTab} postCount={posts.length} insightCount={insights.length}/>
      <main style={{flex:1,overflow:"hidden"}}>
        {activeTab==="profil"   && <ProfilTab profile={profile} onSave={function(p){saveProfile(p);showToast("✓ Profil sauvegardé");}} showToast={showToast} onAxesGenerated={function(s){saveAxesSessions(function(p){return [s,...p];});showToast("✓ 6 axes générés !");setActiveTab("axes");}}/>}
        {activeTab==="axes"     && <AxesTab axesSessions={axesSessions} favAxes={favAxes} selectedAxes={selectedAxes} onToggleAxis={function(a){saveSelectedAxes(function(p){return p.find(function(x){return x.id===a.id;})?p.filter(function(x){return x.id!==a.id;}):[...p,a];});}} onToggleFav={function(id){saveFavAxes(function(p){return p.indexOf(id)!==-1?p.filter(function(x){return x!==id;}):[...p,id];});}} onDeleteAxis={handleDeleteAxis} onAxesGenerated={function(s){saveAxesSessions(function(p){return [s,...p];});showToast("✓ Axes générés !");}} profile={profile} showToast={showToast} onGoRoadmap={function(){createRoadmap();setActiveTab("roadmap");}} onGoCreer={function(){setActiveTab("creer");}}/>}
        {activeTab==="roadmap"  && <RoadmapTab roadmaps={roadmaps} activeRmId={activeRmId} onSetActive={saveActiveRmId} onNewRoadmap={createRoadmap} onRenameRoadmap={function(id){var n=window.prompt("Nouveau nom :");if(n&&n.trim())saveRoadmaps(function(p){return p.map(function(r){return r.id===id?Object.assign({},r,{name:n.trim()}):r;});});}} onDeleteRoadmap={function(id){saveRoadmaps(function(p){var nx=p.filter(function(r){return r.id!==id;});if(activeRmId===id)saveActiveRmId(nx.length?nx[0].id:null);return nx;});}} onRoadmapGenerated={function(rm){saveRoadmaps(function(p){return [...p,rm];});saveActiveRmId(rm.id);showToast("✓ Roadmap générée !");setActiveTab("roadmap");}} onGoCreer={function(w){setCreerPrefill({axis:selectedAxes.find(function(a){return a.title===w.axis;})||selectedAxes[0]||null,tone:w.tone,style:w.style,roadmapSug:w});setActiveTab("creer");}} pubWeeks={pubWeeks} selectedAxes={selectedAxes} profile={profile} showToast={showToast}/>}
        {activeTab==="creer"    && <CreerTab profile={profile} selectedAxes={selectedAxes} prefill={creerPrefill} onSavePost={function(p){savePosts(function(prev){return [{...p,id:uid(),date:toDay()},...prev];});}} showToast={showToast}/>}
        {activeTab==="mesposts" && <MesPostsTab posts={posts} onDelete={function(id){savePosts(function(p){return p.filter(function(x){return x.id!==id;});});}}/>}
        {activeTab==="insights" && <InsightsTab insights={insights} posts={posts} onAddInsight={function(i){saveInsights(function(p){return [{...i,id:uid(),date:toDay()},...p];});}} onDeleteInsight={function(id){saveInsights(function(p){return p.filter(function(x){return x.id!==id;});});}} showToast={showToast}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <AuthProvider>
    <ProtectedRoute>
      <AppShell/>
    </ProtectedRoute>
  </AuthProvider>
);
</script>
</body>
</html>
